name: Continuous Video Generator

on:
  schedule:
    - cron: "*/60 * * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          pip install edge-tts arabic-reshaper python-bidi opencv-python pillow numpy requests google-generativeai

      - name: Create and Run Script
        shell: python
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          import os, asyncio, edge_tts, subprocess, requests, cv2, numpy as np
          import google.generativeai as genai
          from PIL import Image, ImageDraw, ImageFont
          from arabic_reshaper import reshape
          from bidi.algorithm import get_display

          # --- إعدادات أساسية ---
          TITLE = "أبي فوق الشجرة"
          VOICE = "ar-SA-ZariyahNeural"
          URL_TEXT = "www.mshort.do.am"
          API_KEY = os.getenv("GEMINI_API_KEY")
          FONT_URL = "https://github.com/google/fonts/raw/main/ofl/amiri/Amiri-Regular.ttf"

          genai.configure(api_key=API_KEY)

          def log(msg):
              print(f"[LOG] {msg}")

          def fix_arabic(text):
              return get_display(reshape(text))

          async def generate_audio():
              log("🔊 جاري توليد التعليق الصوتي...")
              text = f"أهلاً بكم، موضوعنا اليوم عن الفيلم والمسلسل الشهير {TITLE}. فيلم الرومانسية والاستعراض المصري الرائع."
              communicate = edge_tts.Communicate(text, VOICE)
              await communicate.save("audio.mp3")
              return "audio.mp3"

          def generate_images_with_gemini():
              log("🎨 جاري توليد 5 صور بواسطة Gemini API...")
              try:
                  # ملاحظة: استخدام نموذج توليد الصور Imagen
                  model = genai.ImageGenerationModel("imagen-3.0-generate-001")
                  prompt = f"Cinematic high quality still from the movie style of 'Abi Foq Al Shajara' Egyptian 1960s aesthetic, beach, vintage colors, highly detailed, no text."
                  
                  response = model.generate_images(
                      prompt=prompt,
                      number_of_images=5,
                      aspect_ratio="16:9",
                      safety_filter_level="block_few"
                  )
                  
                  image_paths = []
                  for i, img in enumerate(response.images):
                      path = f"image_{i}.png"
                      img.save(path)
                      image_paths.append(path)
                  return image_paths
              except Exception as e:
                  log(f"❌ فشل توليد الصور من Gemini: {e}")
                  return []

          def create_video(image_paths, audio_path):
              log("🎞️ جاري تجميع الفيديو...")
              # الحصول على مدة الصوت
              d_cmd = ["ffprobe", "-v", "error", "-show_entries", "format=duration", "-of", "default=noprint_wrappers=1:nokey=1", audio_path]
              duration = float(subprocess.check_output(d_cmd).decode().strip())
              
              # تجهيز الخط
              if not os.path.exists("font.ttf"):
                  with open("font.ttf", "wb") as f: f.write(requests.get(FONT_URL).content)
              
              # معالجة الصور (إضافة نصوص)
              processed_images = []
              for i, path in enumerate(image_paths):
                  img = Image.open(path).convert("RGB").resize((1280, 720))
                  draw = ImageDraw.Draw(img)
                  font = ImageFont.truetype("font.ttf", 60)
                  
                  # إضافة اسم المسلسل ورابط الموقع
                  draw.text((50, 50), fix_arabic(TITLE), font=font, fill=(255, 255, 255))
                  draw.text((50, 620), URL_TEXT, font=font, fill=(255, 237, 0))
                  
                  proc_path = f"proc_{i}.jpg"
                  img.save(proc_path)
                  processed_images.append(proc_path)

              # استخدام FFmpeg لدمج الصور مع الصوت
              # كل صورة تأخذ (مدة الصوت / 5) ثانية
              img_duration = duration / 5
              with open("concat.txt", "w") as f:
                  for p in processed_images:
                      f.write(f"file '{p}'\nduration {img_duration}\n")
                  f.write(f"file '{processed_images[-1]}'\n") # تكرار الصورة الأخيرة لتفادي مشاكل FFmpeg

              cmd = f"ffmpeg -y -f concat -safe 0 -i concat.txt -i {audio_path} -c:v libx264 -pix_fmt yuv420p -r 24 -shortest final_video.mp4"
              subprocess.run(cmd, shell=True)
              return "final_video.mp4"

          def upload_to_catbox(file_path):
              log("🚀 جاري الرفع إلى Catbox...")
              with open(file_path, "rb") as f:
                  response = requests.post("https://catbox.moe/user/api.php", data={"reqtype": "fileupload"}, files={"fileToUpload": f})
              return response.text.strip()

          async def main():
              if not API_KEY:
                  log("❌ خطأ: GEMINI_API_KEY غير موجود في الأكشن!")
                  return

              audio = await generate_audio()
              images = generate_images_with_gemini()
              
              if not images:
                  log("⚠️ لم يتم توليد صور، سيتم التوقف.")
                  return

              video = create_video(images, audio)
              url = upload_to_catbox(video)
              
              log(f"✅ انتهى العمل بنجاح!")
              log(f"🔗 رابط الفيديو على Catbox: {url}")

          if __name__ == "__main__":
              asyncio.run(main())
