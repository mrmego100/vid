name: Continuous Video Generator

on:
  schedule:
    - cron: "0 */3 * * *" 
  workflow_dispatch:      

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          pip install edge-tts arabic-reshaper python-bidi pytrends opencv-python pillow numpy requests nest_asyncio google-api-python-client google-auth-httplib2 google-auth-oauthlib

      - name: Create and Run Script
        shell: python
        env:
          # هذا هو السر الذي يجب أن تضعه في إعدادات ريبو جيت هاب
          GDRIVE_JSON: ${{ secrets.GDRIVE_JSON }}
        run: |
          import datetime, asyncio, edge_tts, requests, os, cv2, subprocess, time, numpy as np, sys, nest_asyncio, json
          from PIL import Image, ImageDraw, ImageFont
          from arabic_reshaper import reshape
          from bidi.algorithm import get_display
          from pytrends.request import TrendReq
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaFileUpload
          from google.oauth2 import service_account

          nest_asyncio.apply()

          # --- إعدادات جوجل درايف ---
          FOLDER_ID = "13AzIYPxo1ppcdM3-CBNe-o8C6h1ruo4S" 
          
          def get_drive_service():
              try:
                  json_data = os.environ.get('GDRIVE_JSON')
                  if not json_data:
                      print("❌ Error: GDRIVE_JSON secret is missing!")
                      return None
                  
                  info = json.loads(json_data)
                  # إصلاح مشكلة المفتاح الخاص لضمان قبول التوقيع الرقمي
                  if 'private_key' in info:
                      info['private_key'] = info['private_key'].replace('\\n', '\n')
                  
                  creds = service_account.Credentials.from_service_account_info(
                      info, scopes=['https://www.googleapis.com/auth/drive.file']
                  )
                  return build('drive', 'v3', credentials=creds)
              except Exception as e:
                  print(f"❌ Drive Auth Error: {e}")
                  return None

          def log(msg):
              print(f"[{datetime.datetime.now().strftime('%H:%M:%S')}] {msg}")
              sys.stdout.flush()

          def fix_arabic(text):
              reshaped = reshape(text)
              return get_display(reshaped)

          VOICE = "ar-SA-ZariyahNeural"
          URL_TEXT = "www.mshort.do.am"
          FONT_URL = "https://github.com/google/fonts/raw/main/ofl/amiri/Amiri-Regular.ttf"
          HISTORY_FILE = "history.txt"
          SESSION_LIMIT = 170 * 60 

          async def create_video(title, index, drive_service):
              audio_p, video_p, final_p = f"a_{index}.mp3", f"v_{index}.mp4", f"final_{index}.mp4"
              try:
                  log(f"🎬 معالجة: {title}")
                  now = datetime.datetime.now()
                  current_time_str = now.strftime("%I:%M %p")
                  current_date_str = now.strftime("%Y-%m-%d")

                  full_speech = f"أهلا بكل متابعينا. موضوع الفيديو اليوم عن المسلسل الشهير وهو {title}. إذا رغبت في مشاهدة المسلسل كامل ومدبلج. فابق معنا حتى نهاية الفيديو. لأوفر لك رابط قناة التيلجرام التي تحتوى على جميع أجزاء المسلسل كاملة. أو قم بالدخول على الموقع المعروض أمامك. تسجيلنا الحالي في تمام الساعة {current_time_str} بتاريخ {current_date_str}. آراكم في فيديو آخر."
                  
                  await edge_tts.Communicate(full_speech, VOICE).save(audio_p)
                  
                  d_cmd = ["ffprobe", "-v", "error", "-show_entries", "format=duration", "-of", "default=noprint_wrappers=1:nokey=1", audio_p]
                  duration = float(subprocess.check_output(d_cmd).decode().strip())
                  duration_rounded = int(np.ceil(duration))

                  if not os.path.exists("font.ttf"):
                      with open("font.ttf", "wb") as f: f.write(requests.get(FONT_URL).content)
                  
                  fps, size = 24, (1280, 720)
                  out = cv2.VideoWriter(video_p, cv2.VideoWriter_fourcc(*'mp4v'), fps, size)
                  font_main = ImageFont.truetype("font.ttf", 60)
                  font_sub = ImageFont.truetype("font.ttf", 50)
                  font_timer = ImageFont.truetype("font.ttf", 35)

                  for frame_num in range(int(duration * fps)):
                      img = np.zeros((720, 1280, 3), np.uint8)
                      pil_img = Image.fromarray(img)
                      draw = ImageDraw.Draw(pil_img)
                      
                      clean_title = fix_arabic(title)
                      rem = max(0, duration_rounded - (frame_num // fps))
                      timer_txt = f"00:{rem:02d}"

                      w1 = draw.textbbox((0, 0), clean_title, font=font_main)[2]
                      w2 = draw.textbbox((0, 0), URL_TEXT, font=font_sub)[2]
                      w3 = draw.textbbox((0, 0), timer_txt, font=font_timer)[2]

                      draw.text(((1280-w1)/2, 280), clean_title, font=font_main, fill=(255, 255, 255))
                      draw.text(((1280-w2)/2, 420), URL_TEXT, font=font_sub, fill=(255, 237, 0))
                      draw.text(((1280-w3)/2, 520), timer_txt, font=font_timer, fill=(0, 255, 0))
                      out.write(cv2.cvtColor(np.array(pil_img), cv2.COLOR_RGB2BGR))
                  out.release()

                  os.system(f"ffmpeg -i {video_p} -i {audio_p} -c:v libx264 -c:a aac -shortest {final_p} -y -loglevel quiet")
                  
                  if drive_service:
                      log(f"📤 جاري الرفع إلى درايف...")
                      file_metadata = {'name': f"{title}.mp4", 'parents': [FOLDER_ID]}
                      media = MediaFileUpload(final_p, mimetype='video/mp4', resumable=True)
                      file = drive_service.files().create(body=file_metadata, media_body=media, fields='id').execute()
                      log(f"✅ تم الرفع! ID: {file.get('id')}")
                  
              except Exception as e:
                  log(f"❌ خطأ: {e}")
              finally:
                  for f in [audio_p, video_p, final_p]: 
                      if os.path.exists(f): os.remove(f)

          async def main():
              start_time = time.time()
              log("🚀 الجلسة بدأت")
              drive_service = get_drive_service()
              if not drive_service: return

              pytrends = TrendReq(hl='ar', tz=0)
              while (time.time() - start_time) < SESSION_LIMIT:
                  try:
                      pytrends.build_payload(["مدبلج"], timeframe='now 1-d', gprop='youtube')
                      results = pytrends.related_queries()
                      used = []
                      if os.path.exists(HISTORY_FILE):
                          with open(HISTORY_FILE, "r", encoding="utf-8") as f: used = f.read().splitlines()
                      
                      if 'مدبلج' in results and results['مدبلج']['top'] is not None:
                          new_titles = [w for w in results['مدبلج']['top']['query'].tolist() if "مدبلج" in w and len(w) >= 15 and w not in used]
                          for q in new_titles:
                              await create_video(q, int(time.time()), drive_service)
                              with open(HISTORY_FILE, "a", encoding="utf-8") as f: f.write(q + "\n")
                              if (time.time() - start_time) >= SESSION_LIMIT: break
                      await asyncio.sleep(60)
                  except Exception as e:
                      log(f"⚠️ تنبيه: {e}")
                      await asyncio.sleep(20)

          asyncio.run(main())

      - name: Save Progress
        if: always()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add history.txt || echo "No history"
          git commit -m "Update history [skip ci]" || echo "No changes"
          git push || echo "Push failed"
