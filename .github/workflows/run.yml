name: Continuous Video Generator

on:
  schedule:
    - cron: "0 * * * *" # يعمل كل ساعة
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          pip install edge-tts arabic-reshaper python-bidi opencv-python pillow numpy requests google-genai

      - name: Create and Run Script
        shell: python
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          import os, asyncio, edge_tts, subprocess, requests, cv2, numpy as np
          from google import genai
          from google.genai import types
          from PIL import Image, ImageDraw, ImageFont
          from arabic_reshaper import reshape
          from bidi.algorithm import get_display

          # --- الإعدادات ---
          TITLE = "أبي فوق الشجرة"
          VOICE = "ar-EG-SalmaNeural" # صوت مصري مناسب للفيلم
          URL_TEXT = "www.mshort.do.am"
          API_KEY = os.getenv("GEMINI_API_KEY")

          client = genai.Client(api_key=API_KEY)

          def log(msg): print(f"[LOG] {msg}")

          def fix_arabic(text): return get_display(reshape(text))

          async def generate_audio():
              log("🔊 نطق اسم المسلسل...")
              text = f"مسلسل {TITLE}. شاهد الآن بجودة عالية على موقعنا."
              await edge_tts.Communicate(text, VOICE).save("audio.mp3")
              return "audio.mp3"

          def generate_images():
              log("🎨 توليد 5 صور عبر Gemini (Imagen)...")
              try:
                  # استخدام موديل Imagen 3 الجديد
                  response = client.models.generate_images(
                      model='imagen-3.0-generate-001',
                      prompt=f"Cinematic vintage 1960s Egyptian movie poster style for '{TITLE}', beach scenery, high resolution, no text",
                      config=types.GenerateImagesConfig(
                          number_of_images=5,
                          aspect_ratio="16:9",
                          output_mime_type="image/jpeg"
                      )
                  )
                  
                  paths = []
                  for i, generated_image in enumerate(response.generated_images):
                      path = f"img_{i}.jpg"
                      with open(path, "wb") as f:
                          f.write(generated_image.image_bytes)
                      paths.append(path)
                  return paths
              except Exception as e:
                  log(f"❌ خطأ في توليد الصور: {e}")
                  return []

          def make_video(images, audio):
              log("🎞️ تجميع الفيديو...")
              # إضافة نصوص على الصور
              for path in images:
                  img = Image.open(path).resize((1280, 720))
                  draw = ImageDraw.Draw(img)
                  # محاولة تحميل خط بسيط، وإلا سيستخدم الافتراضي
                  try: font = ImageFont.truetype("/usr/share/fonts/truetype/dejavu/DejaVuSans.ttf", 50)
                  except: font = ImageFont.load_default()
                  
                  draw.text((50, 50), fix_arabic(TITLE), font=font, fill="white")
                  draw.text((50, 600), URL_TEXT, font=font, fill="yellow")
                  img.save(path)

              # دمج باستخدام FFmpeg (كل صورة 3 ثوانٍ)
              subprocess.run(f"ffmpeg -y -framerate 1/3 -i img_%d.jpg -i {audio} -c:v libx264 -pix_fmt yuv420p -shortest video.mp4", shell=True)
              return "video.mp4"

          def upload(file):
              log("🚀 الرفع لـ Catbox...")
              r = requests.post("https://catbox.moe/user/api.php", data={"reqtype": "fileupload"}, files={"fileToUpload": open(file, "rb")})
              return r.text

          async def run():
              if not API_KEY: return log("Missing API Key")
              audio = await generate_audio()
              images = generate_images()
              if not images: return
              video = make_video(images, audio)
              url = upload(video)
              log(f"✅ تم بنجاح: {url}")

          asyncio.run(run())
