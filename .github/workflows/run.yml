name: Telegram Dynamic Channel Name

on:
  workflow_dispatch: # للتشغيل اليدوي لأول مرة فقط

jobs:
  dynamic-channel-name:
    runs-on: ubuntu-latest
    permissions:
      actions: write  # ضرورية للسماح للسكربت بإعادة تشغيل نفسه
    steps:
      - name: Run Task and Re-queue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }} # التوكن التلقائي
        run: |
          #!/bin/bash
          
          # 1. المهمة (تغيير اسم القناة)
          BOT_TOKEN="8691643823:AAHd1KPqFa0Gc-aVb6wqa30TYaa4j3BgDSk"
          CHANNEL_ID="@M015_1_6_7_8_9_10_11_12_13_14_15"
          NAME="جلسة اختبار (كل دقيقة) - $(date +'%H:%M:%S')"
          
          echo "جاري تحديث القناة..."
          curl -s -X POST "https://api.telegram.org/bot$BOT_TOKEN/setChatTitle" \
               -d chat_id="$CHANNEL_ID" \
               -d title="$NAME"

          echo "تم تحديث القناة: $NAME"

          # 2. الانتظار لمدة دقيقة واحدة (للاختبار)
          echo "الانتظار لمدة دقيقة قبل التشغيل التالي..."
          sleep 60

          # 3. إعادة تشغيل الـ Workflow نفسه
          # تأكد أن اسم الملف 'main.yml' مطابق لاسم ملفك في المسار .github/workflows/
          gh workflow run main.yml
