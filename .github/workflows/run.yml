name: Continuous Video Generator

on:
  schedule:
    - cron: "0 */3 * * *" 
  workflow_dispatch:      

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          pip install edge-tts arabic-reshaper pytrends opencv-python pillow numpy requests

      - name: Create and Run Script
        shell: python
        run: |
          import datetime, asyncio, edge_tts, requests, os, cv2, subprocess, time, numpy as np, sys
          from PIL import Image, ImageDraw, ImageFont
          from arabic_reshaper import reshape
          from pytrends.request import TrendReq

          def log(msg):
              print(f"[{datetime.datetime.now().strftime('%H:%M:%S')}] {msg}")
              sys.stdout.flush()

          VOICE = "ar-SA-ZariyahNeural"
          URL_TEXT = "www.mshort.do.am"
          FONT_URL = "https://github.com/google/fonts/raw/main/ofl/amiri/Amiri-Regular.ttf"
          HISTORY_FILE = "history.txt"
          SESSION_LIMIT = 170 * 60 
          PRE_TEXT = "أهلا بكل متابعينا. موضوع الفيديو اليوم عن المسلسل الشهير وهو"

          def fix_arabic(text):
              return reshape(text)[::-1]

          async def create_video(title, index):
              audio_p, video_p, final_p = f"a_{index}.mp3", f"v_{index}.mp4", f"final_{index}.mp4"
              try:
                  log(f"🎬 معالجة فيديو جديد: {title}")
                  communicate = edge_tts.Communicate(f"{PRE_TEXT} {title}", VOICE)
                  await communicate.save(audio_p)
                  
                  d_cmd = ["ffprobe", "-v", "error", "-show_entries", "format=duration", "-of", "default=noprint_wrappers=1:nokey=1", audio_p]
                  duration = float(subprocess.check_output(d_cmd).decode().strip())
                  
                  if not os.path.exists("font.ttf"):
                      with open("font.ttf", "wb") as f: f.write(requests.get(FONT_URL).content)
                  
                  fps, size = 24, (1280, 720)
                  out = cv2.VideoWriter(video_p, cv2.VideoWriter_fourcc(*'mp4v'), fps, size)
                  font = ImageFont.truetype("font.ttf", 60)

                  for _ in range(int(duration * fps)):
                      frame = np.zeros((720, 1280, 3), np.uint8)
                      pil_img = Image.fromarray(frame)
                      draw = ImageDraw.Draw(pil_img)
                      draw.text((640, 360), fix_arabic(title), font=font, fill=(255,255,255), anchor="mm")
                      draw.text((640, 450), URL_TEXT, font=font, fill=(0,255,255), anchor="mm")
                      out.write(np.array(pil_img))
                  out.release()

                  os.system(f"ffmpeg -i {video_p} -i {audio_p} -c:v libx264 -c:a aac -shortest {final_p} -y -loglevel quiet")
                  
                  with open(final_p, "rb") as f:
                      r = requests.post("https://catbox.moe/user/api.php", data={"reqtype":"fileupload"}, files={"fileToUpload":f}, timeout=60)
                  log(f"✅ تم الرفع بنجاح: {r.text.strip()}")
                  
              except Exception as e:
                  log(f"❌ فشل في هذا الفيديو: {e}")
              finally:
                  for f in [audio_p, video_p, final_p]: 
                      if os.path.exists(f): os.remove(f)

          async def main():
              start_time = time.time()
              log("🚀 بدأت الجلسة السريعة (بدون انتظار)")
              pytrends = TrendReq(hl='ar', tz=0)
              
              while (time.time() - start_time) < SESSION_LIMIT:
                  try:
                      log("🔍 جلب أحدث التريندات...")
                      pytrends.build_payload(["مدبلج"], timeframe='now 1-d', gprop='youtube')
                      df = pytrends.related_queries()['مدبلج']['top']
                      
                      used = []
                      if os.path.exists(HISTORY_FILE):
                          with open(HISTORY_FILE, "r", encoding="utf-8") as f: used = f.read().splitlines()
                      
                      if df is not None:
                          new_titles = [q for q in df['query'].tolist() if q not in used and len(q) >= 20]
                          log(f"وجدنا {len(new_titles)} فيديو جديد للعمل عليها.")
                          
                          for q in new_titles:
                              # إنشاء الفيديوهات بدون أي sleep بينها
                              await create_video(q, int(time.time()))
                              with open(HISTORY_FILE, "a", encoding="utf-8") as f: f.write(q + "\n")
                              
                              if (time.time() - start_time) >= SESSION_LIMIT: break
                      
                      log("🏁 انتهت القائمة الحالية، فحص جديد بعد 30 ثانية فقط...")
                      await asyncio.sleep(30) # انتظار بسيط جداً فقط لتجنب حظر جوجل تريندز
                  except Exception as e:
                      log(f"⚠️ خطأ: {e}")
                      await asyncio.sleep(10)

          asyncio.run(main())

      - name: Save and Push Progress
        if: always()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add history.txt || echo "No history"
          git commit -m "Update video history [skip ci]" || echo "No changes"
          git push || echo "Push failed"
