name: Continuous Video Generator

on:
  schedule:
    - cron: "0 */3 * * *" 
  workflow_dispatch:      

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          pip install edge-tts arabic-reshaper pytrends opencv-python pillow numpy requests nest_asyncio google-api-python-client google-auth-httplib2 google-auth-oauthlib

      - name: Create and Run Script
        shell: python
        env:
          GDRIVE_JSON_B64: ${{ secrets.GDRIVE_JSON }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          import datetime, asyncio, edge_tts, requests, os, cv2, subprocess, time, numpy as np, sys, nest_asyncio, json, base64
          from PIL import Image, ImageDraw, ImageFont
          from arabic_reshaper import reshape
          from pytrends.request import TrendReq
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaFileUpload
          from google.oauth2 import service_account

          nest_asyncio.apply()

          def delete_old_runs():
              try:
                  token = os.environ.get('GH_TOKEN')
                  repo = os.environ.get('REPO')
                  url = f"https://api.github.com/repos/{repo}/actions/runs"
                  headers = {'Authorization': f'Bearer {token}', 'Accept': 'application/vnd.github.v3+json'}
                  res = requests.get(url, headers=headers)
                  if res.status_code == 200:
                      runs = res.json().get('workflow_runs', [])
                      for run in runs[10:]:
                          requests.delete(f"{url}/{run['id']}", headers=headers)
              except: pass

          FOLDER_ID = "13AzIYPxo1ppcdM3-CBNe-o8C6h1ruo4S" 
          
          def get_drive_service():
              try:
                  b64_str = os.environ.get('GDRIVE_JSON_B64').strip()
                  decoded_bytes = base64.b64decode(b64_str)
                  info = json.loads(decoded_bytes)
                  if 'private_key' in info:
                      info['private_key'] = info['private_key'].replace('\\\\n', '\n').replace('\\n', '\n').strip()
                  creds = service_account.Credentials.from_service_account_info(info)
                  return build('drive', 'v3', credentials=creds)
              except Exception as e:
                  print(f"❌ Auth Error: {e}")
                  raise

          def log(msg):
              print(f"[{datetime.datetime.now().strftime('%H:%M:%S')}] {msg}")
              sys.stdout.flush()

          VOICE = "ar-SA-ZariyahNeural"
          URL_TEXT = "www.mshort.do.am"
          FONT_URL = "https://github.com/google/fonts/raw/main/ofl/amiri/Amiri-Regular.ttf"
          HISTORY_FILE = "history.txt"
          SESSION_LIMIT = 170 * 60 

          now = datetime.datetime.now()
          current_time_str = now.strftime("%I:%M %p")
          current_date_str = now.strftime("%Y-%m-%d")

          PRE_TEXT = "أهلا بكل متابعينا. موضوع الفيديو اليوم عن المسلسل الشهير وهو"
          POST_TEXT = f""" . إذا رغبت في مشاهدة المسلسل كامل ومدبلج. فابقَ معنا حتى نهاية الفيديو.  
          لأوفر لك رابط قناة التيلجرام التي تحتوى على جميع أجزاء المسلسل كاملة.  
          أو قم بالدخول على الموقع المعروض أمامك باللون الأزرق.  
          إلى هنا نكون قد وصلنا إلى نهاية الفيديو وأتمنى ان يكون الفيديو نال إعجابكم وأضاف لكم قيمة جديدة في يومكم الحالى.  
          أود ان اعتذر لكم عن عدم قدرة عرض أى شئ خاص بمالك محتوى آخر هنا.  
          نحن نتبع ونحترم جميع سياسات حقوق الملكية وإرشادات المنتدى الخاص بالمنصة.  
          لذلك لا يمكن عرض أى شئ ليس من حقنا فى هذه القناة.  
          تسجيلنا الحالي في تمام الساعة {current_time_str} بتاريخ {current_date_str}.  
          فقط قم بزيارة موقعنا المعروض. آراكم في فيديو آخر."""

          def fix_arabic(text):
              return reshape(text)

          async def create_video(title, index, drive_service):
              audio_p, video_p, final_p = f"a_{index}.mp3", f"v_{index}.mp4", f"final_{index}.mp4"
              try:
                  log(f"🎬 Processing: {title}")
                  await edge_tts.Communicate(f"{PRE_TEXT} {title} {POST_TEXT}", VOICE).save(audio_p)
                  
                  # تم تصحيح الأمر هنا بإضافة format=duration
                  d_cmd = ["ffprobe", "-v", "error", "-show_entries", "format=duration", "-of", "default=noprint_wrappers=1:nokey=1", audio_p]
                  duration = float(subprocess.check_output(d_cmd).decode().strip())
                  duration_int = int(np.ceil(duration))

                  if not os.path.exists("font.ttf"):
                      with open("font.ttf", "wb") as f: f.write(requests.get(FONT_URL).content)
                  
                  fps = 24
                  out = cv2.VideoWriter(video_p, cv2.VideoWriter_fourcc(*'mp4v'), fps, (1280, 720))
                  f_main = ImageFont.truetype("font.ttf", 70)
                  f_sub = ImageFont.truetype("font.ttf", 55)

                  for frame_num in range(int(duration * fps)):
                      img = np.zeros((720, 1280, 3), np.uint8)
                      pil_img = Image.fromarray(img)
                      draw = ImageDraw.Draw(pil_img)
                      txt = fix_arabic(title)
                      rem = max(0, duration_int - (frame_num // fps))
                      timer = f"00:{rem:02d}"

                      w1 = draw.textbbox((0, 0), txt, font=f_main)[2]
                      w2 = draw.textbbox((0, 0), URL_TEXT, font=f_sub)[2]

                      draw.text(((1280-w1)/2, 280), txt, font=f_main, fill=(255, 255, 255))
                      draw.text(((1280-w2)/2, 420), URL_TEXT, font=f_sub, fill=(255, 237, 0))
                      draw.text((600, 550), timer, font=f_sub, fill=(0, 255, 0))
                      out.write(np.array(pil_img))
                  out.release()

                  os.system(f"ffmpeg -i {video_p} -i {audio_p} -c:v libx264 -c:a aac -shortest {final_p} -y -loglevel quiet")
                  
                  log(f"📤 Uploading: {title}...")
                  media = MediaFileUpload(final_p, mimetype='video/mp4')
                  drive_service.files().create(body={'name': f"{title}.mp4", 'parents': [FOLDER_ID]}, media_body=media).execute()
                  log(f"✅ Done!")
                  
              except Exception as e:
                  log(f"❌ Error: {e}")
              finally:
                  for f in [audio_p, video_p, final_p]: 
                      if os.path.exists(f): os.remove(f)

          async def main():
              delete_old_runs()
              start_time = time.time()
              log("🚀 Started")
              try:
                  drive_service = get_drive_service()
              except: return

              pytrends = TrendReq(hl='ar', tz=0)
              while (time.time() - start_time) < SESSION_LIMIT:
                  try:
                      pytrends.build_payload(["مدبلج"], timeframe='now 1-d', gprop='youtube')
                      results = pytrends.related_queries()
                      used = []
                      if os.path.exists(HISTORY_FILE):
                          with open(HISTORY_FILE, "r", encoding="utf-8") as f: used = f.read().splitlines()
                      
                      if 'مدبلج' in results and results['مدبلج']['top'] is not None:
                          for q in results['مدبلج']['top']['query'].tolist():
                              if "مدبلج" in q and len(q) > 15 and q not in used:
                                  await create_video(q, int(time.time()), drive_service)
                                  with open(HISTORY_FILE, "a", encoding="utf-8") as f: f.write(q + "\n")
                                  if (time.time() - start_time) >= SESSION_LIMIT: break
                      await asyncio.sleep(200)
                  except Exception as e:
                      log(f"⚠️ Trend Error: {e}")
                      await asyncio.sleep(60)

          asyncio.run(main())

      - name: Save Progress
        if: always()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add history.txt || echo "No history"
          git commit -m "Update history [skip ci]" || echo "No changes"
          git push || echo "Push failed"
