name: Continuous Video Generator

on:
  schedule:
    - cron: "0 * * * *" # يعمل كل ساعة
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg fonts-dejavu-core
          pip install edge-tts arabic-reshaper python-bidi opencv-python pillow numpy requests google-genai

      - name: Create and Run Script
        shell: python
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          import os, asyncio, edge_tts, subprocess, requests, cv2, numpy as np
          from google import genai
          from google.genai import types
          from PIL import Image, ImageDraw, ImageFont
          from arabic_reshaper import reshape
          from bidi.algorithm import get_display

          # --- إعداداتك الخاصة ---
          TITLE = "أبي فوق الشجرة"
          VOICE = "ar-EG-SalmaNeural"
          URL_TEXT = "www.mshort.do.am"
          API_KEY = os.getenv("GEMINI_API_KEY")

          # تهيئة العميل (للمشتركين في الخطة المدفوعة)
          client = genai.Client(api_key=API_KEY)

          def log(msg): print(f"[LOG] {msg}")
          def fix_arabic(text): return get_display(reshape(text))

          async def generate_audio():
              log("🔊 جاري توليد التعليق الصوتي لاسم المسلسل...")
              speech_text = f"أهلاً بكم في عرضنا اليوم عن العمل الكلاسيكي الخالد {TITLE}. يمكنكم مشاهدته كاملاً الآن عبر موقعنا."
              await edge_tts.Communicate(speech_text, VOICE).save("audio.mp3")
              return "audio.mp3"

          def generate_images_gemini():
              log("🎨 جاري توليد 5 صور بواسطة Gemini Imagen (الخطة المدفوعة)...")
              paths = []
              # طلب 5 صور (سنقوم بطلبين لأن بعض الموديلات تطلب بحد أقصى 4 في الطلب الواحد)
              prompts = [
                  f"Cinematic vintage 1960s Egyptian movie poster style for {TITLE}, beach, high detail",
                  f"Cinematic scene from the movie {TITLE}, summer vibe, 4k resolution"
              ]
              
              count = 0
              try:
                  # الطلب الأول (3 صور)
                  resp1 = client.models.generate_images(
                      model='imagen-3.0-generate-001',
                      prompt=prompts[0],
                      config=types.GenerateImagesConfig(number_of_images=3, aspect_ratio="16:9")
                  )
                  # الطلب الثاني (صورتين)
                  resp2 = client.models.generate_images(
                      model='imagen-3.0-generate-001',
                      prompt=prompts[1],
                      config=types.GenerateImagesConfig(number_of_images=2, aspect_ratio="16:9")
                  )
                  
                  all_images = resp1.generated_images + resp2.generated_images
                  
                  for img in all_images:
                      path = f"img_{count}.jpg"
                      with open(path, "wb") as f:
                          f.write(img.image_bytes)
                      paths.append(path)
                      count += 1
                  return paths
              except Exception as e:
                  log(f"❌ خطأ Gemini: تأكد من تفعيل الدفع للـ API. التفاصيل: {e}")
                  return []

          def make_video(images, audio):
              log(f"🎞️ تجميع الفيديو من {len(images)} صور...")
              d_cmd = ["ffprobe", "-v", "error", "-show_entries", "format=duration", "-of", "default=noprint_wrappers=1:nokey=1", audio]
              duration = float(subprocess.check_output(d_cmd).decode().strip())
              
              for path in images:
                  img = Image.open(path).convert("RGB").resize((1280, 720))
                  draw = ImageDraw.Draw(img)
                  try: font = ImageFont.truetype("/usr/share/fonts/truetype/dejavu/DejaVuSans.ttf", 50)
                  except: font = ImageFont.load_default()
                  
                  draw.text((50, 50), fix_arabic(TITLE), font=font, fill="white")
                  draw.text((50, 600), URL_TEXT, font=font, fill="yellow")
                  img.save(path)

              img_speed = duration / len(images)
              subprocess.run(f"ffmpeg -y -framerate 1/{img_speed} -i img_%d.jpg -i {audio} -c:v libx264 -pix_fmt yuv420p -shortest video.mp4", shell=True)
              return "video.mp4"

          def upload(file):
              log("🚀 الرفع إلى Catbox...")
              return requests.post("https://catbox.moe/user/api.php", data={"reqtype": "fileupload"}, files={"fileToUpload": open(file, "rb")}).text

          async def main():
              audio = await generate_audio()
              images = generate_images_gemini()
              if not images: return
              video = make_video(images, audio)
              url = upload(video)
              log(f"✅ تم بنجاح! الرابط: {url}")

          if __name__ == "__main__":
              asyncio.run(main())
