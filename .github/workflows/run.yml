name: Continuous Video Generator

on:
  schedule:
    - cron: "*/60 * * * *" # كاحتياط فقط
  workflow_dispatch:

concurrency:
  group: video-generator-group
  cancel-in-progress: false 

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: 🧹 Delete Old Workflow Runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 2

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          pip install edge-tts arabic-reshaper python-bidi pytrends opencv-python pillow numpy requests nest_asyncio yt-dlp duckduckgo-search==5.3.1
          pip install google-api-python-client google-auth-httplib2 google-auth-oauthlib

      - name: Create and Run Script
        shell: python
        env:
          YOUTUBE_CREDENTIALS: ${{ secrets.YOUTUBE_CREDENTIALS }}
        run: |
          import datetime, asyncio, edge_tts, requests, os, cv2, subprocess, time, numpy as np, sys, nest_asyncio, json, glob, shutil
          import yt_dlp
          from duckduckgo_search import DDGS
          from PIL import Image, ImageDraw, ImageFont
          from arabic_reshaper import reshape
          from bidi.algorithm import get_display
          from pytrends.request import TrendReq
          from google.oauth2.credentials import Credentials
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaFileUpload

          nest_asyncio.apply()

          def log(msg):
              print(f"[{datetime.datetime.now().strftime('%H:%M:%S')}] {msg}")
              sys.stdout.flush()

          VOICE = "ar-SA-ZariyahNeural"
          URL_TEXT = "www.mshort.do.am"
          FONT_URL = "https://github.com/google/fonts/raw/main/ofl/amiri/Amiri-Regular.ttf"
          HISTORY_FILE = "history.txt"

          now = datetime.datetime.now()
          current_time_str = now.strftime("%I:%M %p")
          current_date_str = now.strftime("%Y-%m-%d")

          PRE_TEXT = "أهلا بكل متابعينا. موضوع الفيديو اليوم عن المسلسل الشهير وهو"
          POST_TEXT = f""" . إذا رغبت في مشاهدة المسلسل كامل ومدبلج. فابقَ معنا حتى نهاية الفيديو.  
          لأوفر لك رابط قناة التيلجرام التي تحتوى على جميع أجزاء المسلسل كاملة.  
          أو قم بالدخول على الموقع المعروض أمامك باللون الأصفر.  
          تسجيلنا الحالي في تمام الساعة {current_time_str} بتاريخ {current_date_str}.  
          آراكم في فيديو آخر."""

          def fix_arabic(text):
              reshaped_text = reshape(text)
              return get_display(reshaped_text)

          def download_source_video(query):
              log(f"🔍 البحث عن فيديو لـ: {query}")
              # محاولة يوتيوب أولاً
              ydl_opts = {
                  'format': 'bestvideo[height<=720]+bestaudio/best[height<=720]',
                  'outtmpl': 'source_video.mp4',
                  'quiet': True,
                  'noplaylist': True,
                  'max_filesize': 50 * 1024 * 1024 # 50MB max
              }
              
              with yt_dlp.YoutubeDL(ydl_opts) as ydl:
                  try:
                      log("📺 جاري البحث في يوتيوب...")
                      ydl.download([f"ytsearch1:{query} مسلسل"])
                      if os.path.exists('source_video.mp4'): return 'source_video.mp4'
                  except:
                      log("⚠️ لم يتم العثور في يوتيوب، جاري تجربة تيك توك...")

              # محاولة تيك توك عبر DuckDuckGo إذا فشل يوتيوب
              try:
                  with DDGS() as ddgs:
                      results = list(ddgs.text(f"site:tiktok.com {query} مسلسل", max_results=1))
                      if results:
                          tk_url = results[0]['href']
                          with yt_dlp.YoutubeDL(ydl_opts) as ydl:
                              ydl.download([tk_url])
                              if os.path.exists('source_video.mp4'): return 'source_video.mp4'
              except Exception as e:
                  log(f"⚠️ فشل البحث في تيك توك: {e}")
              
              return None

          def extract_frames(video_path, duration, fps):
              frames = []
              if not video_path or not os.path.exists(video_path):
                  return [np.zeros((720, 1280, 3), np.uint8)]
              
              cap = cv2.VideoCapture(video_path)
              total_frames_needed = int(duration * fps)
              # استخراج صورة كل ثانية تقريباً لتنويع المشاهد
              video_fps = cap.get(cv2.CAP_PROP_FPS) or 24
              step = int(video_fps) 
              
              count = 0
              while len(frames) < 20: # نأخذ 20 صورة مميزة ونكررها
                  cap.set(cv2.CAP_PROP_POS_FRAMES, count * step)
                  success, frame = cap.read()
                  if not success: break
                  frame = cv2.resize(frame, (1280, 720))
                  frames.append(frame)
                  count += 1
              cap.release()
              
              if not frames: frames = [np.zeros((720, 1280, 3), np.uint8)]
              return frames

          def upload_to_youtube(video_path, title):
              creds_json = os.environ.get('YOUTUBE_CREDENTIALS')
              if not creds_json:
                  log("❌ فشل الرفع: سر 'YOUTUBE_CREDENTIALS' غير موجود.")
                  return False
              try:
                  creds_dict = json.loads(creds_json)
                  credentials = Credentials.from_authorized_user_info(creds_dict)
                  youtube = build('youtube', 'v3', credentials=credentials)
                  body = {
                      "snippet": {
                          "title": f"{title} | مسلسل مدبلج",
                          "description": f"شاهد مسلسل {title} كامل مدبلج.\nللمزيد زوروا موقعنا: {URL_TEXT}",
                          "tags": ["مسلسل", "مدبلج", title],
                          "categoryId": "24" 
                      },
                      "status": { "privacyStatus": "public" }
                  }
                  media = MediaFileUpload(video_path, chunksize=-1, resumable=True)
                  log("⏳ جاري الرفع إلى يوتيوب...")
                  request = youtube.videos().insert(part="snippet,status", body=body, media_body=media)
                  response = request.execute()
                  log(f"✅ تم الرفع بنجاح! رابط الفيديو: https://www.youtube.com/watch?v={response['id']}")
                  return True
              except Exception as e:
                  log(f"❌ خطأ أثناء الرفع ليوتيوب: {e}")
                  return False

          async def create_video(title, index):
              audio_p, video_p, final_p = f"a_{index}.mp3", f"v_{index}.mp4", f"final_{index}.mp4"
              try:
                  log(f"🎬 معالجة: {title}")
                  full_speech = f"{PRE_TEXT} {title} {POST_TEXT}"
                  await edge_tts.Communicate(full_speech, VOICE).save(audio_p)
                  
                  d_cmd = ["ffprobe", "-v", "error", "-show_entries", "format=duration", "-of", "default=noprint_wrappers=1:nokey=1", audio_p]
                  duration = float(subprocess.check_output(d_cmd).decode().strip())

                  # جلب الفيديو واستخراج الصور
                  video_file = download_source_video(title)
                  source_frames = extract_frames(video_file, duration, 24)

                  if not os.path.exists("font.ttf"):
                      with open("font.ttf", "wb") as f: f.write(requests.get(FONT_URL).content)
                  
                  fps, size = 24, (1280, 720)
                  out = cv2.VideoWriter(video_p, cv2.VideoWriter_fourcc(*'mp4v'), fps, size)
                  font_main = ImageFont.truetype("font.ttf", 50) # اسم المسلسل
                  font_sub = ImageFont.truetype("font.ttf", 60) # الموقع

                  clean_title = fix_arabic(title)
                  num_source_frames = len(source_frames)

                  for frame_num in range(int(duration * fps)):
                      # تغيير الصورة كل 2 ثانية (48 إطار)
                      img_idx = (frame_num // 48) % num_source_frames
                      img = source_frames[img_idx].copy()
                      
                      pil_img = Image.fromarray(cv2.cvtColor(img, cv2.COLOR_BGR2RGB))
                      draw = ImageDraw.Draw(pil_img)
                      
                      # 1. اسم المسلسل (أعلى اليسار)
                      draw.text((40, 40), clean_title, font=font_main, fill=(255, 255, 255), stroke_width=2, stroke_fill=(0,0,0))
                      
                      # 2. الموقع (المنتصف مكان الترجمة - أسفل)
                      w2, h2 = draw.textbbox((0, 0), URL_TEXT, font=font_sub)[2:]
                      draw.text(((1280-w2)/2, 620), URL_TEXT, font=font_sub, fill=(255, 237, 0), stroke_width=2, stroke_fill=(0,0,0))
                      
                      out.write(cv2.cvtColor(np.array(pil_img), cv2.COLOR_RGB2BGR))
                  
                  out.release()

                  os.system(f"ffmpeg -i {video_p} -i {audio_p} -c:v libx264 -c:a aac -shortest {final_p} -y -loglevel quiet")
                  upload_to_youtube(final_p, title)
                  
              except Exception as e:
                  log(f"❌ فشل إنشاء الفيديو: {e}")
              finally:
                  for f in [audio_p, video_p, final_p, 'source_video.mp4']: 
                      if os.path.exists(f): os.remove(f)

          async def main():
              log("🚀 بدأت الجلسة - جاري البحث...")
              pytrends = TrendReq(hl='ar', tz=0)
              excluded_words = ["ديزني", "افلام", "فيلم", "فلم","هندى", "هندي", "صينى", "صيني","تركى", "تركي", "الحلقه", "الحلقة",  "كوري", "الذئاب", "باكستاني", "افلام", "حلقه", "حلقة","ديزنى"]
              
              try:
                  pytrends.build_payload(["مدبلج"], timeframe='now 4-H', gprop='youtube')
                  results = pytrends.related_queries()
                  used = []
                  if os.path.exists(HISTORY_FILE):
                      with open(HISTORY_FILE, "r", encoding="utf-8") as f: used = f.read().splitlines()
                  
                  if 'مدبلج' in results and results['مدبلج']['top'] is not None:
                      df_top = results['مدبلج']['top']
                      new_titles = [w for w in df_top['query'].tolist() if "مدبلج" in w and len(w) >= 20 and w not in used and not any(word in w for word in excluded_words)]
                      
                      if new_titles:
                          q = new_titles[0]
                          log(f"✅ تريند جديد: {q}")
                          await create_video(q, int(time.time()))
                          with open(HISTORY_FILE, "a", encoding="utf-8") as f: f.write(q + "\n")
                          
                          log("⏳ تم الرفع. انتظار 1 دقيقة داخل السكربت...")
                          await asyncio.sleep(60)
                      else:
                          log("⚠️ لا توجد تريندات جديدة.")
                  else:
                      log("⚠️ لا توجد بيانات بحثية.")
              except Exception as e:
                  log(f"⚠️ خطأ: {e}")

          if __name__ == "__main__":
              asyncio.run(main())

      - name: Save Progress
        if: always()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add history.txt || echo "No history"
          git commit -m "Update history [skip ci]" || echo "No changes"
          git push || echo "Push failed"

      - name: ⏳ Final Wait & Trigger
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "الانتظار قبل إطلاق الجلسة الجديدة..."
          sleep 7000
          gh workflow run "Continuous Video Generator" --repo ${{ github.repository }}
