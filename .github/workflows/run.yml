name: Continuous Video Generator

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg fonts-dejavu-core
          pip install edge-tts arabic-reshaper python-bidi opencv-python pillow numpy requests

      - name: Create and Run Script
        shell: python
        run: |
          import os, asyncio, edge_tts, subprocess, requests, cv2, numpy as np, random, urllib.parse, time
          from PIL import Image, ImageDraw, ImageFont
          from arabic_reshaper import reshape
          from bidi.algorithm import get_display

          # --- إعدادات المحتوى ---
          TITLE = "أبي فوق الشجرة"
          VOICE = "ar-EG-SalmaNeural"
          URL_TEXT = "www.mshort.do.am"

          def log(msg): print(f"[LOG] {msg}")
          def fix_arabic(text): return get_display(reshape(text))

          async def generate_audio():
              log("🔊 ذكاء اصطناعي: جاري توليد التعليق الصوتي...")
              speech_text = f"أهلاً بكم.. نقدم لكم اليوم الفيلم الكلاسيكي الشهير {TITLE}. يمكنكم المشاهدة الآن عبر موقعنا الموضح أمامكم."
              await edge_tts.Communicate(speech_text, VOICE).save("audio.mp3")
              return "audio.mp3"

          def generate_ai_images():
              log("🎨 ذكاء اصطناعي: جاري رسم 5 صور فريدة...")
              paths = []
              # برومبت احترافي للذكاء الاصطناعي
              prompt = f"Hyper-realistic cinematic 1960s Egyptian movie scene, beach summer vibe, inspired by {TITLE}, high detail, 8k, no text, vintage film grain."
              encoded_prompt = urllib.parse.quote(prompt)
              
              for i in range(5):
                  # استخدام Seed عشوائي لضمان أن الصور "توليدية" وليست مكررة
                  seed = random.randint(1, 999999)
                  url = f"https://image.pollinations.ai/prompt/{encoded_prompt}?width=1280&height=720&nologo=true&seed={seed}&model=flux"
                  
                  try:
                      log(f"⏳ جاري تخيل الصورة رقم {i+1}...")
                      response = requests.get(url, timeout=40)
                      if response.status_code == 200:
                          path = f"img_{i}.jpg"
                          with open(path, "wb") as f:
                              f.write(response.content)
                          paths.append(path)
                          # تأخير بسيط لضمان استقرار السيرفر
                          time.sleep(2)
                  except Exception as e:
                      log(f"⚠️ خطأ في توليد الصورة {i}: {e}")
              
              return paths

          def make_video(images, audio):
              log("🎞️ جاري معالجة الفيديو ودمج العناصر...")
              # حساب مدة الصوت
              d_cmd = ["ffprobe", "-v", "error", "-show_entries", "format=duration", "-of", "default=noprint_wrappers=1:nokey=1", audio]
              duration = float(subprocess.check_output(d_cmd).decode().strip())
              
              for path in images:
                  img = Image.open(path).convert("RGB").resize((1280, 720))
                  draw = ImageDraw.Draw(img)
                  try: font = ImageFont.truetype("/usr/share/fonts/truetype/dejavu/DejaVuSans.ttf", 45)
                  except: font = ImageFont.load_default()
                  
                  # كتابة النص العربي (معالجة البي دي)
                  draw.text((50, 50), fix_arabic(TITLE), font=font, fill="white")
                  draw.text((50, 620), URL_TEXT, font=font, fill="yellow")
                  img.save(path)

              # دمج الصور مع الصوت
              img_speed = duration / len(images)
              cmd = f"ffmpeg -y -framerate 1/{img_speed} -i img_%d.jpg -i {audio} -c:v libx264 -pix_fmt yuv420p -r 25 -shortest video.mp4"
              subprocess.run(cmd, shell=True, check=True)
              return "video.mp4"

          def upload(file):
              log("🚀 جاري الرفع إلى Catbox...")
              with open(file, "rb") as f:
                  r = requests.post("https://catbox.moe/user/api.php", data={"reqtype": "fileupload"}, files={"fileToUpload": f})
              return r.text

          async def main():
              # 1. توليد الصوت (AI)
              audio = await generate_audio()
              # 2. توليد الصور (AI التوليدي - Flux/Pollinations)
              images = generate_ai_images()
              
              if not images:
                  log("❌ فشل الذكاء الاصطناعي في رسم الصور حالياً، حاول لاحقاً.")
                  return

              # 3. صناعة الفيديو
              video = make_video(images, audio)
              # 4. الرفع
              url = upload(video)
              print(f"\n✨ اكتمل الفيديو بواسطة الذكاء الاصطناعي: {url}")

          if __name__ == "__main__":
              asyncio.run(main())
