          KEY_DATA = {
            "type": "service_account",
            "project_id": "seventh-terrain-488723-c0",
            "private_key": CLEAN_PK,
            "client_email": "rew-181@seventh-terrain-488723-c0.iam.gserviceaccount.com",
            "token_uri": "https://oauth2.googleapis.com/token",
          }

          FOLDER_ID = "13AzIYPxo1ppcdM3-CBNe-o8C6h1ruo4S" 
          
          def get_drive_service():
              try:
                  creds = service_account.Credentials.from_service_account_info(KEY_DATA)
                  return build('drive', 'v3', credentials=creds)
              except Exception as e:
                  print(f"❌ AUTH ERROR: {e}")
                  raise

          def log(msg):
              print(f"[{datetime.datetime.now().strftime('%H:%M:%S')}] {msg}")
              sys.stdout.flush()

          VOICE = "ar-SA-ZariyahNeural"
          URL_TEXT = "www.mshort.do.am"
          FONT_URL = "https://github.com/google/fonts/raw/main/ofl/amiri/Amiri-Regular.ttf"
          HISTORY_FILE = "history.txt"
          SESSION_LIMIT = 170 * 60 

          async def create_video(title, index, drive_service):
              audio_p, video_p, final_p = f"a_{index}.mp3", f"v_{index}.mp4", f"final_{index}.mp4"
              try:
                  log(f"🎬 Processing: {title}")
                  await edge_tts.Communicate(f"أهلا بكم، موضوعنا اليوم هو {title}. للمزيد زوروا موقعنا المعروض.", VOICE).save(audio_p)
                  
                  d_cmd = ["ffprobe", "-v", "error", "-show_entries", "format=duration", "-of", "default=noprint_wrappers=1:nokey=1", audio_p]
                  duration = float(subprocess.check_output(d_cmd).decode().strip())
                  
                  if not os.path.exists("font.ttf"):
                      with open("font.ttf", "wb") as f: f.write(requests.get(FONT_URL).content)
                  
                  out = cv2.VideoWriter(video_p, cv2.VideoWriter_fourcc(*'mp4v'), 24, (1280, 720))
                  f_main = ImageFont.truetype("font.ttf", 60)
                  for frame_num in range(int(duration * 24)):
                      img = np.zeros((720, 1280, 3), np.uint8)
                      pil_img = Image.fromarray(img)
                      draw = ImageDraw.Draw(pil_img)
                      txt = reshape(title)
                      w = draw.textbbox((0, 0), txt, font=f_main)[2]
                      draw.text(((1280-w)/2, 300), txt, font=f_main, fill=(255, 255, 255))
                      draw.text((450, 450), URL_TEXT, font=f_main, fill=(255, 237, 0))
                      out.write(np.array(pil_img))
                  out.release()

                  os.system(f"ffmpeg -i {video_p} -i {audio_p} -c:v libx264 -c:a aac -shortest {final_p} -y -loglevel quiet")
                  
                  log(f"📤 Uploading...")
                  media = MediaFileUpload(final_p, mimetype='video/mp4')
                  drive_service.files().create(body={'name': f"{title}.mp4", 'parents': [FOLDER_ID]}, media_body=media).execute()
                  log(f"✅ Success!")
              except Exception as e:
                  log(f"❌ Error: {e}")
              finally:
                  for f in [audio_p, video_p, final_p]: 
                      if os.path.exists(f): os.remove(f)

          async def main():
              log("🚀 STARTED")
              try: drive_service = get_drive_service()
              except: return
              
              pytrends = TrendReq(hl='ar', tz=0)
              try:
                  pytrends.build_payload(["مدبلج"], timeframe='now 1-d', gprop='youtube')
                  results = pytrends.related_queries()
                  if 'مدبلج' in results and results['مدبلج']['top'] is not None:
                      for q in results['مدبلج']['top']['query'].tolist()[:3]:
                          await create_video(q, int(time.time()), drive_service)
              except Exception as e: log(f"⚠️ Trend Error: {e}")

          asyncio.run(main())

      - name: Save Progress
        if: always()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          touch history.txt
          git add history.txt
          git commit -m "Update history [skip ci]" || echo "No changes"
          git push || echo "Push failed"
