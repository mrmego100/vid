name: Continuous Video Generator

on:
  schedule:
    - cron: "*/60 * * * *" # كاحتياط فقط
  workflow_dispatch:

concurrency:
  group: video-generator-group
  cancel-in-progress: false 

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: 🧹 Delete Old Workflow Runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 2

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg nodejs git
          pip install edge-tts arabic-reshaper python-bidi pytrends opencv-python pillow numpy requests nest_asyncio
          pip install -U git+https://github.com/yt-dlp/yt-dlp.git@master
          pip install google-api-python-client google-auth-httplib2 google-auth-oauthlib

      - name: Create and Run Script
        shell: python
        env:
          YOUTUBE_CREDENTIALS: ${{ secrets.YOUTUBE_CREDENTIALS }}
        run: |
          import datetime, asyncio, edge_tts, requests, os, cv2, subprocess, time, numpy as np, sys, nest_asyncio, json, random
          from PIL import Image, ImageDraw, ImageFont
          from arabic_reshaper import reshape
          from bidi.algorithm import get_display
          from pytrends.request import TrendReq
          from google.oauth2.credentials import Credentials
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaFileUpload
          from yt_dlp import YoutubeDL

          nest_asyncio.apply()

          def log(msg):
              print(f"[{datetime.datetime.now().strftime('%H:%M:%S')}] {msg}")
              sys.stdout.flush()

          VOICE = "ar-SA-ZariyahNeural"
          URL_TEXT = "www.mshort.do.am"
          FONT_URL = "https://github.com/google/fonts/raw/main/ofl/amiri/Amiri-Regular.ttf"
          HISTORY_FILE = "history.txt"
          INPUT_VIDEO = "downloaded_video.mp4"
          RAW_DIR = "raw_frames"
          PROCESSED_DIR = "processed_frames"
          TARGET_FPS = 10

          now = datetime.datetime.now()
          current_time_str = now.strftime("%I:%M %p")
          current_date_str = now.strftime("%Y-%m-%d")

          PRE_TEXT = "أهلا بكل متابعينا. موضوع الفيديو اليوم عن المسلسل الشهير وهو"
          POST_TEXT = f""" . إذا رغبت في مشاهدة المسلسل كامل ومدبلج. فابقَ معنا حتى نهاية الفيديو.  
          لأوفر لك رابط قناة التيلجرام التي تحتوى على جميع أجزاء المسلسل كاملة.  
          أو قم بالدخول على الموقع المعروض أمامك باللون الأصفر.  
          تسجيلنا الحالي في تمام الساعة {current_time_str} بتاريخ {current_date_str}.  
          آراكم في فيديو آخر."""

          def fix_arabic(text):
              reshaped_text = reshape(text)
              return get_display(reshaped_text)

          def upload_to_youtube(video_path, title):
              creds_json = os.environ.get('YOUTUBE_CREDENTIALS')
              if not creds_json:
                  log("❌ فشل الرفع: سر 'YOUTUBE_CREDENTIALS' غير موجود.")
                  return False
              try:
                  creds_dict = json.loads(creds_json)
                  credentials = Credentials.from_authorized_user_info(creds_dict)
                  youtube = build('youtube', 'v3', credentials=credentials)
                  body = {
                      "snippet": {
                          "title": f"{title} | مسلسل مدبلج",
                          "description": f"شاهد مسلسل {title} كامل مدبلج.\nللمزيد زوروا موقعنا: {URL_TEXT}",
                          "tags": ["مسلسل", "مدبلج", title],
                          "categoryId": "24" 
                      },
                      "status": { "privacyStatus": "public" }
                  }
                  media = MediaFileUpload(video_path, chunksize=-1, resumable=True)
                  log("⏳ جاري الرفع إلى يوتيوب...")
                  request = youtube.videos().insert(part="snippet,status", body=body, media_body=media)
                  response = request.execute()
                  log(f"✅ تم الرفع بنجاح! رابط الفيديو: https://www.youtube.com/watch?v={response['id']}")
                  return True
              except Exception as e:
                  log(f"❌ خطأ أثناء الرفع ليوتيوب: {e}")
                  return False

          def upload_to_catbox(file_path):
              log("🚀 جاري الرفع إلى Catbox...")
              if not os.path.exists(file_path) or os.path.getsize(file_path) == 0:
                  return "خطأ: فشل في إنشاء ملف الفيديو"
              with open(file_path, "rb") as f:
                  data = {"reqtype": "fileupload"}
                  files = {"fileToUpload": f}
                  response = requests.post("https://catbox.moe/user/api.php", data=data, files=files)
                  return response.text.strip()

          async def create_video(title, index):
              audio_p, final_p = f"a_{index}.mp3", f"final_{index}.mp4"
              try:
                  log(f"🎬 معالجة: {title}")
                  full_speech = f"{PRE_TEXT} {title} {POST_TEXT}"
                  await edge_tts.Communicate(full_speech, VOICE).save(audio_p)
                  
                  d_cmd = ["ffprobe", "-v", "error", "-show_entries", "format=duration", "-of", "default=noprint_wrappers=1:nokey=1", audio_p]
                  duration = float(subprocess.check_output(d_cmd).decode().strip())
                  
                  # --- 2. تحميل الفيديو من يوتيوب ---
                  log("🚀 جاري تحميل الفيديو...")
                  
                  ydl_opts = {
                      'format': 'best[height<=720][ext=mp4]',
                      'outtmpl': INPUT_VIDEO,
                      'quiet': True,
                      'no_warnings': True,
                      'default_search': 'ytsearch1',
                      'geo_bypass': True,
                      'extractor_args': {'youtube': ['player_client=ios,android,web']}
                  }

                  with YoutubeDL(ydl_opts) as ydl:
                      ydl.download([title])

                  # --- 3. تقطيع الفيديو وحفظ الإطارات مع حذف صورة كل 5 صور ---
                  log(f"📸 جاري التقطيع (تخطي صورة كل 5 صور)...")
                  if not os.path.exists(RAW_DIR):
                      os.makedirs(RAW_DIR)
                  else:
                      for f in os.listdir(RAW_DIR): os.remove(os.path.join(RAW_DIR, f))

                  vidcap = cv2.VideoCapture(INPUT_VIDEO)
                  fps_orig = vidcap.get(cv2.CAP_PROP_FPS)
                  if fps_orig == 0: fps_orig = 30 
                  hop = max(1, round(fps_orig / TARGET_FPS))

                  count = 0
                  saved_count = 0
                  extracted_count = 0 # عداد الصور المستخرجة فعلياً من الفيديو الأصلي
                  success, image = vidcap.read()

                  while success:
                      if count % hop == 0:
                          # منطق الحذف: إذا كان رقم الصورة المستخرجة يقبل القسمة على 5، لا نحفظها
                          extracted_count += 1
                          if extracted_count % 5 != 0:
                              cv2.imwrite(f"{RAW_DIR}/f_{saved_count:05d}.jpg", image, [cv2.IMWRITE_JPEG_QUALITY, 85])
                              saved_count += 1
                              
                      success, image = vidcap.read()
                      count += 1
                  vidcap.release()
                  log(f"✅ تم استخراج وحفظ {saved_count} صورة (تم حذف {extracted_count // 5} صور بنجاح).")

                  # --- تجهيز الإطارات لتتوافق مع طول الصوت (صورة تتغير كل 3 ثواني) ---
                  raw_images = [os.path.join(RAW_DIR, f) for f in sorted(os.listdir(RAW_DIR)) if f.endswith(".jpg")]
                  
                  if not os.path.exists(PROCESSED_DIR):
                      os.makedirs(PROCESSED_DIR)
                  else:
                      for f in os.listdir(PROCESSED_DIR): os.remove(os.path.join(PROCESSED_DIR, f))

                  if not os.path.exists("font.ttf"):
                      with open("font.ttf", "wb") as f: f.write(requests.get(FONT_URL).content)
                  
                  font_main = ImageFont.truetype("font.ttf", 45) # اسم المسلسل 
                  font_sub = ImageFont.truetype("font.ttf", 60) # الموقع
                  font_timer = ImageFont.truetype("font.ttf", 30)

                  num_total_frames = int(duration * TARGET_FPS)
                  
                  for frame_num in range(num_total_frames):
                      if raw_images:
                          img_idx = (frame_num // (TARGET_FPS * 3)) % len(raw_images)
                          img = cv2.imread(raw_images[img_idx])
                          img = cv2.resize(img, (1280, 720))
                          img = cv2.cvtColor(img, cv2.COLOR_BGR2RGB)
                          img = cv2.addWeighted(img, 0.6, np.zeros(img.shape, img.dtype), 0, 0)
                      else:
                          img = np.zeros((720, 1280, 3), np.uint8)

                      pil_img = Image.fromarray(img)
                      draw = ImageDraw.Draw(pil_img)
                      
                      clean_title = fix_arabic(title)
                      clean_url = URL_TEXT
                      
                      # 1. اسم المسلسل أعلى اليسار
                      draw.text((30, 30), clean_title, font=font_main, fill=(255, 255, 255))
                      
                      # 2. الموقع في المنتصف
                      w2, h2 = draw.textbbox((0, 0), clean_url, font=font_sub)[2:]
                      draw.text(((1280-w2)/2, 600), clean_url, font=font_sub, fill=(255, 237, 0))
                      
                      # 3. العداد الصغير أسفل الموقع
                      rem = max(0, int(duration) - (frame_num // TARGET_FPS))
                      timer_txt = f"00:{rem:02d}"
                      w3, h3 = draw.textbbox((0, 0), timer_txt, font=font_timer)[2:]
                      draw.text(((1280-w3)/2, 670), timer_txt, font=font_timer, fill=(0, 255, 0))

                      cv2.imwrite(f"{PROCESSED_DIR}/f_{frame_num:05d}.jpg", cv2.cvtColor(np.array(pil_img), cv2.COLOR_RGB2BGR), [cv2.IMWRITE_JPEG_QUALITY, 85])

                  # --- 4. إنشاء الفيديو باستخدام FFmpeg ---
                  log(f"🎞️ جاري رندر الفيديو بسرعة {TARGET_FPS} إطار/ثانية...")
                  cmd = (
                      f"ffmpeg -y -r {TARGET_FPS} -i {PROCESSED_DIR}/f_%05d.jpg -i {audio_p} "
                      f"-c:v libx264 -pix_fmt yuv420p -crf 23 -c:a aac -shortest {final_p}"
                  )
                  subprocess.run(cmd, shell=True, stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)
                  
                  # --- 5. الرفع الفوري إلى Catbox (أولاً) ---
                  try:
                      url = upload_to_catbox(final_p)
                      if "http" in url:
                          log(f"✅ تم الرفع لـ Catbox بنجاح!")
                          log(f"🔗 الرابط: {url}")
                      else:
                          log(f"❌ خطأ من Catbox: {url}")
                  except Exception as e:
                      log(f"❌ حدث خطأ أثناء الرفع لـ Catbox: {e}")

                  # --- 6. الرفع إلى YouTube (ثانياً) ---
                  upload_to_youtube(final_p, title)

              except Exception as e:
                  log(f"❌ فشل إنشاء الفيديو: {e}")
              finally:
                  for f in [audio_p, INPUT_VIDEO, final_p]: 
                      if os.path.exists(f): os.remove(f)

          async def main():
              log("🚀 بدأت الجلسة - جاري البحث...")
              pytrends = TrendReq(hl='ar', tz=0)
              excluded_words = ["ديزني", "افلام", "فيلم", "فلم","هندى", "هندي", "صينى", "صيني","تركى", "تركي", "الحلقه", "الحلقة",  "كوري", "الذئاب", "باكستاني", "افلام", "حلقه", "حلقة","ديزنى"]
              
              try:
                  pytrends.build_payload(["مدبلج"], timeframe='now 4-H', gprop='youtube')
                  results = pytrends.related_queries()
                  used = []
                  if os.path.exists(HISTORY_FILE):
                      with open(HISTORY_FILE, "r", encoding="utf-8") as f: used = f.read().splitlines()
                  
                  if 'مدبلج' in results and results['مدبلج']['top'] is not None:
                      df_top = results['مدبلج']['top']
                      new_titles = [w for w in df_top['query'].tolist() if "مدبلج" in w and len(w) >= 15 and w not in used and not any(word in w for word in excluded_words)]
                      
                      if new_titles:
                          q = new_titles[0]
                          log(f"✅ تريند جديد: {q}")
                          await create_video(q, int(time.time()))
                          with open(HISTORY_FILE, "a", encoding="utf-8") as f: f.write(q + "\n")
                          
                          log("⏳ تم الرفع. انتظار...")
                          await asyncio.sleep(60)
                      else:
                          log("⚠️ لا توجد تريندات جديدة.")
                  else:
                      log("⚠️ لا توجد بيانات بحثية.")
              except Exception as e:
                  log(f"⚠️ خطأ: {e}")

          if __name__ == "__main__":
              asyncio.run(main())

      - name: Save Progress
        if: always()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add history.txt || echo "No history"
          git commit -m "Update history [skip ci]" || echo "No changes"
          git push || echo "Push failed"

      - name: ⏳ Final Wait & Trigger
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "الانتظار قبل إطلاق الجلسة الجديدة..."
          sleep 7000
          gh workflow run "Continuous Video Generator" --repo ${{ github.repository }}
