name: Continuous Video Generator

on:
  schedule:
    - cron: "0 */3 * * *" 
  workflow_dispatch:      

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          pip install edge-tts arabic-reshaper pytrends opencv-python pillow numpy requests nest_asyncio google-api-python-client google-auth-httplib2 google-auth-oauthlib

      - name: Create and Run Script
        shell: python
        env:
          GDRIVE_JSON_B64: ${{ secrets.GDRIVE_JSON }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          import datetime, asyncio, edge_tts, requests, os, cv2, subprocess, time, numpy as np, sys, nest_asyncio, json, base64
          from PIL import Image, ImageDraw, ImageFont
          from arabic_reshaper import reshape
          from pytrends.request import TrendReq
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaFileUpload
          from google.oauth2 import service_account

          nest_asyncio.apply()

          FOLDER_ID = "13AzIYPxo1ppcdM3-CBNe-o8C6h1ruo4S" 
          
          def get_drive_service():
              try:
                  # فك التشفير الصارم
                  b64_str = os.environ.get('GDRIVE_JSON_B64', '').strip()
                  decoded_data = base64.b64decode(b64_str).decode('utf-8')
                  info = json.loads(decoded_data)
                  
                  if 'private_key' in info:
                      # تنظيف المفتاح من أي تلاعب في GitHub
                      pk = info['private_key']
                      # استبدال أي شكل من أشكال السطور المائلة المشوهة بسطر جديد حقيقي
                      pk = pk.replace('\\n', '\n').replace('\\\\n', '\n')
                      info['private_key'] = pk.strip() + '\n'
                  
                  creds = service_account.Credentials.from_service_account_info(info)
                  return build('drive', 'v3', credentials=creds)
              except Exception as e:
                  print(f"❌ AUTH FAILED: {e}")
                  raise

          def log(msg):
              print(f"[{datetime.datetime.now().strftime('%H:%M:%S')}] {msg}")
              sys.stdout.flush()

          VOICE = "ar-SA-ZariyahNeural"
          URL_TEXT = "www.mshort.do.am"
          FONT_URL = "https://github.com/google/fonts/raw/main/ofl/amiri/Amiri-Regular.ttf"
          HISTORY_FILE = "history.txt"
          SESSION_LIMIT = 170 * 60 

          now = datetime.datetime.now()
          current_time_str = now.strftime("%I:%M %p")
          current_date_str = now.strftime("%Y-%m-%d")

          PRE_TEXT = "أهلا بكل متابعينا. موضوع الفيديو اليوم عن المسلسل الشهير وهو"
          POST_TEXT = f" . إذا رغبت في مشاهدة المسلسل كامل ومدبلج. فابقَ معنا حتى نهاية الفيديو. لأوفر لك رابط قناة التيلجرام التي تحتوى على جميع أجزاء المسلسل كاملة. أو قم بالدخول على الموقع المعروض أمامك باللون الأزرق. تسجيلنا الحالي في تمام الساعة {current_time_str} بتاريخ {current_date_str}. آراكم في فيديو آخر."

          async def create_video(title, index, drive_service):
              audio_p, video_p, final_p = f"a_{index}.mp3", f"v_{index}.mp4", f"final_{index}.mp4"
              try:
                  log(f"🎬 Processing: {title}")
                  await edge_tts.Communicate(f"{PRE_TEXT} {title} {POST_TEXT}", VOICE).save(audio_p)
                  
                  # الأمر المصحح لـ ffprobe
                  d_cmd = ["ffprobe", "-v", "error", "-show_entries", "format=duration", "-of", "default=noprint_wrappers=1:nokey=1", audio_p]
                  duration = float(subprocess.check_output(d_cmd).decode().strip())
                  
                  if not os.path.exists("font.ttf"):
                      with open("font.ttf", "wb") as f: f.write(requests.get(FONT_URL).content)
                  
                  out = cv2.VideoWriter(video_p, cv2.VideoWriter_fourcc(*'mp4v'), 24, (1280, 720))
                  f_main = ImageFont.truetype("font.ttf", 60)
                  
                  for frame_num in range(int(duration * 24)):
                      img = np.zeros((720, 1280, 3), np.uint8)
                      pil_img = Image.fromarray(img)
                      draw = ImageDraw.Draw(pil_img)
                      txt = reshape(title)
                      rem = max(0, int(duration) - (frame_num // 24))
                      
                      w = draw.textbbox((0, 0), txt, font=f_main)[2]
                      draw.text(((1280-w)/2, 300), txt, font=f_main, fill=(255, 255, 255))
                      draw.text((450, 450), URL_TEXT, font=f_main, fill=(255, 237, 0))
                      draw.text((600, 550), f"00:{rem:02d}", font=f_main, fill=(0, 255, 0))
                      out.write(np.array(pil_img))
                  out.release()

                  os.system(f"ffmpeg -i {video_p} -i {audio_p} -c:v libx264 -c:a aac -shortest {final_p} -y -loglevel quiet")
                  
                  log(f"📤 Uploading: {title}...")
                  media = MediaFileUpload(final_p, mimetype='video/mp4')
                  drive_service.files().create(body={'name': f"{title}.mp4", 'parents': [FOLDER_ID]}, media_body=media).execute()
                  log(f"✅ DONE UPLOADING!")
                  
              except Exception as e:
                  log(f"❌ Error: {e}")
              finally:
                  for f in [audio_p, video_p, final_p]: 
                      if os.path.exists(f): os.remove(f)

          async def main():
              start_time = time.time()
              log("🚀 STARTED")
              try:
                  drive_service = get_drive_service()
              except: return

              pytrends = TrendReq(hl='ar', tz=0)
              while (time.time() - start_time) < SESSION_LIMIT:
                  try:
                      pytrends.build_payload(["مدبلج"], timeframe='now 1-d', gprop='youtube')
                      results = pytrends.related_queries()
                      if 'مدبلج' in results and results['مدبلج']['top'] is not None:
                          for q in results['مدبلج']['top']['query'].tolist()[:3]:
                              await create_video(q, int(time.time()), drive_service)
                      await asyncio.sleep(300)
                  except Exception as e:
                      log(f"⚠️ Trend Error: {e}")
                      await asyncio.sleep(60)

          asyncio.run(main())

      - name: Save Progress
        if: always()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add history.txt || echo "No history"
          git commit -m "Update history [skip ci]" || echo "No changes"
          git push || echo "Push failed"
