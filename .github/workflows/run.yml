name: Continuous Video Generator

on:
  schedule:
    - cron: "*/60 * * * *" 
  workflow_dispatch:

concurrency:
  group: video-generator-group
  cancel-in-progress: false 

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: 🧹 Delete Old Workflow Runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 2

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          pip install --upgrade pip
          pip install edge-tts arabic-reshaper python-bidi pytrends opencv-python pillow numpy requests nest_asyncio yt-dlp google-api-python-client

      - name: Create and Run Script
        shell: python
        env:
          YOUTUBE_CREDENTIALS: ${{ secrets.YOUTUBE_CREDENTIALS }}
        run: |
          import datetime, asyncio, edge_tts, requests, os, cv2, subprocess, time, numpy as np, sys, nest_asyncio, json
          from PIL import Image, ImageDraw, ImageFont
          from arabic_reshaper import reshape
          from bidi.algorithm import get_display
          from pytrends.request import TrendReq
          from google.oauth2.credentials import Credentials
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaFileUpload

          nest_asyncio.apply()

          def log(msg):
              print(f"[{datetime.datetime.now().strftime('%H:%M:%S')}] {msg}")
              sys.stdout.flush()

          VOICE = "ar-SA-ZariyahNeural"
          URL_TEXT = "www.mshort.do.am"
          FONT_URL = "https://github.com/google/fonts/raw/main/ofl/amiri/Amiri-Regular.ttf"
          HISTORY_FILE = "history.txt"

          now = datetime.datetime.now()
          current_time_str = now.strftime("%I:%M %p")
          current_date_str = now.strftime("%Y-%m-%d")

          PRE_TEXT = "أهلا بكل متابعينا. موضوع الفيديو اليوم عن المسلسل الشهير وهو"
          POST_TEXT = f""" . إذا رغبت في مشاهدة المسلسل كامل ومدبلج. فابقَ معنا حتى نهاية الفيديو.  
          لأوفر لك رابط قناة التيلجرام التي تحتوى على جميع أجزاء المسلسل كاملة.  
          أو قم بالدخول على الموقع المعروض أمامك باللون الأصفر.  
          تسجيلنا الحالي في تمام الساعة {current_time_str} بتاريخ {current_date_str}.  
          آراكم في فيديو آخر."""

          def fix_arabic(text):
              return get_display(reshape(text))

          def download_frames(query, duration):
              output_dir = "frames"
              if not os.path.exists(output_dir): os.makedirs(output_dir)
              for f in os.listdir(output_dir): os.remove(os.path.join(output_dir, f))
              
              log(f"🔍 البحث عن فيديو لـ: {query}")
              try:
                  # محاولة جلب فيديو باستخدام yt-dlp مع تخطي حظر البوتات
                  cmd_url = ["yt-dlp", f"ytsearch1:{query} مسلسل مدبلج", "--get-id", "--no-check-certificates"]
                  v_id = subprocess.check_output(cmd_url).decode().strip()
                  v_url = f"https://www.youtube.com/watch?v={v_id}"
                  
                  stream_cmd = ["yt-dlp", "-g", "-f", "best[height<=720]", v_url]
                  stream_url = subprocess.check_output(stream_cmd).decode().strip().split('\n')[0]
                  
                  num_frames = int(duration / 3) + 2
                  log(f"📸 استخراج {num_frames} صورة من البث...")
                  ffmpeg_cmd = [
                      "ffmpeg", "-ss", "15", "-i", stream_url, "-vf", 
                      "fps=1/3,scale=1280:720:force_original_aspect_ratio=decrease,pad=1280:720:(ow-iw)/2:(oh-ih)/2", 
                      "-vframes", str(num_frames), f"{output_dir}/frame_%03d.jpg", "-y", "-loglevel", "quiet"
                  ]
                  subprocess.run(ffmpeg_cmd)
                  return [os.path.join(output_dir, f) for f in os.listdir(output_dir) if f.endswith(".jpg")]
              except Exception as e:
                  log(f"⚠️ فشل جلب الفيديو أو الصور: {e}")
                  return []

          def upload_to_youtube(video_path, title):
              creds_json = os.environ.get('YOUTUBE_CREDENTIALS')
              if not creds_json: return False
              try:
                  creds_dict = json.loads(creds_json)
                  credentials = Credentials.from_authorized_user_info(creds_dict)
                  youtube = build('youtube', 'v3', credentials=credentials)
                  body = {
                      "snippet": {
                          "title": f"{title} | مسلسل مدبلج حصري",
                          "description": f"شاهد مسلسل {title} كامل مدبلج.\nالموقع: {URL_TEXT}",
                          "tags": ["مسلسلات", "مدبلج", title],
                          "categoryId": "24" 
                      },
                      "status": { "privacyStatus": "public" }
                  }
                  media = MediaFileUpload(video_path, chunksize=-1, resumable=True)
                  log("⏳ جاري الرفع...")
                  youtube.videos().insert(part="snippet,status", body=body, media_body=media).execute()
                  log("✅ تم الرفع بنجاح!")
                  return True
              except Exception as e:
                  log(f"❌ خطأ الرفع: {e}")
                  return False

          async def create_video(title, index):
              audio_p, video_p, final_p = f"a_{index}.mp3", f"v_{index}.mp4", f"final_{index}.mp4"
              try:
                  log(f"🎬 معالجة: {title}")
                  await edge_tts.Communicate(f"{PRE_TEXT} {title} {POST_TEXT}", VOICE).save(audio_p)
                  
                  d_cmd = ["ffprobe", "-v", "error", "-show_entries", "format=duration", "-of", "default=noprint_wrappers=1:nokey=1", audio_p]
                  duration = float(subprocess.check_output(d_cmd).decode().strip())
                  
                  image_files = download_frames(title, duration)

                  # --- الشرط الصارم الذي طلبته ---
                  if not image_files:
                      log("🛑 إلغاء العملية: لم يتم العثور على أي صور. لن يتم إنشاء الفيديو أو رفعه.")
                      return False

                  if not os.path.exists("font.ttf"):
                      with open("font.ttf", "wb") as f: f.write(requests.get(FONT_URL).content)
                  
                  fps, size = 24, (1280, 720)
                  out = cv2.VideoWriter(video_p, cv2.VideoWriter_fourcc(*'mp4v'), fps, size)
                  f_main = ImageFont.truetype("font.ttf", 45) 
                  f_sub = ImageFont.truetype("font.ttf", 65) 

                  for frame_num in range(int(duration * fps)):
                      img_idx = (frame_num // (fps * 3)) % len(image_files)
                      img = cv2.imread(image_files[img_idx])
                      img = cv2.addWeighted(cv2.cvtColor(img, cv2.COLOR_BGR2RGB), 0.6, np.zeros(img.shape, img.dtype), 0, 0)

                      pil_img = Image.fromarray(img)
                      draw = ImageDraw.Draw(pil_img)
                      draw.text((30, 30), fix_arabic(title), font=f_main, fill=(255, 255, 255))
                      w_s = draw.textbbox((0, 0), URL_TEXT, font=f_sub)[2]
                      draw.text(((1280-w_s)/2, 600), URL_TEXT, font=f_sub, fill=(255, 237, 0))
                      out.write(cv2.cvtColor(np.array(pil_img), cv2.COLOR_RGB2BGR))
                  
                  out.release()
                  os.system(f"ffmpeg -i {video_p} -i {audio_p} -c:v libx264 -c:a aac -shortest {final_p} -y -loglevel quiet")
                  return upload_to_youtube(final_p, title)
              except Exception as e: 
                  log(f"❌ خطأ فني: {e}")
                  return False
              finally:
                  for f in [audio_p, video_p, final_p]: 
                      if os.path.exists(f): os.remove(f)

          async def main():
              log("🚀 بدء البحث عن تريندات جديدة...")
              pytrends = TrendReq(hl='ar', tz=0)
              excluded = ["ديزني", "افلام", "فيلم", "فلم", "هندي", "هندى", "تركي", "تركى", "صيني", "صينى", "كوري", "الذئاب", "باكستاني", "حلقه", "حلقة"]
              try:
                  pytrends.build_payload(["مدبلج"], timeframe='now 4-H', gprop='youtube')
                  results = pytrends.related_queries()
                  used = open(HISTORY_FILE, "r", encoding="utf-8").read().splitlines() if os.path.exists(HISTORY_FILE) else []
                  
                  if 'مدبلج' in results and results['مدبلج']['top'] is not None:
                      df = results['مدبلج']['top']
                      titles = [w for w in df['query'].tolist() if "مدبلج" in w and len(w) >= 15 and w not in used and not any(ex in w for ex in excluded)]
                      if titles:
                          q = titles[0]
                          success = await create_video(q, int(time.time()))
                          if success:
                              with open(HISTORY_FILE, "a", encoding="utf-8") as f: f.write(q + "\n")
                      else:
                          log("ℹ️ لا توجد عناوين جديدة مطابقة للفلاتر حالياً.")
              except Exception as e: log(f"⚠️ خطأ في الاتجاهات: {e}")

          if __name__ == "__main__":
              asyncio.run(main())

      - name: Save Progress
        if: always()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add history.txt || echo ""
          git commit -m "Update history [skip ci]" || echo ""
          git push || echo ""

      - name: ⏳ Final Wait & Trigger
        if: success()
        run: |
          sleep 7000
          gh workflow run "Continuous Video Generator" --repo ${{ github.repository }}
