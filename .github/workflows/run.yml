name: Continuous Video Generator

on:
  schedule:
    - cron: "0 */3 * * *" # تشغيل احتياطي كل 3 ساعات في حال توقفت السلسلة
  workflow_dispatch: # للتشغيل اليدوي

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write # ضرورية لحذف الجلسات وتشغيل جلسات جديدة

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Cleanup Old Workflow Runs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "جاري حذف الجلسات القديمة والإبقاء على آخر جلستين..."
          runs=$(gh run list --workflow "${{ github.workflow }}" --json databaseId --jq '.[2:].databaseId')
          for run_id in $runs; do
            gh run delete "$run_id"
          done
          echo "تم التنظيف بنجاح."

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          pip install edge-tts arabic-reshaper python-bidi pytrends opencv-python pillow numpy requests nest_asyncio dropbox

      - name: Create and Run Script
        shell: python
        env:
          DROPBOX_REFRESH_TOKEN: ${{ secrets.DROPBOX_REFRESH_TOKEN }}
          DROPBOX_APP_KEY: ${{ secrets.DROPBOX_APP_KEY }}
          DROPBOX_APP_SECRET: ${{ secrets.DROPBOX_APP_SECRET }}
        run: |
          import datetime, asyncio, edge_tts, requests, os, cv2, subprocess, time, numpy as np, sys, nest_asyncio
          from PIL import Image, ImageDraw, ImageFont
          from arabic_reshaper import reshape
          from bidi.algorithm import get_display
          from pytrends.request import TrendReq
          import dropbox

          nest_asyncio.apply()

          # مسار المجلد في دروب بوكس
          DROPBOX_FOLDER_PATH = "/Videos" 

          def get_dropbox_client():
              return dropbox.Dropbox(
                  oauth2_refresh_token=os.environ.get('DROPBOX_REFRESH_TOKEN'),
                  app_key=os.environ.get('DROPBOX_APP_KEY'),
                  app_secret=os.environ.get('DROPBOX_APP_SECRET')
              )

          def log(msg):
              print(f"[{datetime.datetime.now().strftime('%H:%M:%S')}] {msg}")
              sys.stdout.flush()

          VOICE = "ar-SA-ZariyahNeural"
          URL_TEXT = "www.mshort.do.am"
          FONT_URL = "https://github.com/google/fonts/raw/main/ofl/amiri/Amiri-Regular.ttf"
          HISTORY_FILE = "history.txt"
          SESSION_LIMIT = 60 * 60 # الجلسة تنتهي بعد ساعة كما طلبت
          
          now = datetime.datetime.now()
          current_time_str = now.strftime("%I:%M %p")
          current_date_str = now.strftime("%Y-%m-%d")

          PRE_TEXT = "أهلا بكل متابعينا. موضوع الفيديو اليوم عن المسلسل الشهير وهو"
          POST_TEXT = f""" . إذا رغبت في مشاهدة المسلسل كامل ومدبلج. فابقَ معنا حتى نهاية الفيديو.  
          لأوفر لك رابط قناة التيلجرام التي تحتوى على جميع أجزاء المسلسل كاملة.  
          أو قم بالدخول على الموقع المعروض أمامك باللون الأصفر.  
          تسجيلنا الحالي في تمام الساعة {current_time_str} بتاريخ {current_date_str}.  
          آراكم في فيديو آخر."""

          def fix_arabic(text):
              reshaped_text = reshape(text)
              return get_display(reshaped_text)

          async def create_video(title, index, dbx_client):
              audio_p, video_p, final_p = f"a_{index}.mp3", f"v_{index}.mp4", f"final_{index}.mp4"
              try:
                  log(f"🎬 معالجة: {title}")
                  full_speech = f"{PRE_TEXT} {title} {POST_TEXT}"
                  await edge_tts.Communicate(full_speech, VOICE).save(audio_p)
                  
                  d_cmd = ["ffprobe", "-v", "error", "-show_entries", "format=duration", "-of", "default=noprint_wrappers=1:nokey=1", audio_p]
                  duration = float(subprocess.check_output(d_cmd).decode().strip())
                  duration_rounded = int(np.ceil(duration))

                  if not os.path.exists("font.ttf"):
                      with open("font.ttf", "wb") as f: f.write(requests.get(FONT_URL).content)
                  
                  fps, size = 24, (1280, 720)
                  out = cv2.VideoWriter(video_p, cv2.VideoWriter_fourcc(*'mp4v'), fps, size)
                  font_main = ImageFont.truetype("font.ttf", 70)
                  font_sub = ImageFont.truetype("font.ttf", 60)
                  font_timer = ImageFont.truetype("font.ttf", 30)

                  for frame_num in range(int(duration * fps)):
                      img = np.zeros((720, 1280, 3), np.uint8)
                      pil_img = Image.fromarray(img)
                      draw = ImageDraw.Draw(pil_img)
                      clean_title = fix_arabic(title)
                      rem = max(0, duration_rounded - (frame_num // fps))
                      timer_txt = f"00:{rem:02d}"
                      w1, h1 = draw.textbbox((0, 0), clean_title, font=font_main)[2:]
                      w2, h2 = draw.textbbox((0, 0), URL_TEXT, font=font_sub)[2:]
                      w3, h3 = draw.textbbox((0, 0), timer_txt, font=font_timer)[2:]
                      curr_y = 300 
                      draw.text(((1280-w1)/2, curr_y), clean_title, font=font_main, fill=(255, 255, 255))
                      curr_y += h1 + 10
                      draw.text(((1280-w2)/2, curr_y), URL_TEXT, font=font_sub, fill=(255, 237, 0))
                      curr_y += h2 + 10
                      draw.text(((1280-w3)/2, curr_y), timer_txt, font=font_timer, fill=(0, 255, 0))
                      out.write(cv2.cvtColor(np.array(pil_img), cv2.COLOR_RGB2BGR))
                  out.release()

                  os.system(f"ffmpeg -i {video_p} -i {audio_p} -c:v libx264 -c:a aac -shortest {final_p} -y -loglevel quiet")
                  
                  log(f"📤 جاري رفع {title} إلى Dropbox...")
                  file_path = f"{DROPBOX_FOLDER_PATH}/{title}.mp4".replace("//", "/")
                  
                  with open(final_p, "rb") as f:
                      dbx_client.files_upload(
                          f.read(), 
                          file_path, 
                          mode=dropbox.files.WriteMode.overwrite
                      )
                  
                  log(f"✅ تم الرفع بنجاح! المسار: {file_path}")
                  
              except Exception as e:
                  log(f"❌ فشل: {e}")
              finally:
                  for f in [audio_p, video_p, final_p]: 
                      if os.path.exists(f): os.remove(f)

          async def main():
              start_time = time.time()
              log("🚀 الجلسة تعمل")
              dbx_client = get_dropbox_client()
              pytrends = TrendReq(hl='ar', tz=0)
              excluded_words = ["ديزني", "افلام", "فيلم", "فلم","هندى", "هندي", "صينى", "صيني","تركى", "تركي", "الحلقه", "الحلقة",  "كوري", "الذئاب", "باكستاني", "افلام", "حلقه", "حلقة","ديزنى"]
              while (time.time() - start_time) < SESSION_LIMIT:
                  try:
                      pytrends.build_payload(["مدبلج"], timeframe='now 1-d', gprop='youtube')
                      results = pytrends.related_queries()
                      used = []
                      if os.path.exists(HISTORY_FILE):
                          with open(HISTORY_FILE, "r", encoding="utf-8") as f: used = f.read().splitlines()
                      if 'مدبلج' in results and results['مدبلج']['top'] is not None:
                          df_top = results['مدبلج']['top']
                          new_titles = [w for w in df_top['query'].tolist() if "مدبلج" in w and len(w) >= 20 and w not in used and not any(word in w for word in excluded_words)]
                          for q in new_titles:
                              await create_video(q, int(time.time()), dbx_client)
                              with open(HISTORY_FILE, "a", encoding="utf-8") as f: f.write(q + "\n")
                              if (time.time() - start_time) >= SESSION_LIMIT: break
                      await asyncio.sleep(30)
                  except Exception as e:
                      log(f"⚠️ خطأ: {e}")
                      await asyncio.sleep(10)

          async def run_async():
              await main()
              
          if __name__ == "__main__":
              asyncio.run(run_async())

      - name: Save Progress
        if: always()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add history.txt || echo "No history"
          git commit -m "Update history [skip ci]" || echo "No changes"
          git push || echo "Push failed"

      - name: Trigger Next Session
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "جاري بدء جلسة جديدة لضمان الاستمرارية 24 ساعة..."
          gh workflow run "Continuous Video Generator"
