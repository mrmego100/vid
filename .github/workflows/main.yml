name: Perpetual Dual

on:
  workflow_dispatch:

concurrency:
  group: streaming-group
  cancel-in-progress: true

jobs:
  stream:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: 🧹 Delete Old Logs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 1

      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 🚀 Create and Run Script
        env:
          YOUTUBE_CREDENTIALS: ${{ secrets.YOUTUBE_CREDENTIALS }}
        run: |
          sudo apt-get update -q
          sudo apt-get install -y ffmpeg -q
          
          pip install requests bs4 "moviepy==1.0.3" "pillow==10.2.0" g4f tqdm nest_asyncio google-api-python-client google-auth-httplib2 google-auth-oauthlib numpy scipy edge-tts -q
          
          wget -q https://github.com/googlefonts/roboto/raw/main/src/hinted/Roboto-Bold.ttf
          
          cat << 'EOF' > script.py
          import os, asyncio, re, warnings, urllib3, requests, time, gc, json, random
          import nest_asyncio
          import g4f
          from bs4 import BeautifulSoup
          from tqdm import tqdm
          import numpy as np
          import edge_tts
          from PIL import Image, ImageDraw, ImageFont

          import PIL.Image
          if not hasattr(PIL.Image, 'ANTIALIAS'):
              PIL.Image.ANTIALIAS = PIL.Image.LANCZOS

          from moviepy.editor import ImageClip, AudioFileClip, CompositeVideoClip, VideoFileClip, concatenate_audioclips
          import moviepy.video.fx.all as vfx
          from datetime import datetime
          from google.oauth2.credentials import Credentials
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaFileUpload

          nest_asyncio.apply()
          urllib3.disable_warnings(urllib3.exceptions.InsecureRequestWarning)
          warnings.filterwarnings("ignore", category=UserWarning)
          os.environ["IMAGEIO_FFMPEG_EXE"] = "ffmpeg"
          os.environ["SDL_VIDEODRIVER"] = "dummy"

          HISTORY_FILE = "shows_history.txt"

          # إعدادات الأصوات
          VOICE_MALE = "ar-EG-ShakirNeural"
          VOICE_FEMALE = "ar-EG-SalmaNeural"

          def get_data():
              print("🔍 جاري جلب البيانات من المصدر...", flush=True)
              history = []
              if os.path.exists(HISTORY_FILE):
                  with open(HISTORY_FILE, "r", encoding="utf-8") as f:
                      for line in f:
                          if "|" in line: history.append(line.split("|")[0].strip())
              base = "https://www.shorttv.live"
              try:
                  r = requests.get(f"{base}/ar", headers={"User-Agent": "Mozilla/5.0"}, verify=False, timeout=10)
                  soup = BeautifulSoup(r.text, 'html.parser')
                  links = soup.find_all('a', href=True)
                  random.shuffle(links)
                  for a in links:
                      img = a.find('img')
                      if not img: continue
                      title = re.sub(r'[a-zA-Z]', '', img.get('alt', '')).strip()
                      if len(title) < 5 or title in history: continue
                      t_url = a['href'] if a['href'].startswith('http') else base + a['href']
                      s_page = requests.get(t_url, verify=False, timeout=5)
                      desc_m = BeautifulSoup(s_page.text, 'html.parser').find('meta', attrs={'name': 'description'})
                      desc = desc_m.get('content', '') if desc_m else "دراما واقعية"
                      i_url = img.get('src') or img.get('data-src')
                      if i_url.startswith('//'): i_url = "https:" + i_url
                      with open("p.jpg", "wb") as f: f.write(requests.get(i_url).content)
                      return {"title": title, "desc": desc}
              except: return None

          def create_long_script(t, d):
              print(f"🤖 جاري تأليف سيناريو ملحمي مطول لمسلسل {t}...", flush=True)
              full_script = ""
              current_word_count = 0
              target_word_count = 2100 # الشرط الإجباري
              
              iteration = 1
              while current_word_count < target_word_count and iteration < 10:
                  if iteration == 1:
                      prompt = (f"اكتب الجزء الأول من حوار درامي طويل جداً بين بطل وبطلة لمسلسل '{t}' بناءً على: {d}. "
                                "ابدأ بـ [HOOK] صادم ومواجهة نارية. ممنوع وجود راوي تماماً. "
                                "استخدم فقط [MALE] و [FEMALE]. ممنوع استخدام أي مقدمات أو رموز أو نجوم ***. "
                                "اكتب حوالي 500 كلمة في هذا الجزء.")
                  else:
                      prompt = (f"أكمل الحوار الدرامي السابق لمسلسل '{t}'. "
                                f"آخر ما حدث هو: {full_script[-200:]}. "
                                "استمر في سرد أحداث المسلسل الحقيقية من خلال الحوار المباشر بين البطل والبطلة فقط. "
                                "ممنوع الراوي، ممنوع الرموز، ممنوع النجوم ***. اكتب 500 كلمة إضافية.")

                  try:
                      response = g4f.ChatCompletion.create(model=g4f.models.gpt_4, messages=[{"role":"user", "content": prompt}])
                      # تنظيف النص من النجوم والرموز فوراً
                      clean_chunk = re.sub(r'[*#_\\-]', '', response).strip()
                      full_script += "\n" + clean_chunk
                      current_word_count = len(full_script.split())
                      print(f"   -> تم توليد {current_word_count} كلمة حتى الآن...", flush=True)
                      iteration += 1
                      time.sleep(2)
                  except: break
              
              return full_script.strip()

          async def process_audio(script):
              print("🎙️ معالجة الأصوات (تفاعل حي بناءً على المشاعر)...", flush=True)
              # التقاط الوسوم مع النص
              segments = re.findall(r'\[(MALE|FEMALE|HOOK)\](.*?)(?=\[(?:MALE|FEMALE|HOOK)\]|$)', script, re.DOTALL)
              clips = []
              
              # قواميس التفاعل
              fast_keys = ['بغضب', 'بصراخ', 'بسرعة', 'خيانة', 'مستحيل', 'يكفي', 'أكرهك', 'صدمة']
              slow_keys = ['ندم', 'هدوء', 'حزن', 'لماذا', 'بهدوء', 'آسف', 'ببكاء']
              joy_keys = ['بفرح', 'بضحك', 'سعادة', 'بابتسامة']

              for i, (role, text) in enumerate(segments):
                  text = text.strip()
                  if len(text) < 2: continue
                  
                  # تحديد نبرة التفاعل
                  rate = "+28%" if any(w in text for w in fast_keys) else ("-8%" if any(w in text for w in slow_keys) else ("+15%" if any(w in text for w in joy_keys) else "+4%"))
                  
                  voice = VOICE_MALE if role in ["MALE", "HOOK"] and i % 2 == 0 else VOICE_FEMALE
                  if role == "FEMALE": voice = VOICE_FEMALE
                  
                  # تنظيف النص النهائي للنطق
                  clean_text = re.sub(r'\(.*?\)', '', text).strip()
                  fname = f"s_{i}.mp3"
                  try:
                      await edge_tts.Communicate(clean_text, voice, rate=rate).save(fname)
                      c = AudioFileClip(fname)
                      clips.append(c)
                      clips.append(c.volumex(0).set_duration(0.3)) # وقفة طبيعية
                  except: continue

              if clips:
                  final_aud = concatenate_audioclips(clips)
                  final_aud.write_audiofile("v.mp3", fps=44100, verbose=False, logger=None)
                  for c in clips: c.close()
                  return True
              return False

          async def start_production():
              data = get_data()
              if not data: return
              
              script = create_long_script(data['title'], data['desc'])
              if len(script.split()) < 100: return
              
              if await process_audio(script):
                  print("🎬 المونتاج السينمائي النهائي لـ MegoDrama...", flush=True)
                  # 1. اللوجو والخط
                  img = Image.new('RGBA', (500, 150), (0, 0, 0, 0))
                  draw = ImageDraw.Draw(img)
                  try: font = ImageFont.truetype("Roboto-Bold.ttf", 65)
                  except: font = ImageFont.load_default()
                  draw.text((10, 10), "MegoDrama", font=font, fill=(0, 255, 255, 255))
                  draw.line((10, 95, 420, 95), fill=(255, 255, 255, 255), width=5)
                  img.save("logo.png")

                  # 2. الموجات
                  os.system('ffmpeg -i v.mp3 -filter_complex "[0:a]showwaves=s=500x120:colors=0x00FFFF:mode=cline,crop=500:60:0:60,format=yuv420p[v]" -map "[v]" -c:v libx264 temp_waves.mp4 -y -loglevel quiet')

                  aud = AudioFileClip("v.mp3")
                  base = ImageClip("p.jpg").resize(height=720).set_duration(aud.duration)
                  logo = ImageClip("logo.png").set_duration(aud.duration).set_position((40, 40))
                  
                  if os.path.exists("temp_waves.mp4"):
                      waves = VideoFileClip("temp_waves.mp4").fx(vfx.mask_color, color=[0,0,0], thr=10, s=5).set_position((40, 135)).set_opacity(0.9)
                      final_vid = CompositeVideoClip([base, logo, waves]).set_audio(aud)
                      final_vid.write_videofile("out.mp4", fps=10, codec="libx264", audio_codec="aac", verbose=False, logger=None)
                  
                  if os.path.exists("out.mp4") and 'YOUTUBE_CREDENTIALS' in os.environ:
                      print("📤 جاري الرفع إلى يوتيوب...", flush=True)
                      try:
                          creds = Credentials.from_authorized_user_info(json.loads(os.environ['YOUTUBE_CREDENTIALS']))
                          youtube = build('youtube', 'v3', credentials=creds)
                          body = {
                              'snippet': {
                                  'title': f"مواجهة نارية في مسلسل {data['title']} | القصة كاملة",
                                  'description': f"شاهد الأحداث الحقيقية لمسلسل {data['title']} بدون راوي.\nإنتاج: MegoDrama",
                                  'categoryId': '24'
                              },
                              'status': {'privacyStatus': 'public', 'selfDeclaredMadeForKids': False}
                          }
                          youtube.videos().insert(part=','.join(body.keys()), body=body, media_body=MediaFileUpload("out.mp4", chunksize=-1, resumable=True)).execute()
                          with open(HISTORY_FILE, "a", encoding="utf-8") as f:
                              f.write(f"{data['title']}|{datetime.now().strftime('%Y-%m-%d')}\n")
                          print("✅ تم الإنتاج والرفع بنجاح!")
                      except Exception as e: print(f"❌ فشل الرفع: {e}")
                  
                  aud.close()
                  base.close()
                  logo.close()

          if __name__ == "__main__":
              asyncio.run(start_production())
              print("⏱️ الجلسة مستمرة لمدة 4 ساعات...")
              time.sleep(4 * 60 * 60)
          EOF
          python -u script.py

      - name: 💾 Commit History
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add shows_history.txt || true
          git commit -m "Update history" || true
          git push || true

      - name: ⏳ Persistence
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run "Perpetual Dual" --ref ${{ github.ref_name }}
