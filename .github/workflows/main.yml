name: Perpetual Dual

on:
  workflow_dispatch:

concurrency:
  group: streaming-group
  cancel-in-progress: true

jobs:
  stream:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: 🧹 Delete Old Logs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 1

      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 🚀 Create and Run Script
        env:
          YOUTUBE_CREDENTIALS: ${{ secrets.YOUTUBE_CREDENTIALS }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: |
          sudo apt-get update -q
          # تم تنظيف المتطلبات لتسريع العملية
          sudo apt-get install -y ffmpeg fonts-noto-core fonts-noto-extra curl -q
          
          # إعداد الخط العربي
          curl -sL "https://github.com/google/fonts/raw/main/ofl/notonaskharabic/NotoNaskhArabic-Bold.ttf" -o arabic.ttf || true
          sudo mkdir -p /usr/share/fonts/truetype/custom
          sudo cp arabic.ttf /usr/share/fonts/truetype/custom/ || true
          sudo fc-cache -fv || true
          
          # تثبيت المكتبات
          for i in {1..5}; do
            pip install --retries 10 requests bs4 "moviepy==1.0.3" "pillow==10.2.0" g4f tqdm nest_asyncio google-api-python-client google-auth-httplib2 google-auth-oauthlib numpy scipy edge-tts arabic-reshaper python-bidi -q && break || sleep 5
          done
          
          wget --tries=5 -q https://github.com/googlefonts/roboto/raw/main/src/hinted/Roboto-Bold.ttf
          
          cat << 'EOF' > script.py
          import os, asyncio, re, warnings, urllib3, requests, time, gc, json, random, subprocess
          import nest_asyncio
          import g4f
          from bs4 import BeautifulSoup
          import numpy as np
          import edge_tts
          import arabic_reshaper
          from bidi.algorithm import get_display
          from PIL import Image, ImageDraw, ImageFont, ImageFilter, ImageOps

          import PIL.Image
          if not hasattr(PIL.Image, 'ANTIALIAS'):
              PIL.Image.ANTIALIAS = PIL.Image.LANCZOS

          from moviepy.editor import ImageClip, AudioFileClip, VideoFileClip, concatenate_videoclips
          import moviepy.video.fx.all as vfx
          from datetime import datetime
          from google.oauth2.credentials import Credentials
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaFileUpload

          nest_asyncio.apply()
          urllib3.disable_warnings(urllib3.exceptions.InsecureRequestWarning)
          warnings.filterwarnings("ignore", category=UserWarning)
          os.environ["IMAGEIO_FFMPEG_EXE"] = "ffmpeg"
          os.environ["SDL_VIDEODRIVER"] = "dummy"

          HISTORY_FILE = "shows_history.txt"

          # ---------------- الإعدادات ---------------- #
          ENABLE_YOUTUBE_UPLOAD = 1 # 0 لإيقاف الرفع، 1 للتشغيل
          ENABLE_CATBOX_UPLOAD = 0  # 0 لإيقاف الرفع، 1 للتشغيل لـ Catbox
          VOICE_NARRATOR = "ar-EG-ShakirNeural" # صوت السرد الموحد
          VID_WIDTH = 720   # العرض القياسي للشورتس (سريع جداً في الرندر)
          VID_HEIGHT = 1280 # الطول القياسي للشورتس
          VID_FPS = 24      # معدل إطارات سينمائي يخفف الضغط على السيرفر
          
          # --- إعدادات كلمات السكربت --- #
          STORY_MIN_WORDS = 2000  # الحد الأدنى لعدد كلمات القصة
          STORY_MAX_WORDS = 2500  # الحد الأقصى لعدد كلمات القصة
          
          BAD_KEYWORDS = ["logo", "icon", "avatar", "brand", "header", "footer", "button", "banner", "sign"]
          
          SITES_CONFIG = [
              {"name": "ReelShort", "url": "https://www.reelshort.com/ar", "base": "https://www.reelshort.com"},
              {"name": "DramaBox", "url": "https://www.dramabox.com/ar", "base": "https://www.dramabox.com"},
              {"name": "FlexTV", "url": "https://flextv.cc/ar", "base": "https://flextv.cc"},
              {"name": "ShortTV", "url": "https://www.shorttv.live/ar", "base": "https://www.shorttv.live"}
          ]
          # ------------------------------------------- #

          def is_valid_image(url, alt_text):
              url_lower = url.lower()
              alt_lower = alt_text.lower()
              if any(word in url_lower or word in alt_lower for word in BAD_KEYWORDS):
                  return False
              if "icon" in url_lower or "logo" in url_lower:
                  return False
              return True

          def get_data():
              print("🔍 جاري فحص المنصات لجلب مسلسل جديد...", flush=True)
              history = []
              if os.path.exists(HISTORY_FILE):
                  with open(HISTORY_FILE, "r", encoding="utf-8") as f:
                      for line in f:
                          if "|" in line: history.append(line.split("|")[0].strip())
              
              random.shuffle(SITES_CONFIG)
              headers = {
                  "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36",
                  "Accept-Language": "ar-EG,ar;q=0.9,en-US;q=0.8,en;q=0.7",
              }

              for site in SITES_CONFIG:
                  print(f"🔎 جاري فحص موقع: {site['name']}...", flush=True)
                  try:
                      response = requests.get(site['url'], headers=headers, timeout=25, verify=False)
                      if response.status_code != 200: continue

                      soup = BeautifulSoup(response.text, 'html.parser')
                      found_shows = []

                      scripts = soup.find_all('script')
                      for script in scripts:
                          if not script.string: continue
                          json_matches = re.findall(r'\{"id":.*?"title":"([^"]+)".*?"(?:cover|poster|image)":"([^"]+)"', script.string)
                          
                          for m_title, m_img in json_matches:
                              clean_title = m_title.encode().decode('unicode-escape').strip() if '\\u' in m_title else m_title.strip()
                              clean_title = re.sub(r'[a-zA-Z0-9]', '', clean_title).strip()
                              
                              if len(clean_title) > 3 and clean_title not in history:
                                  if is_valid_image(m_img, clean_title) and m_img.startswith('http'):
                                      found_shows.append({"title": clean_title, "image": m_img, "desc": f"دراما واقعية ومشوقة من منصة {site['name']}"})

                      if not found_shows:
                          for img in soup.find_all('img', alt=True):
                              raw_alt = img.get('alt', '').strip()
                              title = re.sub(r'[a-zA-Z0-9]', '', raw_alt).strip()
                              
                              if len(title) > 3 and title not in history:
                                  img_url = img.get('data-src') or img.get('data-original') or img.get('src') or img.get('srcset')
                                  if img_url:
                                      img_url = img_url.split(' ')[0] 
                                      if img_url.startswith('//'): img_url = "https:" + img_url
                                      if not img_url.startswith('http'): img_url = site['base'] + img_url
                                      
                                      if is_valid_image(img_url, raw_alt) and "base64" not in img_url:
                                          found_shows.append({"title": title, "image": img_url, "desc": f"دراما واقعية ومشوقة من منصة {site['name']}"})

                      if found_shows:
                          selected = random.choice(found_shows)
                          print(f"🎯 تم اختيار مسلسل: '{selected['title']}' من منصة {site['name']}", flush=True)
                          with open("p.jpg", "wb") as f: f.write(requests.get(selected['image'], headers=headers, verify=False).content)
                          return {"title": selected['title'], "desc": selected['desc']}

                  except Exception as e:
                      print(f"⚠️ خطأ في {site['name']}: {e}", flush=True)
                      continue
              return None

          def upload_to_catbox(filepath):
              print("📤 جاري الرفع إلى Catbox...", flush=True)
              try:
                  with open(filepath, 'rb') as f:
                      response = requests.post(
                          'https://catbox.moe/user/api.php',
                          data={'reqtype': 'fileupload'},
                          files={'fileToUpload': f}
                      )
                  if response.status_code == 200:
                      print(f"✅ تم الرفع على Catbox بنجاح، الرابط: {response.text}")
                  else:
                      print(f"❌ فشل الرفع على Catbox، كود الخطأ: {response.status_code}")
              except Exception as e:
                  print(f"❌ حدث خطأ أثناء الرفع لـ Catbox: {e}")

          def create_narrative_script(t, d):
              print(f"🤖 جاري تأليف قصة سردية ({STORY_MIN_WORDS}-{STORY_MAX_WORDS} كلمة) لمسلسل '{t}'...", flush=True)
              prompt = (f"أنت الآن راوي قصص محترف. اكتب قصة سردية طويلة جداً ومفصلة تروي أحداث مسلسل '{t}' بناءً على: {d}. "
                        f"شرط إجباري وحاسم: يجب أن يتراوح طول القصة بين {STORY_MIN_WORDS} إلى {STORY_MAX_WORDS} كلمة بالتمام والكمال. "
                        "يجب أن تبدأ القصة بـ 'هوك' (Hook) قوي جداً وصادم يخاطب المشاهد مباشرة. "
                        "ممنوع تماماً استخدام أسلوب الحوارات. السرد يجب أن يكون متصلاً بلسان راوي واحد. "
                        "لا تكتب أي مقدمات أو ترحيب، اكتب النص السردي للقصة مباشرة.")
              
              models_to_try = ["gpt-4", "gpt-3.5-turbo"]
              for attempt in range(5):
                  model = models_to_try[attempt % len(models_to_try)]
                  try:
                      response = g4f.ChatCompletion.create(model=model, messages=[{"role":"user", "content": prompt}])
                      if response and len(response.split()) > 150: 
                          clean_chunk = re.sub(r'[*#_\[\]()\-]', '', response).replace('\\', '').strip()
                          return clean_chunk
                  except Exception: pass
                  time.sleep(7)
              return ""

          def generate_video_keywords(story_text):
              prompt = f"Analyze this story and provide exactly 5 English keywords or short phrases (e.g., 'sad man', 'running', 'dark city'). Return ONLY the English keywords separated by commas. Story: {story_text[:800]}..."
              models_to_try = ["gpt-4", "gpt-3.5-turbo"]
              for attempt in range(3):
                  try:
                      model = models_to_try[attempt % len(models_to_try)]
                      raw_keys = g4f.ChatCompletion.create(model=model, messages=[{"role":"user", "content": prompt}])
                      clean_keys = [k.strip() for k in raw_keys.replace('.', '').replace('"', '').split(',') if k.strip()]
                      if len(clean_keys) >= 3: return clean_keys[:5]
                  except: time.sleep(3)
              return ["drama", "suspense", "people", "action", "cinematic"]

          def fetch_pexels_videos(keywords):
              print("🎥 جاري تحميل مقاطع فيديو مجانية من Pexels...", flush=True)
              api_key = os.environ.get('PEXELS_API_KEY')
              if not api_key: return []
              
              headers = {"Authorization": api_key}
              downloaded = []
              
              for idx, kw in enumerate(keywords):
                  url = f"https://api.pexels.com/videos/search?query={kw}&per_page=5&orientation=portrait"
                  try:
                      res = requests.get(url, headers=headers, timeout=15).json()
                      if 'videos' in res and res['videos']:
                          video = random.choice(res['videos'][:3])
                          video_files = sorted(video['video_files'], key=lambda x: x['width'], reverse=True)
                          link = next((vf['link'] for vf in video_files if vf['width'] >= 720), video_files[0]['link'])
                          
                          v_data = requests.get(link, timeout=30).content
                          fname = f"scene_{idx}.mp4"
                          with open(fname, "wb") as f: f.write(v_data)
                          downloaded.append(fname)
                  except Exception as e:
                      pass
              return downloaded

          def generate_youtube_title(show_title, story_text):
              prompt = f"قم بتأليف عنوان يوتيوب مثير جداً وجذاب لفيديو يحكي قصة. اكتب جملة العنوان فقط لا غير بدون أقواس أو شروحات. القصة: {story_text[:1000]}..."
              models_to_try = ["gpt-4", "gpt-3.5-turbo"]
              for attempt in range(3):
                  try:
                      model = models_to_try[attempt % len(models_to_try)]
                      raw_title = g4f.ChatCompletion.create(model=model, messages=[{"role":"user", "content": prompt}])
                      clean_title = raw_title.replace('"', '').replace('[', '').replace(']', '').replace('*', '').strip()
                      if len(clean_title) > 95: clean_title = clean_title[:95] + "..."
                      return clean_title
                  except: time.sleep(3)
              return "الجميع ظنه ضعيفًا! حتى رأوه يقلب الموازين ويصدم الجميع بقوته"

          def generate_youtube_desc(show_title, story_text):
              prompt = f"اكتب وصفاً لفيديو يحكي قصة. القصة: {story_text[:600]}... شروط: 1. اسم المسلسل هو '{show_title}' يجب كتابة كلماته مبعثرة. 2. الكلمات 'مدبلج'، 'كامل'، 'مترجم' مبعثرة. اكتب الوصف فقط."
              models_to_try = ["gpt-4", "gpt-3.5-turbo"]
              for attempt in range(3):
                  try:
                      model = models_to_try[attempt % len(models_to_try)]
                      raw_desc = g4f.ChatCompletion.create(model=model, messages=[{"role":"user", "content": prompt}])
                      return re.sub(r'(حسنا|بالتأكيد|إليك|تفضل|الوصف|:\n|^\n)', '', raw_desc, flags=re.IGNORECASE).strip()
                  except: time.sleep(3)
              return f"أحداث نارية ومشوقة! نرى كيف تغيرت الأقدار مع {show_title}. تابع القصة كاملة هنا مدبلج وتستطيع مشاهدته مترجم."

          # ----- التصميم المعكوس والذكي للصورة المصغرة -----
          def create_youtube_thumbnail(title_text):
              print("🖼️ جاري تصميم الصورة المصغرة (مع ضبط اللغة العربية)...", flush=True)
              font_path = "arabic.ttf"
              try:
                  width, height = 1280, 720
                  if os.path.exists("p.jpg"):
                      img = Image.open("p.jpg").convert('RGB')
                      w, h = img.size
                      zoom_w, zoom_h = int(w * 0.6), int((w * 0.6) / (width / height))
                      img = img.crop(((w - zoom_w) / 2, (h - zoom_h) / 2, (w + zoom_w) / 2, (h + zoom_h) / 2))
                      img = img.resize((width, height), resample=PIL.Image.LANCZOS).filter(ImageFilter.GaussianBlur(radius=25))
                  else:
                      img = Image.new('RGB', (width, height), color=(15, 15, 25))

                  overlay = Image.new('RGBA', (width, height), (0, 0, 0, 60))
                  img.paste(overlay, (0, 0), overlay)
                  draw = ImageDraw.Draw(img)

                  # إصلاح وتقويم اللغة العربية لضمان اتصال الحروف وعدم الانعكاس
                  configuration = {
                      'delete_harakat': False,
                      'shift_harakat_position': False,
                      'use_unshaped_instead_of_isolated': False
                  }
                  reshaper = arabic_reshaper.ArabicReshaper(configuration=configuration)
                  reshaped_text = reshaper.reshape(title_text)
                  bidi_text = get_display(reshaped_text)
                  
                  try: font = ImageFont.truetype(font_path, 110)
                  except: font = ImageFont.load_default()
                  
                  def wrap_text(text, font, max_width):
                      lines, words = [], text.split()
                      while words:
                          line = ''
                          while words and font.getlength(line + words[0] + ' ') <= max_width:
                              line += (words.pop(0) + ' ')
                          lines.append(line.strip())
                      return lines
                  
                  lines = wrap_text(bidi_text, font, width - 200)
                  y_text = (height - (len(lines) * 140)) / 2
                  
                  for line in lines:
                      x_text = (width - font.getlength(line)) / 2
                      for offset in range(3, 10): 
                          draw.text((x_text+offset, y_text+offset), line, font=font, fill=(0,0,0, 150))
                          draw.text((x_text-offset, y_text-offset), line, font=font, fill=(0,0,0, 150))
                      draw.text((x_text, y_text), line, font=font, fill=(255, 255, 255))
                      y_text += 140
                      
                  img.save("thumbnail.jpg")
                  return "thumbnail.jpg"
              except Exception as e:
                  print(f"Error in thumbnail: {e}")
                  Image.new('RGB', (1280, 720), color="black").save("thumbnail.jpg")
                  return "thumbnail.jpg"

          # ----- نظام الترجمة والتقسيم الذكي للجمل -----
          global_word_boundaries = []
          
          async def process_audio_and_subs(script):
              if not script: return False
              print("🎙️ معالجة الصوت وبناء ملف الترجمة وتقسيم الجمل...", flush=True)
              try:
                  communicate = edge_tts.Communicate(script, VOICE_NARRATOR, rate="+4%")
                  global global_word_boundaries
                  global_word_boundaries = []
                  
                  with open("v.mp3", "wb") as file:
                      async for chunk in communicate.stream():
                          if chunk["type"] == "audio":
                              file.write(chunk["data"])
                          elif chunk["type"] == "WordBoundary":
                              global_word_boundaries.append(chunk)
                  
                  ass_header = """[Script Info]\nScriptType: v4.00+\n[V4+ Styles]\nFormat: Name, Fontname, Fontsize, PrimaryColour, BackColour, Bold, Italic, BorderStyle, Outline, Shadow, Alignment, MarginL, MarginR, MarginV, Encoding\nStyle: Default,Noto Naskh Arabic,64,&H00FFFFFF,&H00000000,0,0,1,3,0,2,20,20,20,1\n[Events]\nFormat: Layer, Start, End, Style, Text\n"""
                  ass_lines = []
                  
                  def format_ass_time(seconds):
                      return f"{int(seconds // 3600)}:{int((seconds % 3600) // 60):02d}:{seconds % 60:05.2f}"

                  for i in range(0, len(global_word_boundaries), 6):
                      group = global_word_boundaries[i:i+6]
                      start_time = group[0]["offset"] / 10000000
                      end_time = (group[-1]["offset"] + group[-1]["duration"]) / 10000000 + 0.1
                      text = " ".join([w["text"] for w in group])
                      ass_lines.append(f"Dialogue: 0,{format_ass_time(start_time)},{format_ass_time(end_time)},Default,{text}")

                  with open("subs.ass", "w", encoding="utf-8") as f:
                      f.write(ass_header + "\n".join(ass_lines))
                      
                  return True
              except Exception as e:
                  print(f"❌ خطأ في توليد الصوت والترجمة: {e}")
                  return False

          async def start_production():
              data = get_data()
              if not data: return
              
              script = create_narrative_script(data['title'], data['desc'])
              if len(script.split()) < 10: return
              
              if await process_audio_and_subs(script):
                  print("🎬 بدء المونتاج السينمائي (نظام فيديو لكل جملة + رندر سريع)...", flush=True)
                  
                  # 1. تجهيز ملفات Pexels لمرة واحدة لسرعة الأداء
                  keywords = generate_video_keywords(script)
                  video_files = fetch_pexels_videos(keywords)
                  processed_vids = []
                  
                  if video_files:
                      for vf in video_files:
                          try:
                              clip = VideoFileClip(vf).without_audio().set_fps(VID_FPS)
                              w, h = clip.size
                              if w/h > VID_WIDTH/VID_HEIGHT: clip = clip.resize(height=VID_HEIGHT).crop(x_center=clip.w/2, width=VID_WIDTH)
                              else: clip = clip.resize(width=VID_WIDTH).crop(y_center=clip.h/2, height=VID_HEIGHT)
                              processed_vids.append(clip)
                          except: pass
                  
                  if not processed_vids:
                      print("🖼️ الاعتماد على الصورة الخلفية لعدم وجود فيديوهات...", flush=True)
                      bg = ImageClip("p.jpg").resize(height=VID_HEIGHT)
                      if bg.w > VID_WIDTH: bg = bg.crop(x_center=bg.w/2, width=VID_WIDTH)
                      processed_vids.append(bg.set_fps(VID_FPS))

                  # 2. تحديد الفواصل الزمنية لكل جملة (النقطة أو الفاصلة)
                  cut_times = [0.0]
                  for word in global_word_boundaries:
                      if word["text"][-1] in ['.', '،', '?', '!'] or word["text"] in ['.', '،', '?', '!']:
                          end_t = (word["offset"] + word["duration"]) / 10000000
                          cut_times.append(end_t)
                  
                  full_audio_clip = AudioFileClip("v.mp3")
                  if cut_times[-1] < full_audio_clip.duration:
                      cut_times.append(full_audio_clip.duration)

                  # 3. دمج فيديو مختلف لكل جملة بذكاء
                  final_clips = []
                  for i in range(len(cut_times)-1):
                      dur = cut_times[i+1] - cut_times[i]
                      if dur <= 0: continue
                      
                      bg_vid = random.choice(processed_vids)
                      if hasattr(bg_vid, 'duration') and bg_vid.duration is not None:
                          if bg_vid.duration < dur: bg_vid = vfx.loop(bg_vid, duration=dur)
                          else:
                              start_t = random.uniform(0, bg_vid.duration - dur)
                              bg_vid = bg_vid.subclip(start_t, start_t + dur)
                      else: # In case it's an ImageClip
                          bg_vid = bg_vid.set_duration(dur)
                          
                      final_clips.append(bg_vid)

                  # 4. الرندر المبدئي السريع للفيديو الصامت
                  base_video = concatenate_videoclips(final_clips, method="compose")
                  base_video.write_videofile("temp_base.mp4", fps=VID_FPS, codec="libx264", preset="ultrafast", audio=False, threads=4, logger=None)
                  
                  # تحرير الذاكرة
                  base_video.close()
                  for c in processed_vids: c.close()

                  # 5. بناء الطبقات العلوية (Overlay & Waves)
                  img = Image.new('RGBA', (VID_WIDTH, VID_HEIGHT), (0, 0, 0, 0))
                  draw = ImageDraw.Draw(img)
                  try: small_font = ImageFont.truetype("Roboto-Bold.ttf", 22)
                  except: small_font = ImageFont.load_default()
                  draw.text((40, VID_HEIGHT - 60), "This video is for entertainment purposes only.", font=small_font, fill=(255, 255, 255, 200))
                  img.save("overlay.png")

                  os.system('ffmpeg -i v.mp3 -filter_complex "[0:a]showwaves=s=400x150:colors=red:mode=cline,hue=H=t:s=1,format=rgba[v]" -map "[v]" -vcodec png temp_waves.avi -y -loglevel error')

                  # 6. الرندر النهائي الصاروخي عبر FFmpeg لدمج كل شيء في ثواني
                  print("⚡ جاري تطبيق الرندر الذكي والصاروخي...", flush=True)
                  ffmpeg_cmd = (
                      'ffmpeg -y -i temp_base.mp4 -i v.mp3 -i overlay.png '
                      '-i temp_waves.avi '
                      '-filter_complex "[0:v][2:v]overlay=0:0[bg_ol]; [bg_ol][3:v]overlay=W-w-20:40[with_waves]; [with_waves]ass=subs.ass[final]" '
                      '-map "[final]" -map 1:a -c:v libx264 -preset ultrafast -c:a aac out.mp4 -loglevel error'
                  )
                  os.system(ffmpeg_cmd)

                  if os.path.exists("out.mp4"):
                      if ENABLE_CATBOX_UPLOAD == 1: upload_to_catbox("out.mp4")
                      
                      yt_title = generate_youtube_title(data['title'], script)
                      yt_desc = generate_youtube_desc(data['title'], script)
                      thumb_path = create_youtube_thumbnail(yt_title)

                      if ENABLE_YOUTUBE_UPLOAD == 1 and 'YOUTUBE_CREDENTIALS' in os.environ:
                          print(f"📤 جاري الرفع إلى يوتيوب بعنوان:\n{yt_title}", flush=True)
                          try:
                              creds = Credentials.from_authorized_user_info(json.loads(os.environ['YOUTUBE_CREDENTIALS']))
                              youtube = build('youtube', 'v3', credentials=creds)
                              body = {
                                  'snippet': {
                                      'title': yt_title,
                                      'description': yt_desc + "\n\nThis video is for entertainment purposes only and complies with YouTube policies.",
                                      'categoryId': '24'
                                  },
                                  'status': {'privacyStatus': 'public', 'selfDeclaredMadeForKids': False}
                              }
                              req = youtube.videos().insert(part=','.join(body.keys()), body=body, media_body=MediaFileUpload("out.mp4", chunksize=-1, resumable=True))
                              res = req.execute()
                              
                              if os.path.exists(thumb_path):
                                  youtube.thumbnails().set(videoId=res['id'], media_body=MediaFileUpload(thumb_path)).execute()
                                  
                              print("✅ تم الرفع على يوتيوب بنجاح!")
                          except Exception as e: 
                              print(f"❌ فشل الرفع لليوتيوب: {e}")

                  with open(HISTORY_FILE, "a", encoding="utf-8") as f:
                      f.write(f"{data['title']}|{datetime.now().strftime('%Y-%m-%d')}\n")

          if __name__ == "__main__":
              asyncio.run(start_production())
              print("⏱️ الجلسة مستمرة لمدة 4 ساعات...")
              time.sleep(4 * 60 * 60)
          EOF
          python -u script.py

      - name: 💾 Commit History
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add shows_history.txt || true
          git commit -m "Update history" || true
          git push || true

      - name: ⏳ Persistence
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run "Perpetual Dual" --ref ${{ github.ref_name }}
