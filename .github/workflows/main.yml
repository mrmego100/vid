name: Perpetual Dual

on:
  workflow_dispatch:

concurrency:
  group: streaming-group
  cancel-in-progress: true

jobs:
  stream:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: 🧹 Delete Old Logs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 1

      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 🚀 Create and Run Script
        env:
          YOUTUBE_CREDENTIALS: ${{ secrets.YOUTUBE_CREDENTIALS }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: |
          sudo apt-get update -q
          # تثبيت أدوات التسجيل والخطوط (تم إزالة المتصفح لتسريع العملية)
          sudo apt-get install -y ffmpeg fonts-noto-core fonts-noto-extra curl -q
          
          # إعداد الخط العربي كما طلبت بالضبط (مُحدث للرابط المضمون)
          curl -sL "https://github.com/google/fonts/raw/main/ofl/notonaskharabic/NotoNaskhArabic-Bold.ttf" -o arabic.ttf || true
          sudo mkdir -p /usr/share/fonts/truetype/custom
          sudo cp arabic.ttf /usr/share/fonts/truetype/custom/ || true
          sudo fc-cache -fv || true
          
          # تثبيت المكتبات
          for i in {1..5}; do
            pip install --retries 10 requests bs4 "moviepy==1.0.3" "pillow==10.2.0" g4f tqdm nest_asyncio google-api-python-client google-auth-httplib2 google-auth-oauthlib numpy scipy edge-tts arabic-reshaper python-bidi -q && break || sleep 5
          done
          
          wget --tries=5 -q https://github.com/googlefonts/roboto/raw/main/src/hinted/Roboto-Bold.ttf
          
          cat << 'EOF' > script.py
          import os, asyncio, re, warnings, urllib3, requests, time, gc, json, random, subprocess
          import nest_asyncio
          import g4f
          from g4f.Provider import Blackbox, PollinationsAI, DuckDuckGo, ChatGptEs
          from bs4 import BeautifulSoup
          from tqdm import tqdm
          import numpy as np
          import edge_tts
          import arabic_reshaper
          from bidi.algorithm import get_display
          from PIL import Image, ImageDraw, ImageFont, ImageFilter, ImageOps

          import PIL.Image
          if not hasattr(PIL.Image, 'ANTIALIAS'):
              PIL.Image.ANTIALIAS = PIL.Image.LANCZOS

          from moviepy.editor import ImageClip, AudioFileClip, CompositeVideoClip, VideoFileClip, concatenate_videoclips, concatenate_audioclips, CompositeAudioClip
          import moviepy.video.fx.all as vfx
          import moviepy.audio.fx.all as afx
          from datetime import datetime
          from google.oauth2.credentials import Credentials
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaFileUpload

          # إيقاف محاولة قراءة الكوكيز نهائياً
          try:
              import g4f.cookies
              g4f.cookies.browsers = []
          except:
              pass

          nest_asyncio.apply()
          urllib3.disable_warnings(urllib3.exceptions.InsecureRequestWarning)
          warnings.filterwarnings("ignore", category=UserWarning)
          os.environ["IMAGEIO_FFMPEG_EXE"] = "ffmpeg"

          HISTORY_FILE = "shows_history.txt"

          # ---------------- الإعدادات ---------------- #
          ENABLE_YOUTUBE_UPLOAD = 1 # 0 لإيقاف الرفع، 1 للتشغيل
          ENABLE_CATBOX_UPLOAD = 0  # 0 لإيقاف الرفع، 1 للتشغيل لـ Catbox
          VOICE_NARRATOR = "ar-EG-ShakirNeural" # صوت السرد الموحد
          VID_WIDTH = 1280  # العرض
          VID_HEIGHT = 1400 # الطول
          VID_FPS = 30      # تقليل لـ 30 لتسريع الرندر مع فيديوهات Pexels
          
          # --- إعدادات كلمات السكربت --- #
          STORY_MIN_WORDS = 2000
          STORY_MAX_WORDS = 2500
          
          BAD_KEYWORDS = ["logo", "icon", "avatar", "brand", "header", "footer", "button", "banner", "sign"]
          
          SITES_CONFIG = [
              {"name": "ReelShort", "url": "https://www.reelshort.com/ar", "base": "https://www.reelshort.com"},
              {"name": "DramaBox", "url": "https://www.dramabox.com/ar", "base": "https://www.dramabox.com"},
              {"name": "FlexTV", "url": "https://flextv.cc/ar", "base": "https://flextv.cc"},
              {"name": "ShortTV", "url": "https://www.shorttv.live/ar", "base": "https://www.shorttv.live"}
          ]
          # ------------------------------------------- #

          # قائمة المزودين الآمنين لتخطي مشكلة .har
          SAFE_PROVIDERS = [PollinationsAI, Blackbox, DuckDuckGo, ChatGptEs]

          def is_valid_image(url, alt_text):
              url_lower = url.lower()
              alt_lower = alt_text.lower()
              if any(word in url_lower or word in alt_lower for word in BAD_KEYWORDS):
                  return False
              if "icon" in url_lower or "logo" in url_lower:
                  return False
              return True

          def get_data():
              print("🔍 جاري فحص المنصات لجلب مسلسل جديد...", flush=True)
              history = []
              if os.path.exists(HISTORY_FILE):
                  with open(HISTORY_FILE, "r", encoding="utf-8") as f:
                      for line in f:
                          if "|" in line: history.append(line.split("|")[0].strip())
              
              random.shuffle(SITES_CONFIG)
              headers = {
                  "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36",
                  "Accept-Language": "ar-EG,ar;q=0.9,en-US;q=0.8,en;q=0.7",
              }

              for site in SITES_CONFIG:
                  print(f"🔎 جاري فحص موقع: {site['name']}...", flush=True)
                  try:
                      response = requests.get(site['url'], headers=headers, timeout=25, verify=False)
                      if response.status_code != 200: continue

                      soup = BeautifulSoup(response.text, 'html.parser')
                      found_shows = []

                      scripts = soup.find_all('script')
                      for script in scripts:
                          if not script.string: continue
                          json_matches = re.findall(r'\{"id":.*?"title":"([^"]+)".*?"(?:cover|poster|image)":"([^"]+)"', script.string)
                          
                          for m_title, m_img in json_matches:
                              clean_title = m_title.encode().decode('unicode-escape').strip() if '\\u' in m_title else m_title.strip()
                              clean_title = re.sub(r'[a-zA-Z0-9]', '', clean_title).strip()
                              
                              if len(clean_title) > 3 and clean_title not in history:
                                  if is_valid_image(m_img, clean_title) and m_img.startswith('http'):
                                      found_shows.append({"title": clean_title, "image": m_img, "desc": f"دراما واقعية ومشوقة من منصة {site['name']}"})

                      if not found_shows:
                          for img in soup.find_all('img', alt=True):
                              raw_alt = img.get('alt', '').strip()
                              title = re.sub(r'[a-zA-Z0-9]', '', raw_alt).strip()
                              
                              if len(title) > 3 and title not in history:
                                  img_url = img.get('data-src') or img.get('data-original') or img.get('src') or img.get('srcset')
                                  if img_url:
                                      img_url = img_url.split(' ')[0] 
                                      if img_url.startswith('//'): img_url = "https:" + img_url
                                      if not img_url.startswith('http'): img_url = site['base'] + img_url
                                      
                                      if is_valid_image(img_url, raw_alt) and "base64" not in img_url:
                                          found_shows.append({"title": title, "image": img_url, "desc": f"دراما واقعية ومشوقة من منصة {site['name']}"})

                      if found_shows:
                          selected = random.choice(found_shows)
                          print(f"🎯 تم اختيار مسلسل: '{selected['title']}' من منصة {site['name']}", flush=True)
                          with open("p.jpg", "wb") as f: f.write(requests.get(selected['image'], headers=headers, verify=False).content)
                          return {"title": selected['title'], "desc": selected['desc']}

                  except Exception as e:
                      print(f"⚠️ خطأ في {site['name']}: {e}", flush=True)
                      continue
              return None

          # ----- نظام استخراج الكلمات المفتاحية لمقاطع Pexels -----
          def get_pexels_keyword(story_text):
              print("🧠 جاري استخراج كلمة مفتاحية مرئية للقصة لجلب فيديوهات Pexels...", flush=True)
              prompt = f"Read this drama story: '{story_text[:800]}...'. Provide 1 single English search keyword to find generic stock footage on Pexels that matches the vibe (e.g. 'dark city', 'sad man', 'luxury lifestyle', 'mystery', 'office'). Write only the keyword."
              for attempt, provider in enumerate(SAFE_PROVIDERS):
                  try:
                      res = g4f.ChatCompletion.create(model="gpt-4o", provider=provider, messages=[{"role":"user", "content": prompt}])
                      clean_res = re.sub(r'[^a-zA-Z\s]', '', res).strip()
                      if clean_res and len(clean_res.split()) <= 3:
                          return clean_res
                  except:
                      pass
              return "cinematic drama"

          # ----- نظام جلب الفيديوهات من Pexels -----
          def download_pexels_videos(keyword):
              print(f"📥 جاري البحث عن فيديوهات بخلفية '{keyword}' في Pexels...", flush=True)
              api_key = os.environ.get("PEXELS_API_KEY", "")
              if not api_key:
                  print("⚠️ لا يوجد PEXELS_API_KEY، سيتم تجاوز جلب الفيديوهات.")
                  return []
              
              headers = {"Authorization": api_key}
              url = f"https://api.pexels.com/videos/search?query={keyword}&per_page=15&orientation=portrait"
              downloaded = []
              
              try:
                  res = requests.get(url, headers=headers, timeout=20)
                  if res.status_code == 200:
                      videos = res.json().get("videos", [])
                      random.shuffle(videos)
                      
                      for i, v in enumerate(videos[:8]): 
                          files = v.get("video_files", [])
                          hd_files = [f for f in files if f.get("quality") == "hd"]
                          best_file = hd_files[0] if hd_files else (files[0] if files else None)
                          
                          if best_file:
                              link = best_file.get("link")
                              vid_path = f"pexels_{i}.mp4"
                              print(f"   -> تحميل مقطع {i+1}...")
                              with open(vid_path, "wb") as f:
                                  f.write(requests.get(link, timeout=30).content)
                              downloaded.append(vid_path)
              except Exception as e:
                  print(f"❌ خطأ أثناء تحميل فيديوهات Pexels: {e}")
              
              return downloaded

          def upload_to_catbox(filepath):
              print("📤 جاري الرفع إلى Catbox...", flush=True)
              try:
                  with open(filepath, 'rb') as f:
                      response = requests.post(
                          'https://catbox.moe/user/api.php',
                          data={'reqtype': 'fileupload'},
                          files={'fileToUpload': f}
                      )
                  if response.status_code == 200:
                      print(f"✅ تم الرفع على Catbox بنجاح، الرابط: {response.text}")
                  else:
                      print(f"❌ فشل الرفع على Catbox، كود الخطأ: {response.status_code}")
              except Exception as e:
                  print(f"❌ حدث خطأ أثناء الرفع لـ Catbox: {e}")

          # ----- نظام التأليف الذكي مع التبديل التلقائي -----
          def create_narrative_script(t, d):
              print(f"🤖 جاري تأليف قصة سردية ({STORY_MIN_WORDS}-{STORY_MAX_WORDS} كلمة) لمسلسل '{t}'...", flush=True)
              prompt = (f"أنت الآن راوي قصص محترف. اكتب قصة سردية طويلة جداً ومفصلة تروي أحداث مسلسل '{t}' بناءً على: {d}. "
                        f"شرط إجباري وحاسم: يجب أن يتراوح طول القصة بين {STORY_MIN_WORDS} إلى {STORY_MAX_WORDS} كلمة بالتمام والكمال. قم بزيادة الوصف وتوسيع الأحداث للوصول لهذا الطول. "
                        "يجب أن تبدأ القصة بـ 'هوك' (Hook) قوي جداً وصادم يخاطب المشاهد مباشرة (بصيغة أنت) لجذب انتباهه من الثواني الأولى. "
                        "ممنوع تماماً استخدام أسلوب الحوارات أو الردود المتبادلة. السرد يجب أن يكون متصلاً بلسان راوي واحد يحكي الأحداث بإثارة وتفصيل دقيق. "
                        "ممنوع استخدام أي رموز، أو أقواس، أو نجوم، أو أسماء شخصيات مسبوقة بنقطتين. "
                        "تحذير هام جداً: لا تكتب أي مقدمات أو ترحيب أو خاتمات (مثل: 'إليك القصة'، 'حسناً')، اكتب النص السردي للقصة مباشرة وفقط.")
              
              for attempt in range(6):
                  provider = SAFE_PROVIDERS[attempt % len(SAFE_PROVIDERS)]
                  try:
                      print(f"🔄 محاولة {attempt + 1} لتوليد السيناريو عبر {provider.__name__}...", flush=True)
                      response = g4f.ChatCompletion.create(model="gpt-4o", provider=provider, messages=[{"role":"user", "content": prompt}])
                      
                      if response and len(response.split()) > 150: 
                          clean_chunk = re.sub(r'[*#_\[\]()\-]', '', response).replace('\\', '').strip()
                          print(f"   -> ✅ تم توليد السيناريو بنجاح ({len(clean_chunk.split())} كلمة تقريبا).", flush=True)
                          return clean_chunk
                      else:
                          print("⚠️ الرد من السيرفر كان غير مكتمل، جاري التبديل لمزود آخر...", flush=True)
                  except Exception as e: 
                      print(f"❌ خطأ مع المزود {provider.__name__}: {e}", flush=True)
                  time.sleep(5)
              
              return ""

          # ----- توليد عنوان اليوتيوب -----
          def generate_youtube_title(show_title, story_text):
              print("🎯 جاري توليد عنوان يوتيوب ذكي ومضاد للانهيار...", flush=True)
              prompt = (f"قم بتأليف عنوان يوتيوب مثير جداً وجذاب لفيديو يحكي قصة. "
                        "يجب أن يكون العنوان بنفس هذا النمط وبناءً على أحداث القصة المرفقة: "
                        "'الجميع ظنه ضعيفًا! حتى رأوه يهزم أميرة الشمال ويدخل معسكر الأعداء وحده' "
                        f"استخرج حدثاً مشوقاً من هذه القصة: {story_text[:1000]}... "
                        "تحذير صارم جداً: اكتب جملة العنوان فقط لا غير. لا تكتب 'إليك العنوان' ولا تكتب أي شروحات أو مقدمات أو خاتمات. ممنوع استخدام أقواس أو رموز أو اسم المسلسل في العنوان. أريد جملة العنوان فقط.")
              
              for attempt, provider in enumerate(SAFE_PROVIDERS[:3]):
                  try:
                      raw_title = g4f.ChatCompletion.create(model="gpt-4o", provider=provider, messages=[{"role":"user", "content": prompt}])
                      clean_title = raw_title.replace('"', '').replace('[', '').replace(']', '').replace('*', '').replace(' العنوان', '').replace('جملة', '').strip()
                      if len(clean_title) > 95: clean_title = clean_title[:95] + "..."
                      return clean_title
                  except Exception as e:
                      time.sleep(3)
              return "الجميع ظنه ضعيفًا! حتى رأوه يقلب الموازين ويصدم الجميع بقوته"

          # ----- توليد وصف اليوتيوب -----
          def generate_youtube_desc(show_title, story_text):
              print("📝 جاري توليد وصف يوتيوب مدمج ومتفرق...", flush=True)
              prompt = (f"اكتب وصفاً لفيديو يوتيوب يحكي قصة. "
                        f"القصة: {story_text[:600]}... "
                        f"شروط الوصف: 1. اسم المسلسل هو '{show_title}'. ممنوع منعاً باتاً كتابة الاسم كاملاً متصلاً. يجب أن تأخذ كل كلمة من كلمات الاسم وتضعها متفرقة ومبعثرة في جمل مختلفة داخل الوصف بشكل يبدو طبيعياً جداً كجزء من سياق القصة. "
                        "2. أضف الكلمات المفتاحية: 'مدبلج'، 'كامل'، 'مترجم' مبعثرة ومتفرقة بشكل طبيعي ومندمج في السياق، لا تضعها بجانب بعضها أو في أقواس. "
                        "3. تحذير صارم جداً: اكتب نص الوصف للقصة فقط لا غير. ممنوع كتابة أي مقدمات أو ردود حوارية مثل 'بالتأكيد' أو 'تفضل الوصف'. ممنوع استخدام النجوم (**) أو الأقواس للتحديد.")
              
              for attempt, provider in enumerate(SAFE_PROVIDERS[:3]):
                  try:
                      raw_desc = g4f.ChatCompletion.create(model="gpt-4o", provider=provider, messages=[{"role":"user", "content": prompt}])
                      clean_desc = re.sub(r'(حسنا|بالتأكيد|إليك|تفضل|بالتحديد|هذا هو|الوصف|:\n|^\n)', '', raw_desc, flags=re.IGNORECASE).strip()
                      return clean_desc
                  except Exception as e:
                      time.sleep(3)
                      
              words = show_title.split()
              desc_fallback = "أحداث نارية ومشوقة! "
              for w in words: desc_fallback += f"نرى كيف تغيرت الأقدار مع {w}. "
              desc_fallback += "تابع القصة كاملة هنا. مسلسل رائع مدبلج وتستطيع مشاهدته مترجم بأفضل جودة."
              return desc_fallback

          # ----- تصميم الصورة المصغرة -----
          def create_youtube_thumbnail(title_text):
              print("🖼️ جاري تصميم الصورة المصغرة...", flush=True)
              font_path = "NotoNaskhArabic-Bold.ttf"
              if not os.path.exists(font_path):
                  print("⬇️ جاري تحميل الخط العربي للصورة المصغرة...", flush=True)
                  font_url = "https://github.com/google/fonts/raw/main/ofl/notonaskharabic/NotoNaskhArabic-Bold.ttf"
                  try:
                      with open(font_path, "wb") as f:
                          f.write(requests.get(font_url, verify=False).content)
                  except Exception as e:
                      pass

              try:
                  width, height = 1280, 720
                  if os.path.exists("p.jpg"):
                      try:
                          img = Image.open("p.jpg").convert('RGB')
                          w, h = img.size
                          zoom_w = int(w * 0.6)
                          zoom_h = int(zoom_w / (width / height))
                          left = (w - zoom_w) / 2
                          top = (h - zoom_h) / 2
                          right = (w + zoom_w) / 2
                          bottom = (h + zoom_h) / 2
                          img = img.crop((left, top, right, bottom))
                          img = img.resize((width, height), resample=PIL.Image.LANCZOS)
                          img = img.filter(ImageFilter.GaussianBlur(radius=25))
                      except:
                          img = Image.new('RGB', (width, height), color=(15, 15, 25))
                  else:
                      img = Image.new('RGB', (width, height), color=(15, 15, 25))

                  overlay = Image.new('RGBA', (width, height), (0, 0, 0, 60))
                  img.paste(overlay, (0, 0), overlay)
                  draw = ImageDraw.Draw(img)

                  emojis = [" 🍿", " 🔥", " 😱", " 🎬", " ✨", " 🌟"]
                  emoji = random.choice(emojis)
                  
                  reshaped_text = arabic_reshaper.reshape(title_text + emoji)
                  bidi_text = get_display(reshaped_text)
                  
                  try: font = ImageFont.truetype(font_path, 110)
                  except: font = ImageFont.load_default()
                  
                  def wrap_text(text, font, max_width):
                      lines = []
                      words = text.split()
                      while words:
                          line = ''
                          while words and font.getlength(line + words[0] + ' ') <= max_width:
                              line += (words.pop(0) + ' ')
                          lines.append(line.strip())
                      return lines
                  
                  lines = wrap_text(bidi_text, font, width - 200)
                  line_height = 140
                  total_height = len(lines) * line_height
                  y_text = (height - total_height) / 2
                  
                  for line in lines:
                      text_width = font.getlength(line)
                      x_text = (width - text_width) / 2
                      for offset in range(3, 10): 
                          draw.text((x_text+offset, y_text+offset), line, font=font, fill=(0,0,0, 150))
                          draw.text((x_text-offset, y_text-offset), line, font=font, fill=(0,0,0, 150))
                          draw.text((x_text+offset, y_text-offset), line, font=font, fill=(0,0,0, 150))
                          draw.text((x_text-offset, y_text+offset), line, font=font, fill=(0,0,0, 150))
                      draw.text((x_text, y_text), line, font=font, fill=(255, 255, 255))
                      y_text += line_height
                  
                  img.save("thumbnail.jpg")
                  return "thumbnail.jpg"
              except Exception as e:
                  print(f"❌ خطأ في صنع الصورة المصغرة: {e}")
                  Image.new('RGB', (1280, 720), color="black").save("thumbnail.jpg")
                  return "thumbnail.jpg"

          # ----- نظام الترجمة المستقل -----
          async def process_audio_and_subs(script):
              if not script: return False
              print("🎙️ معالجة الصوت وبناء ملف الترجمة ASS يدوياً...", flush=True)
              try:
                  communicate = edge_tts.Communicate(script, VOICE_NARRATOR, rate="+4%")
                  word_boundaries = []
                  
                  with open("v.mp3", "wb") as file:
                      async for chunk in communicate.stream():
                          if chunk["type"] == "audio":
                              file.write(chunk["data"])
                          elif chunk["type"] == "WordBoundary":
                              word_boundaries.append(chunk)
                  
                  ass_header = """[Script Info]
          ScriptType: v4.00+

          [V4+ Styles]
          Format: Name, Fontname, Fontsize, PrimaryColour, BackColour, Bold, Italic, BorderStyle, Outline, Shadow, Alignment, MarginL, MarginR, MarginV, Encoding
          Style: Default,Noto Naskh Arabic,64,&H00FFFFFF,&H00000000,0,0,1,3,0,2,20,20,20,1

          [Events]
          Format: Layer, Start, End, Style, Text
          """
                  ass_lines = []
                  
                  def format_ass_time(seconds):
                      h = int(seconds // 3600)
                      m = int((seconds % 3600) // 60)
                      s = seconds % 60
                      return f"{h}:{m:02d}:{s:05.2f}"

                  words_per_line = 6
                  for i in range(0, len(word_boundaries), words_per_line):
                      group = word_boundaries[i:i+words_per_line]
                      start_time = group[0]["offset"] / 10000000
                      end_time = (group[-1]["offset"] + group[-1]["duration"]) / 10000000 + 0.1
                      text = " ".join([w["text"] for w in group])
                      ass_lines.append(f"Dialogue: 0,{format_ass_time(start_time)},{format_ass_time(end_time)},Default,{text}")

                  with open("subs.ass", "w", encoding="utf-8") as f:
                      f.write(ass_header + "\n".join(ass_lines))
                      
                  return True
              except Exception as e:
                  print(f"❌ خطأ في توليد الصوت والترجمة: {e}")
                  return False

          async def start_production():
              data = get_data()
              if not data: 
                  print("⚠️ لم يتم العثور على أي مسلسل جديد.")
                  return
              
              script = create_narrative_script(data['title'], data['desc'])
              if len(script.split()) < 10: 
                  print("⚠️ السيناريو قصير جداً، تم إلغاء العملية.")
                  return
              
              if await process_audio_and_subs(script):
                  print("🎬 بدء المونتاج السينمائي ودمج الفيديوهات وحرق الترجمة...", flush=True)
                  
                  aud = AudioFileClip("v.mp3")
                  target_duration = aud.duration
                  
                  # 1. جلب الكلمات المفتاحية وتحميل الفيديوهات من Pexels
                  pex_keyword = get_pexels_keyword(script)
                  downloaded_videos = download_pexels_videos(pex_keyword)
                  
                  clips_to_concat = []
                  current_time = 0
                  
                  # 2. تجميع الفيديوهات لتغطي مدة الصوت
                  if downloaded_videos:
                      print("🎞️ جاري قص ودمج الفيديوهات المحملة...", flush=True)
                      while current_time < target_duration:
                          for vp in downloaded_videos:
                              if current_time >= target_duration:
                                  break
                              try:
                                  clip = VideoFileClip(vp).without_audio()
                                  
                                  clip = clip.resize(height=VID_HEIGHT)
                                  if clip.w < VID_WIDTH:
                                      clip = clip.resize(width=VID_WIDTH)
                                  
                                  clip = clip.crop(x_center=clip.w/2, y_center=clip.h/2, width=VID_WIDTH, height=VID_HEIGHT)
                                  
                                  clips_to_concat.append(clip)
                                  current_time += clip.duration
                              except Exception as e:
                                  print(f"⚠️ خطأ في معالجة المقطع {vp}: {e}")
                  
                  # 3. بناء الفيديو الأساسي 
                  if clips_to_concat:
                      base = concatenate_videoclips(clips_to_concat, method="compose")
                      base = base.subclip(0, target_duration)
                  else:
                      print("⚠️ تنبيه: فشل جلب فيديوهات Pexels، سيتم استخدام صورة البوستر كخلفية.", flush=True)
                      base = ImageClip("p.jpg").resize(height=VID_HEIGHT).set_duration(target_duration)
                      if base.w > VID_WIDTH:
                          base = base.crop(x_center=base.w/2, width=VID_WIDTH)
                  
                  base = base.set_audio(aud)
                  
                  # طبقة حقوق النشر
                  img = Image.new('RGBA', (VID_WIDTH, VID_HEIGHT), (0, 0, 0, 0))
                  draw = ImageDraw.Draw(img)
                  try: small_font = ImageFont.truetype("Roboto-Bold.ttf", 22)
                  except: small_font = ImageFont.load_default()
                  disclaimer = "This video is for entertainment purposes only."
                  draw.text((40, VID_HEIGHT - 60), disclaimer, font=small_font, fill=(255, 255, 255, 200))
                  img.save("overlay.png")
                  overlay = ImageClip("overlay.png").set_duration(target_duration)
                  
                  # الموجات الصوتية
                  os.system(f'ffmpeg -i v.mp3 -filter_complex "[0:a]showwaves=s=400x150:colors=red:mode=cline,hue=H=t:s=1,format=yuv420p[v]" -map "[v]" -c:v libx264 temp_waves.mp4 -y -loglevel quiet')
                  
                  if os.path.exists("temp_waves.mp4"):
                      waves = VideoFileClip("temp_waves.mp4").without_audio().fx(vfx.mask_color, color=[0,0,0], thr=10, s=5).set_position((VID_WIDTH - 430, 40)).set_opacity(0.9)
                      final_vid = CompositeVideoClip([base, overlay, waves])
                  else:
                      final_vid = CompositeVideoClip([base, overlay])
                      
                  final_vid = final_vid.set_audio(base.audio)
                  
                  print("⏳ جاري حفظ الفيديو الأساسي النهائي...", flush=True)
                  final_vid.write_videofile("temp_out.mp4", fps=VID_FPS, codec="libx264", audio_codec="aac", verbose=False, logger=None)
                  
                  aud.close()
                  base.close()
                  overlay.close()
                  
                  print("✍️ جاري حرق الترجمة العربية (ASS) على الفيديو...", flush=True)
                  os.system('ffmpeg -y -i temp_out.mp4 -vf "ass=subs.ass" -c:a copy out.mp4 -loglevel quiet')
                  
                  if not os.path.exists("out.mp4"):
                      os.rename("temp_out.mp4", "out.mp4")

                  if os.path.exists("out.mp4"):
                      if ENABLE_CATBOX_UPLOAD == 1:
                          upload_to_catbox("out.mp4")
                      
                      yt_title = generate_youtube_title(data['title'], script)
                      yt_desc = generate_youtube_desc(data['title'], script)
                      thumb_path = create_youtube_thumbnail(yt_title)

                      if ENABLE_YOUTUBE_UPLOAD == 1 and 'YOUTUBE_CREDENTIALS' in os.environ:
                          print(f"📤 جاري الرفع إلى يوتيوب بعنوان مشوق وضخم:\n{yt_title}", flush=True)
                          try:
                              creds = Credentials.from_authorized_user_info(json.loads(os.environ['YOUTUBE_CREDENTIALS']))
                              youtube = build('youtube', 'v3', credentials=creds)
                              body = {
                                  'snippet': {
                                      'title': yt_title,
                                      'description': yt_desc + "\n\nThis video is for entertainment purposes only and complies with YouTube policies.",
                                      'categoryId': '24'
                                  },
                                  'status': {'privacyStatus': 'public', 'selfDeclaredMadeForKids': False}
                              }
                              req = youtube.videos().insert(part=','.join(body.keys()), body=body, media_body=MediaFileUpload("out.mp4", chunksize=-1, resumable=True))
                              res = req.execute()
                              
                              if os.path.exists(thumb_path):
                                  print("🖼️ رفع الصورة المصغرة الاحترافية الجديدة...", flush=True)
                                  youtube.thumbnails().set(videoId=res['id'], media_body=MediaFileUpload(thumb_path)).execute()
                                  
                              print("✅ تم الرفع على يوتيوب بنجاح!")
                          except Exception as e: 
                              print(f"❌ فشل الرفع لليوتيوب: {e}")
                      else:
                          print("⏸️ تم إيقاف الرفع لليوتيوب بناءً على الإعدادات أو لعدم وجود Credentials.")

                      with open(HISTORY_FILE, "a", encoding="utf-8") as f:
                          f.write(f"{data['title']}|{datetime.now().strftime('%Y-%m-%d')}\n")

          if __name__ == "__main__":
              asyncio.run(start_production())
              print("⏱️ الجلسة مستمرة لمدة 4 ساعات...")
              time.sleep(4 * 60 * 60)
          EOF
          python -u script.py

