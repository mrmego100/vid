name: Perpetual Dual

on:
  workflow_dispatch:

concurrency:
  group: streaming-group
  cancel-in-progress: true

jobs:
  stream:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: 🧹 Delete Old Logs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 1

      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 🚀 Create and Run Script
        env:
          YOUTUBE_CREDENTIALS: ${{ secrets.YOUTUBE_CREDENTIALS }}
        run: |
          pip install requests bs4 "moviepy==1.0.3" "pillow==10.2.0" g4f edge-tts tqdm nest_asyncio google-api-python-client google-auth-httplib2 google-auth-oauthlib -q
          
          cat << 'EOF' > script.py
          # ==========================================
          # استدعاء جميع المكتبات
          # ==========================================
          import os, asyncio, re, warnings, urllib3, requests, time, gc, json, random
          import nest_asyncio
          import g4f
          import edge_tts
          from bs4 import BeautifulSoup
          from tqdm import tqdm

          # --- حل مشكلة PIL.Image.ANTIALIAS مع MoviePy ---
          import PIL.Image
          if not hasattr(PIL.Image, 'ANTIALIAS'):
              PIL.Image.ANTIALIAS = PIL.Image.LANCZOS
          # -----------------------------------------------

          from moviepy.editor import ImageClip, AudioFileClip
          from datetime import datetime, timedelta
          from google.oauth2.credentials import Credentials
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaFileUpload

          # ==========================================
          # إعدادات بيئة العمل
          # ==========================================
          nest_asyncio.apply()
          urllib3.disable_warnings(urllib3.exceptions.InsecureRequestWarning)
          warnings.filterwarnings("ignore", category=UserWarning)
          os.environ["IMAGEIO_FFMPEG_EXE"] = "ffmpeg"
          os.environ["SDL_VIDEODRIVER"] = "dummy"

          HISTORY_FILE = "shows_history.txt"

          # ==========================================
          # دوال إنشاء الفيديو الجديدة
          # ==========================================
          def get_data():
              history_titles = []
              if os.path.exists(HISTORY_FILE):
                  with open(HISTORY_FILE, "r", encoding="utf-8") as f:
                      for line in f:
                          if "|" in line:
                              history_titles.append(line.split("|")[0].strip())

              base = "https://www.shorttv.live"
              try:
                  r = requests.get(f"{base}/ar", headers={"User-Agent": "Mozilla/5.0"}, verify=False, timeout=10)
                  soup = BeautifulSoup(r.text, 'html.parser')
                  
                  links = soup.find_all('a', href=True)
                  random.shuffle(links)

                  for a in links:
                      img = a.find('img')
                      if not img: continue
                      title = re.sub(r'[a-zA-Z]', '', img.get('alt', '')).strip()
                      if len(title) < 5: continue
                      
                      if title in history_titles:
                          continue 
                      
                      s_url = a['href'] if a['href'].startswith('http') else base + a['href']
                      s_page = requests.get(s_url, verify=False, timeout=5)
                      s_soup = BeautifulSoup(s_page.text, 'html.parser')
                      meta = s_soup.find('meta', attrs={'name': 'description'})
                      desc = meta.get('content', '') if meta else "قصة درامية مشوقة"
                      
                      i_url = img.get('src') or img.get('data-src')
                      if i_url.startswith('//'): i_url = "https:" + i_url
                      
                      img_data = requests.get(i_url).content
                      with open("p.jpg", "wb") as f: f.write(img_data)
                      return {"title": title, "desc": desc}
              except Exception as e:
                  return None
              
              return None

          async def make_audio(text):
              clean_text = re.sub(r'[^\u0600-\u06FF\s،.]', '', text)
              communicate = edge_tts.Communicate(clean_text, "ar-KW-NouraNeural", rate="+12%")
              await communicate.save("v.mp3")

          def create_story(t, d):
              full_story = ""
              current_context = d
              print(f"🔄 البدء في توليد الملحمة (Target: 2500 - 3000 words)...")
              
              iteration = 1
              max_iterations = 50 # حاجز أمان لمنع التكرار اللانهائي
              
              # الاستمرار في التوليد حتى نصل لـ 2500 كلمة
              while len(full_story.split()) < 2500 and iteration <= max_iterations:
                  success = False
                  for attempt in range(5):
                      try:
                          if iteration == 1:
                              prompt = (f"اكتب بداية ملحمية ومفصلة جداً لقصة درامية بعنوان {t} بناءً على الوصف: {current_context}. "
                                        f"يجب أن تكون باللغة العربية الفصحى، بأسلوب روائي أدبي ثقيل. "
                                        f"اكتب فقرة طويلة جداً لا تقل عن 400 كلمة. "
                                        f"ركز على أدق التفاصيل في المشهد الأول، الألوان، الروائح، والمشاعر. "
                                        f"اجعل النص مسترسلاً بدون أرقام أو رموز.")
                          else:
                              prompt = (f"أكمل القصة السابقة بحدث درامي جديد ومفصل جداً. "
                                        f"آخر ما حدث هو: {full_story[-800:]}. "
                                        f"اكتب فقرة طويلة جداً لا تقل عن 400 كلمة. "
                                        f"زد من تعقيد الأحداث وتعمق في الحوارات الداخلية للشخصيات. "
                                        f"تذكر: فقرة واحدة مسترسلة، لغة عربية فصحى فقط بدون أرقام أو رموز.")

                          response = g4f.ChatCompletion.create(
                              model=g4f.models.gpt_4,
                              messages=[{"role":"user", "content": prompt}]
                          )
                          
                          if response and len(response) > 200:
                              chunk = re.sub(r'[*#\-]', '', response).strip()
                              full_story += " " + chunk
                              success = True
                              current_words = len(full_story.split())
                              print(f"✅ تم توليد الجزء {iteration} بنجاح. (إجمالي الكلمات حتى الآن: {current_words})")
                              break
                          else:
                              print(f"⚠️ استجابة قصيرة في الجزء {iteration} (محاولة {attempt+1})...")
                              time.sleep(2)
                      except Exception as e:
                          print(f"⚠️ محاولة فاشلة في الجزء {iteration} (محاولة {attempt+1})...")
                          time.sleep(5)
                  
                  if not success:
                      print(f"❌ تعذر استكمال الأجزاء التالية، سيتم الاكتفاء بما تم جمعه.")
                      break
                      
                  iteration += 1
                  time.sleep(2) 
                  
                  # التأكد من عدم تجاوز الـ 3000 كلمة بكثير
                  words = full_story.split()
                  if len(words) >= 3000:
                      full_story = " ".join(words[:3000])
                      print(f"✂️ تم الوصول للحد الأقصى وتم ضبط القصة لتكون بحدود 3000 كلمة.")
                      break
              
              return full_story.strip() if full_story else f"ملخص من وحي الخيال من قصة مسلسل  {t}."

          def upload_to_catbox(path):
              try:
                  url = "https://catbox.moe/user/api.php"
                  data = {"reqtype": "fileupload"}
                  with open(path, "rb") as f:
                      files = {"fileToUpload": f}
                      response = requests.post(url, data=data, files=files)
                  return response.text.strip()
              except: return "Error during upload"

          async def start_video_creation():
              with tqdm(total=5, desc="🚀 العمل جاري", unit="step", bar_format='{l_bar}{bar}| {n_fmt}/{total_fmt} [{elapsed}]') as pbar:
                  pbar.set_description("🔍 جلب البيانات")
                  data = get_data()
                  if not data: 
                      pbar.write("❌ فشل في جلب البيانات، إما بسبب التكرار أو خطأ في الاتصال.")
                      return None
                  
                  t = data['title']
                  pbar.write(f"🎬 العنوان المستهدف: {t}")
                  pbar.update(1)

                  pbar.set_description("🤖 تأليف الملحمة الطويلة")
                  ai_story = create_story(t, data['desc'])
                  fixed_intro = f"أهلاً بكم. اليوم سنروي لكم حكاية ملخصة من مسلسلنا الشهير {t}. فهيا بنا يا رفاق. "
                  final_story_text = fixed_intro + ai_story
                  word_count = len(final_story_text.split())
                  pbar.write(f"📖 الطول النهائي للقصة: {word_count} كلمة.")
                  pbar.update(1)

                  pbar.set_description("🎙️ توليد الصوت")
                  await make_audio(final_story_text)
                  pbar.update(1)

                  pbar.set_description("🎬 مونتاج الفيديو")
                  final_video_name = "out.mp4"
                  try:
                      aud = AudioFileClip("v.mp3")
                      vid = ImageClip("p.jpg").set_duration(aud.duration).set_audio(aud).set_fps(24)
                      vid = vid.resize(height=720) 
                      vid.write_videofile(final_video_name, codec="libx264", audio_codec="aac", temp_audiofile='temp-audio.m4a', remove_temp=True, verbose=False, logger=None)
                      aud.close(); vid.close()
                  except Exception as e:
                      pbar.write(f"Video Error: {e}")
                      return None
                  pbar.update(1)

                  pbar.set_description("☁️ رفع الفيديو")
                  link = upload_to_catbox(final_video_name)
                  pbar.update(1)
                  pbar.write(f"\n✅ تم الانتهاء بنجاح! الرابط: {link}")
                  
                  return t

          # ==========================================
          # حلقة التكرار اللانهائية لإنتاج الفيديوهات تباعاً
          # ==========================================
          SCRIPT_START_TIME = time.time()
          MAX_RUNTIME_SECONDS = 4 * 60 * 60

          while True:
              if time.time() - SCRIPT_START_TIME > MAX_RUNTIME_SECONDS:
                  print("\n" + "="*60)
                  print("⏳ اكتملت 4 ساعات من العمل المستمر. سيتم إنهاء الجلسة الحالية وبدء جلسة جديدة...")
                  print("="*60)
                  break

              print("\n" + "="*60)
              print("🔄 بدء دورة جديدة لإنتاج فيديو...")
              print("="*60)

              try:
                  loop = asyncio.get_event_loop()
                  video_title = loop.run_until_complete(start_video_creation())

                  if video_title and os.path.exists("out.mp4"):
                      print("\n[6/6] 📤 جاري الرفع إلى يوتيوب (يرجى الانتظار حتى تكتمل العملية)...")
                      try:
                          if 'YOUTUBE_CREDENTIALS' in os.environ:
                              creds_data = json.loads(os.environ['YOUTUBE_CREDENTIALS'])
                              creds = Credentials.from_authorized_user_info(creds_data)
                              youtube = build('youtube', 'v3', credentials=creds)
                              video_number = len(open(HISTORY_FILE).readlines()) if os.path.exists(HISTORY_FILE) else 1

                              raw_yt_title = f"{video_title} السلسلة الكاملة والمدبلجة بالعربي "
                              if not raw_yt_title.strip(): raw_yt_title = f"#{video_number}"
                              if len(raw_yt_title) > 95: raw_yt_title = raw_yt_title[:95] + "..."

                              body = {
                                  'snippet': {'title': raw_yt_title, 'description': f'ملخص ومراجعة مسلسل {video_title}', 'categoryId': '24'},
                                  'status': {'privacyStatus': 'public', 'selfDeclaredMadeForKids': False}
                              }
                              media = MediaFileUpload("out.mp4", chunksize=-1, resumable=True)
                              response = youtube.videos().insert(part=','.join(body.keys()), body=body, media_body=media).execute()
                              print(f"✅ تم الرفع ليوتيوب بنجاح: https://www.youtube.com/watch?v={response['id']}")

                              with open(HISTORY_FILE, "a", encoding="utf-8") as f:
                                  f.write(f"{video_title}|{datetime.now().strftime('%Y-%m-%d')}\n")
                      except Exception as e:
                          print(f"❌ فشل يوتيوب: {e}")

              except Exception as e:
                  print(f"❌ حدث خطأ غير متوقع: {e}")

              for f in os.listdir():
                  if f.endswith((".mp3", ".wav", ".jpg", ".webp", ".mp4", ".m4a")) and f != "fallback.webp":
                      try: os.remove(f)
                      except: pass

              print("\n" + "="*50)
              print("✅ تم الانتهاء من الدورة الحالية!")
              print("⏳ جاري الانتظار 60 ثانية قبل البدء في إنتاج الفيديو التالي...")
              print("="*50)

              time.sleep(60)
          EOF
          python script.py

      - name: 💾 Commit History to Repository
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add shows_history.txt || true
          git commit -m "📝 Update trends history" || true
          git push || true

      - name: ⏳ Workflow Persistence (Auto-restart)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "جاري إعادة تشغيل الأكشن لضمان العمل المستمر (Perpetual Dual)..."
          gh workflow run "Perpetual Dual" --ref ${{ github.ref_name }}
