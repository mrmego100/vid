name: Perpetual Dual

on:
  workflow_dispatch:

concurrency:
  group: streaming-group
  cancel-in-progress: true

jobs:
  stream:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: 🧹 Delete Old Logs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 1

      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 🚀 Create and Run Script
        env:
          YOUTUBE_CREDENTIALS: ${{ secrets.YOUTUBE_CREDENTIALS }}
        run: |
          sudo apt-get update -q
          sudo apt-get install -y ffmpeg -q
          
          pip install requests bs4 "moviepy==1.0.3" "pillow==10.2.0" g4f tqdm nest_asyncio google-api-python-client google-auth-httplib2 google-auth-oauthlib numpy scipy edge-tts -q
          
          wget -q https://github.com/googlefonts/roboto/raw/main/src/hinted/Roboto-Bold.ttf
          
          cat << 'EOF' > script.py
          import os, asyncio, re, warnings, urllib3, requests, time, gc, json, random
          import nest_asyncio
          import g4f
          from bs4 import BeautifulSoup
          from tqdm import tqdm
          import numpy as np
          import edge_tts
          from PIL import Image, ImageDraw, ImageFont

          import PIL.Image
          if not hasattr(PIL.Image, 'ANTIALIAS'):
              PIL.Image.ANTIALIAS = PIL.Image.LANCZOS

          from moviepy.editor import ImageClip, AudioFileClip, CompositeVideoClip, VideoFileClip, concatenate_audioclips
          import moviepy.video.fx.all as vfx
          from datetime import datetime
          from google.oauth2.credentials import Credentials
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaFileUpload

          nest_asyncio.apply()
          urllib3.disable_warnings(urllib3.exceptions.InsecureRequestWarning)
          warnings.filterwarnings("ignore", category=UserWarning)
          os.environ["IMAGEIO_FFMPEG_EXE"] = "ffmpeg"
          os.environ["SDL_VIDEODRIVER"] = "dummy"

          HISTORY_FILE = "shows_history.txt"

          # إعدادات الأصوات المتعددة
          VOICE_RAWI = "ar-SA-NaayfNeural" 
          VOICE_MALE = "ar-EG-ShakirNeural"
          VOICE_FEMALE = "ar-AE-HamdanNeural"

          def get_data():
              print("🔍 جاري جلب البيانات من المصدر...", flush=True)
              history_titles = []
              if os.path.exists(HISTORY_FILE):
                  with open(HISTORY_FILE, "r", encoding="utf-8") as f:
                      for line in f:
                          if "|" in line:
                              history_titles.append(line.split("|")[0].strip())

              base = "https://www.shorttv.live"
              try:
                  r = requests.get(f"{base}/ar", headers={"User-Agent": "Mozilla/5.0"}, verify=False, timeout=10)
                  soup = BeautifulSoup(r.text, 'html.parser')
                  links = soup.find_all('a', href=True)
                  random.shuffle(links)

                  for a in links:
                      img = a.find('img')
                      if not img: continue
                      title = re.sub(r'[a-zA-Z]', '', img.get('alt', '')).strip()
                      if len(title) < 5 or title in history_titles: continue
                      
                      target_url = a['href'] if a['href'].startswith('http') else base + a['href']
                      s_page = requests.get(target_url, verify=False, timeout=5)
                      s_soup = BeautifulSoup(s_page.text, 'html.parser')
                      meta = s_soup.find('meta', attrs={'name': 'description'})
                      desc = meta.get('content', '') if meta else "قصة درامية مشوقة"
                      
                      i_url = img.get('src') or img.get('data-src')
                      if i_url.startswith('//'): i_url = "https:" + i_url
                      
                      with open("p.jpg", "wb") as f: f.write(requests.get(i_url).content)
                      print(f"🎬 المسلسل المستهدف: {title}", flush=True)
                      return {"title": title, "desc": desc}
              except: return None
              return None

          def create_script(t, d):
              print("🤖 جاري تأليف السيناريو الملحمي (Hook + Story)...", flush=True)
              prompt = (f"اكتب سيناريو درامي احترافي لمسلسل بعنوان '{t}' بناءً على: {d}. "
                        "نظام الكتابة يجب أن يكون كالتالي ومقسماً بالوسوم: "
                        "1. [MALE] أو [FEMALE]: ابدأ بـ Hook (موقف صادم وحوار سريع جداً وقوي لا يتعدى 20 كلمة). "
                        "2. [RAWI]: ادخل بوصف عميق للقصة وجوهر المسلسل. "
                        "3. حوار متداخل بين [MALE] و [FEMALE] و [RAWI] لتلخيص أحداث المسلسل بأسلوب مشوق. "
                        "**قواعد:** "
                        "- لا تذكر أسماء الشخصيات. "
                        "- استخدم لغة عربية فصحى درامية. "
                        "- إذا كان المشهد فيه غضب، اكتب الكلمة (بغضب) أو (بصراخ) في بداية الجملة. "
                        "- النص الإجمالي 300-400 كلمة.")
              try:
                  response = g4f.ChatCompletion.create(model=g4f.models.gpt_4, messages=[{"role":"user", "content": prompt}])
                  return response.strip()
              except: return ""

          async def process_audio(script):
              print("🎙️ جاري توليد الأصوات المتعددة مع تحليل المشاعر...", flush=True)
              segments = re.findall(r'\[(RAWI|MALE|FEMALE)\](.*?)(?=\[(?:RAWI|MALE|FEMALE)\]|$)', script, re.DOTALL)
              clips = []
              
              anger_keywords = ['بغضب', 'بصراخ', 'خيانة', 'انفجار', 'صدمة', 'يصرخ', 'مستحيل', 'توقف']

              for i, (role, text) in enumerate(segments):
                  text = text.strip()
                  if not text: continue
                  
                  # تحديد السرعة بناءً على المشاعر
                  rate = "+20%" if any(word in text for word in anger_keywords) else "+2%"
                  voice = VOICE_RAWI if role == "RAWI" else (VOICE_MALE if role == "MALE" else VOICE_FEMALE)
                  
                  # تنظيف النص
                  clean_text = re.sub(r'\(.*?\)', '', text).strip()
                  
                  filename = f"seg_{i}.mp3"
                  communicate = edge_tts.Communicate(clean_text, voice, rate=rate)
                  await communicate.save(filename)
                  clips.append(AudioFileClip(filename))
                  
                  # وقفة قصيرة جداً
                  silence = AudioFileClip(filename).volumex(0).set_duration(0.2)
                  clips.append(silence)

              if clips:
                  final_aud = concatenate_audioclips(clips)
                  final_aud.write_audiofile("v.mp3", fps=44100, verbose=False, logger=None)
                  return True
              return False

          async def start_job():
              data = get_data()
              if not data: return
              
              script_text = create_script(data['title'], data['desc'])
              if not script_text: return
              
              if await process_audio(script_text):
                  print("🎬 جاري المونتاج النهائي بتصميم MegoDrama...", flush=True)
                  # 1. تصميم اللوجو
                  img = Image.new('RGBA', (500, 150), (0, 0, 0, 0))
                  draw = ImageDraw.Draw(img)
                  try: font = ImageFont.truetype("Roboto-Bold.ttf", 65)
                  except: font = ImageFont.load_default()
                  
                  draw.text((10, 10), "MegoDrama", font=font, fill=(0, 255, 255, 255)) # Cyan
                  draw.line((10, 95, 420, 95), fill=(255, 255, 255, 255), width=5) # White Line
                  img.save("logo.png")

                  # 2. الموجات (Pulsing Downwards)
                  os.system('ffmpeg -i v.mp3 -filter_complex "[0:a]showwaves=s=500x120:colors=0x00FFFF:mode=cline,crop=500:60:0:60,format=yuv420p[v]" -map "[v]" -c:v libx264 temp_waves.mp4 -y -loglevel quiet')

                  aud = AudioFileClip("v.mp3")
                  base = ImageClip("p.jpg").resize(height=720).set_duration(aud.duration)
                  
                  logo_clip = ImageClip("logo.png").set_duration(aud.duration).set_position((40, 40))
                  
                  if os.path.exists("temp_waves.mp4"):
                      waves = VideoFileClip("temp_waves.mp4").fx(vfx.mask_color, color=[0,0,0], thr=10, s=5)
                      # وضع الموجات تحت الخط مباشرة (y = 40 + 95 = 135)
                      waves = waves.set_position((40, 135)).set_opacity(0.9)
                      final_vid = CompositeVideoClip([base, logo_clip, waves]).set_audio(aud)
                  else:
                      final_vid = CompositeVideoClip([base, logo_clip]).set_audio(aud)

                  final_vid.write_videofile("out.mp4", fps=15, codec="libx264", audio_codec="aac", verbose=False, logger=None)
                  
                  # الرفع
                  if 'YOUTUBE_CREDENTIALS' in os.environ:
                      print("📤 جاري الرفع إلى يوتيوب...", flush=True)
                      creds_json = json.loads(os.environ['YOUTUBE_CREDENTIALS'])
                      creds = Credentials.from_authorized_user_info(creds_json)
                      youtube = build('youtube', 'v3', credentials=creds)
                      
                      body = {
                          'snippet': {
                              'title': f"ملخص مسلسل {data['title']} | أقوى الدراما الحصرية",
                              'description': f"شاهد ملخص {data['title']} بأسلوب سينمائي.\nإنتاج: MegoDrama",
                              'categoryId': '24'
                          },
                          'status': {'privacyStatus': 'public', 'selfDeclaredMadeForKids': False}
                      }
                      media = MediaFileUpload("out.mp4", chunksize=-1, resumable=True)
                      youtube.videos().insert(part=','.join(body.keys()), body=body, media_body=media).execute()
                      
                      with open(HISTORY_FILE, "a", encoding="utf-8") as f:
                          f.write(f"{data['title']}|{datetime.now().strftime('%Y-%m-%d')}\n")

          if __name__ == "__main__":
              loop = asyncio.get_event_loop()
              loop.run_until_complete(start_job())
              
              print("⏱️ الجلسة مستمرة لمدة 4 ساعات لضمان الثبات...", flush=True)
              time.sleep(4 * 60 * 60)
          EOF
          python -u script.py

      - name: 💾 Commit History
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add shows_history.txt || true
          git commit -m "Update trends" || true
          git push || true

      - name: ⏳ Persistence
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run "Perpetual Dual" --ref ${{ github.ref_name }}
