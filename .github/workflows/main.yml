name: Perpetual Dual

on:
  workflow_dispatch:

concurrency:
  group: streaming-group
  cancel-in-progress: true

jobs:
  stream:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: 🧹 Delete Old Logs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 1

      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 🚀 Create and Run Script
        env:
          YOUTUBE_CREDENTIALS: ${{ secrets.YOUTUBE_CREDENTIALS }}
        run: |
          sudo apt-get update -q
          sudo apt-get install -y ffmpeg -q
          
          # تثبيت أحدث إصدار من yt-dlp لتجاوز الحماية
          pip install requests bs4 "moviepy==1.0.3" "pillow==10.2.0" g4f tqdm nest_asyncio google-api-python-client google-auth-httplib2 google-auth-oauthlib numpy scipy edge-tts -q
          pip install -U --pre yt-dlp -q
          
          wget -q https://github.com/googlefonts/roboto/raw/main/src/hinted/Roboto-Bold.ttf
          
          cat << 'EOF' > script.py
          import os, asyncio, re, warnings, urllib3, requests, time, gc, json, random, subprocess
          import nest_asyncio
          import g4f
          from bs4 import BeautifulSoup
          from tqdm import tqdm
          import numpy as np
          import edge_tts
          from PIL import Image, ImageDraw, ImageFont

          import PIL.Image
          if not hasattr(PIL.Image, 'ANTIALIAS'):
              PIL.Image.ANTIALIAS = PIL.Image.LANCZOS

          from moviepy.editor import ImageClip, AudioFileClip, CompositeVideoClip, VideoFileClip, concatenate_audioclips
          import moviepy.video.fx.all as vfx
          from datetime import datetime
          from google.oauth2.credentials import Credentials
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaFileUpload

          nest_asyncio.apply()
          urllib3.disable_warnings(urllib3.exceptions.InsecureRequestWarning)
          warnings.filterwarnings("ignore", category=UserWarning)
          os.environ["IMAGEIO_FFMPEG_EXE"] = "ffmpeg"
          os.environ["SDL_VIDEODRIVER"] = "dummy"

          HISTORY_FILE = "shows_history.txt"

          # ---------------- الإعدادات ---------------- #
          ENABLE_YOUTUBE_UPLOAD = 0 # 0 لإيقاف الرفع لليوتيوب، 1 للتشغيل
          VOICE_MALE = "ar-EG-ShakirNeural"
          VOICE_FEMALE = "ar-EG-SalmaNeural"
          BAD_KEYWORDS = ["logo", "icon", "avatar", "brand", "header", "footer", "button", "banner", "sign"]
          
          SITES_CONFIG = [
              {"name": "ReelShort", "url": "https://www.reelshort.com/ar", "base": "https://www.reelshort.com"},
              {"name": "DramaBox", "url": "https://www.dramabox.com/ar", "base": "https://www.dramabox.com"},
              {"name": "FlexTV", "url": "https://flextv.cc/ar", "base": "https://flextv.cc"},
              {"name": "ShortTV", "url": "https://www.shorttv.live/ar", "base": "https://www.shorttv.live"}
          ]
          # ------------------------------------------- #

          def is_valid_image(url, alt_text):
              url_lower = url.lower()
              alt_lower = alt_text.lower()
              if any(word in url_lower or word in alt_lower for word in BAD_KEYWORDS):
                  return False
              if "icon" in url_lower or "logo" in url_lower:
                  return False
              return True

          def get_data():
              print("🔍 جاري فحص المنصات لجلب مسلسل جديد...", flush=True)
              history = []
              if os.path.exists(HISTORY_FILE):
                  with open(HISTORY_FILE, "r", encoding="utf-8") as f:
                      for line in f:
                          if "|" in line: history.append(line.split("|")[0].strip())
              
              random.shuffle(SITES_CONFIG)
              headers = {
                  "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36",
                  "Accept-Language": "ar-EG,ar;q=0.9,en-US;q=0.8,en;q=0.7",
              }

              for site in SITES_CONFIG:
                  print(f"🔎 جاري فحص موقع: {site['name']}...", flush=True)
                  try:
                      response = requests.get(site['url'], headers=headers, timeout=25, verify=False)
                      if response.status_code != 200: continue

                      soup = BeautifulSoup(response.text, 'html.parser')
                      found_shows = []

                      scripts = soup.find_all('script')
                      for script in scripts:
                          if not script.string: continue
                          json_matches = re.findall(r'\{"id":.*?"title":"([^"]+)".*?"(?:cover|poster|image)":"([^"]+)"', script.string)
                          
                          for m_title, m_img in json_matches:
                              clean_title = m_title.encode().decode('unicode-escape').strip() if '\\u' in m_title else m_title.strip()
                              clean_title = re.sub(r'[a-zA-Z0-9]', '', clean_title).strip()
                              
                              if len(clean_title) > 3 and clean_title not in history:
                                  if is_valid_image(m_img, clean_title) and m_img.startswith('http'):
                                      found_shows.append({"title": clean_title, "image": m_img, "desc": f"دراما واقعية ومشوقة من منصة {site['name']}"})

                      if not found_shows:
                          for img in soup.find_all('img', alt=True):
                              raw_alt = img.get('alt', '').strip()
                              title = re.sub(r'[a-zA-Z0-9]', '', raw_alt).strip()
                              
                              if len(title) > 3 and title not in history:
                                  img_url = img.get('data-src') or img.get('data-original') or img.get('src') or img.get('srcset')
                                  if img_url:
                                      img_url = img_url.split(' ')[0] 
                                      if img_url.startswith('//'): img_url = "https:" + img_url
                                      if not img_url.startswith('http'): img_url = site['base'] + img_url
                                      
                                      if is_valid_image(img_url, raw_alt) and "base64" not in img_url:
                                          found_shows.append({"title": title, "image": img_url, "desc": f"دراما واقعية ومشوقة من منصة {site['name']}"})

                      if found_shows:
                          selected = random.choice(found_shows)
                          print(f"🎯 تم اختيار مسلسل: '{selected['title']}' من منصة {site['name']}", flush=True)
                          with open("p.jpg", "wb") as f: f.write(requests.get(selected['image'], headers=headers, verify=False).content)
                          return {"title": selected['title'], "desc": selected['desc']}

                  except Exception as e:
                      print(f"⚠️ خطأ في {site['name']}: {e}", flush=True)
                      continue
              return None

          def get_game_background():
              """استخراج جزء عشوائي من بث لعبة الثعبان من قناتك بتجاوز الحماية"""
              print("🎮 جاري جلب فيديو لعبة الثعبان من قناتك كخلفية...", flush=True)
              try:
                  cmd = ['yt-dlp', '--get-id', '--flat-playlist', '--playlist-end', '15', 'https://www.youtube.com/@GoZiLG/streams']
                  res = subprocess.check_output(cmd, text=True)
                  video_ids = [vid for vid in res.strip().split('\n') if vid]
                  
                  if video_ids:
                      vid = random.choice(video_ids)
                      url = f"https://www.youtube.com/watch?v={vid}"
                      # تم إضافة ios client لتجاوز الحظر وتقليل وقت التحميل إلى دقيقتين فقط لأن السيناريو قصير
                      dl_cmd = f'yt-dlp --extractor-args "youtube:player_client=ios" --force-ipv4 -f "bestvideo[height<=720][ext=mp4]/best[ext=mp4]" --download-sections "*00:02:00-00:04:00" {url} -o bg.mp4'
                      os.system(dl_cmd)
                      if os.path.exists("bg.mp4"):
                          print("✅ تم تجهيز خلفية الفيديو بنجاح!")
                          return "bg.mp4"
              except Exception as e:
                  print(f"❌ خطأ أثناء جلب الفيديو من القناة: {e}")
              print("⚠️ فشل جلب الفيديو، سيتم استخدام الصورة كخلفية بديلة.")
              return None

          def upload_to_catbox(filepath):
              print("📤 جاري الرفع إلى Catbox...", flush=True)
              try:
                  with open(filepath, 'rb') as f:
                      response = requests.post(
                          'https://catbox.moe/user/api.php',
                          data={'reqtype': 'fileupload'},
                          files={'fileToUpload': f}
                      )
                  if response.status_code == 200:
                      print(f"✅ تم الرفع على Catbox بنجاح، الرابط: {response.text}")
                  else:
                      print(f"❌ فشل الرفع على Catbox، كود الخطأ: {response.status_code}")
              except Exception as e:
                  print(f"❌ حدث خطأ أثناء الرفع لـ Catbox: {e}")

          def create_long_script(t, d):
              print(f"🤖 جاري تأليف سيناريو قصير (50 كلمة) لمسلسل {t}...", flush=True)
              prompt = (f"اكتب حوار درامي قصير جداً ومكثف (حوالي 50 كلمة فقط) بين بطل وبطلة لمسلسل '{t}' بناءً على: {d}. "
                        "ابدأ بـ [HOOK] صادم ومواجهة سريعة. "
                        "استخدم فقط [MALE] و [FEMALE]. ممنوع وجود راوي أو مقدمات أو رموز أو نجوم ***.")
              try:
                  response = g4f.ChatCompletion.create(model=g4f.models.gpt_4, messages=[{"role":"user", "content": prompt}])
                  clean_chunk = re.sub(r'[*#_\\-]', '', response).strip()
                  print(f"   -> تم توليد السيناريو بنجاح ({len(clean_chunk.split())} كلمة تقريبا).", flush=True)
                  return clean_chunk
              except Exception as e: 
                  print(f"❌ خطأ في توليد السيناريو: {e}")
                  return ""

          async def process_audio(script):
              if not script: return False
              print("🎙️ معالجة الأصوات...", flush=True)
              segments = re.findall(r'\[(MALE|FEMALE|HOOK)\](.*?)(?=\[(?:MALE|FEMALE|HOOK)\]|$)', script, re.DOTALL)
              clips = []
              fast_keys = ['بغضب', 'بصراخ', 'بسرعة', 'خيانة', 'مستحيل', 'يكفي', 'أكرهك', 'صدمة']
              slow_keys = ['ندم', 'هدوء', 'حزن', 'لماذا', 'بهدوء', 'آسف', 'ببكاء']
              joy_keys = ['بفرح', 'بضحك', 'سعادة', 'بابتسامة']

              for i, (role, text) in enumerate(segments):
                  text = text.strip()
                  if len(text) < 2: continue
                  
                  rate = "+28%" if any(w in text for w in fast_keys) else ("-8%" if any(w in text for w in slow_keys) else ("+15%" if any(w in text for w in joy_keys) else "+4%"))
                  voice = VOICE_MALE if role in ["MALE", "HOOK"] and i % 2 == 0 else VOICE_FEMALE
                  if role == "FEMALE": voice = VOICE_FEMALE
                  
                  clean_text = re.sub(r'\(.*?\)', '', text).strip()
                  fname = f"s_{i}.mp3"
                  try:
                      await edge_tts.Communicate(clean_text, voice, rate=rate).save(fname)
                      c = AudioFileClip(fname)
                      clips.append(c)
                      clips.append(c.volumex(0).set_duration(0.3)) 
                  except: continue

              if clips:
                  final_aud = concatenate_audioclips(clips)
                  final_aud.write_audiofile("v.mp3", fps=44100, verbose=False, logger=None)
                  for c in clips: c.close()
                  return True
              return False

          async def start_production():
              data = get_data()
              if not data: return
              
              script = create_long_script(data['title'], data['desc'])
              if len(script.split()) < 10: 
                  print("⚠️ السيناريو قصير جداً، تم إلغاء العملية.")
                  return
              
              if await process_audio(script):
                  print("🎬 بدء المونتاج السينمائي...", flush=True)
                  img = Image.new('RGBA', (500, 150), (0, 0, 0, 0))
                  draw = ImageDraw.Draw(img)
                  try: font = ImageFont.truetype("Roboto-Bold.ttf", 65)
                  except: font = ImageFont.load_default()
                  draw.text((10, 10), "MegoDrama", font=font, fill=(0, 255, 255, 255))
                  draw.line((10, 95, 420, 95), fill=(255, 255, 255, 255), width=5)
                  img.save("logo.png")

                  os.system('ffmpeg -i v.mp3 -filter_complex "[0:a]showwaves=s=500x120:colors=0x00FFFF:mode=cline,crop=500:60:0:60,format=yuv420p[v]" -map "[v]" -c:v libx264 temp_waves.mp4 -y -loglevel quiet')

                  aud = AudioFileClip("v.mp3")
                  
                  # تركيب الفيديو كخلفية (الثعبان) أو الصورة كخلفية بديلة
                  bg_vid_file = get_game_background()
                  if bg_vid_file:
                      base = VideoFileClip(bg_vid_file).without_audio().resize(height=720)
                      if base.duration < aud.duration:
                          base = base.fx(vfx.loop, duration=aud.duration)
                      else:
                          base = base.subclip(0, aud.duration)
                  else:
                      base = ImageClip("p.jpg").resize(height=720).set_duration(aud.duration)

                  logo = ImageClip("logo.png").set_duration(aud.duration).set_position((40, 40))
                  
                  if os.path.exists("temp_waves.mp4"):
                      waves = VideoFileClip("temp_waves.mp4").fx(vfx.mask_color, color=[0,0,0], thr=10, s=5).set_position((40, 135)).set_opacity(0.9)
                      final_vid = CompositeVideoClip([base, logo, waves]).set_audio(aud)
                      final_vid.write_videofile("out.mp4", fps=10, codec="libx264", audio_codec="aac", verbose=False, logger=None)
                  
                  if os.path.exists("out.mp4"):
                      # 1. الرفع على Catbox
                      upload_to_catbox("out.mp4")

                      # 2. الرفع على يوتيوب (بناءً على المتغير)
                      if ENABLE_YOUTUBE_UPLOAD == 1 and 'YOUTUBE_CREDENTIALS' in os.environ:
                          print("📤 جاري الرفع إلى يوتيوب...", flush=True)
                          try:
                              creds = Credentials.from_authorized_user_info(json.loads(os.environ['YOUTUBE_CREDENTIALS']))
                              youtube = build('youtube', 'v3', credentials=creds)
                              body = {
                                  'snippet': {
                                      'title': f"مواجهة نارية في مسلسل {data['title']} | القصة كاملة",
                                      'description': f"شاهد الأحداث الحقيقية لمسلسل {data['title']} بدون راوي.\nإنتاج: MegoDrama",
                                      'categoryId': '24'
                                  },
                                  'status': {'privacyStatus': 'public', 'selfDeclaredMadeForKids': False}
                              }
                              youtube.videos().insert(part=','.join(body.keys()), body=body, media_body=MediaFileUpload("out.mp4", chunksize=-1, resumable=True)).execute()
                              print("✅ تم الرفع على يوتيوب بنجاح!")
                          except Exception as e: 
                              print(f"❌ فشل الرفع لليوتيوب: {e}")
                      else:
                          print("⏸️ تم إيقاف الرفع لليوتيوب بناءً على إعدادات ENABLE_YOUTUBE_UPLOAD (القيمة 0).")

                      # تسجيل المسلسل في السجل
                      with open(HISTORY_FILE, "a", encoding="utf-8") as f:
                          f.write(f"{data['title']}|{datetime.now().strftime('%Y-%m-%d')}\n")
                  
                  aud.close()
                  base.close()
                  logo.close()

          if __name__ == "__main__":
              asyncio.run(start_production())
              print("⏱️ الجلسة مستمرة لمدة 4 ساعات...")
              time.sleep(4 * 60 * 60)
          EOF
          python -u script.py

      - name: 💾 Commit History
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add shows_history.txt || true
          git commit -m "Update history" || true
          git push || true

      - name: ⏳ Persistence
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run "Perpetual Dual" --ref ${{ github.ref_name }}
