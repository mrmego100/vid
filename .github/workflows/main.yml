name: Perpetual Dual

on:
  workflow_dispatch:

concurrency:
  group: streaming-group
  cancel-in-progress: true

jobs:
  stream:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: 🧹 Delete Old Logs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 1

      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 🚀 Create and Run Script
        env:
          YOUTUBE_CREDENTIALS: ${{ secrets.YOUTUBE_CREDENTIALS }}
        run: |
          sudo apt-get update -q
          sudo apt-get install -y ffmpeg -q
          
          pip install requests bs4 "moviepy==1.0.3" "pillow==10.2.0" g4f tqdm nest_asyncio google-api-python-client google-auth-httplib2 google-auth-oauthlib numpy scipy edge-tts -q
          
          wget -q https://github.com/googlefonts/roboto/raw/main/src/hinted/Roboto-Bold.ttf
          
          cat << 'EOF' > script.py
          import os, asyncio, re, warnings, urllib3, requests, time, gc, json, random
          import nest_asyncio
          import g4f
          from bs4 import BeautifulSoup
          from tqdm import tqdm
          import numpy as np
          import edge_tts
          from PIL import Image, ImageDraw, ImageFont

          import PIL.Image
          if not hasattr(PIL.Image, 'ANTIALIAS'):
              PIL.Image.ANTIALIAS = PIL.Image.LANCZOS

          from moviepy.editor import ImageClip, AudioFileClip, CompositeVideoClip, VideoFileClip, concatenate_audioclips
          import moviepy.video.fx.all as vfx
          from datetime import datetime
          from google.oauth2.credentials import Credentials
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaFileUpload

          nest_asyncio.apply()
          urllib3.disable_warnings(urllib3.exceptions.InsecureRequestWarning)
          warnings.filterwarnings("ignore", category=UserWarning)
          os.environ["IMAGEIO_FFMPEG_EXE"] = "ffmpeg"

          HISTORY_FILE = "shows_history.txt"

          # أصوات مميزة جداً لضمان الفرق
          VOICE_RAWI = "ar-KW-FahedNeural"  # راوي خليجي فخم (مختلف تماماً)
          VOICE_MALE = "ar-EG-ShakirNeural" # بطل مصري حماسي
          VOICE_FEMALE = "ar-EG-SalmaNeural" # بطلة مصرية درامية

          def get_data():
              print("🔍 جاري البحث عن مسلسل جديد...", flush=True)
              history = []
              if os.path.exists(HISTORY_FILE):
                  with open(HISTORY_FILE, "r", encoding="utf-8") as f:
                      for line in f:
                          if "|" in line: history.append(line.split("|")[0].strip())
              
              base = "https://www.shorttv.live"
              try:
                  r = requests.get(f"{base}/ar", headers={"User-Agent": "Mozilla/5.0"}, verify=False, timeout=10)
                  soup = BeautifulSoup(r.text, 'html.parser')
                  links = soup.find_all('a', href=True)
                  random.shuffle(links)
                  for a in links:
                      img = a.find('img')
                      if not img: continue
                      title = re.sub(r'[a-zA-Z]', '', img.get('alt', '')).strip()
                      if len(title) < 5 or title in history: continue
                      
                      t_url = a['href'] if a['href'].startswith('http') else base + a['href']
                      s_page = requests.get(t_url, verify=False, timeout=5)
                      desc = BeautifulSoup(s_page.text, 'html.parser').find('meta', attrs={'name': 'description'})
                      desc_text = desc.get('content', '') if desc else "دراما مشوقة"
                      
                      i_url = img.get('src') or img.get('data-src')
                      if i_url.startswith('//'): i_url = "https:" + i_url
                      with open("p.jpg", "wb") as f: f.write(requests.get(i_url).content)
                      return {"title": title, "desc": desc_text}
              except: return None

          def create_script(t, d):
              print("🤖 تأليف السيناريو بنظام الـ Hook...", flush=True)
              prompt = (f"اكتب سيناريو درامي لمسلسل '{t}' بناءً على: {d}. "
                        "الترتيب: "
                        "1. [MALE] أو [FEMALE]: ابدأ بـ Hook (حوار صادم وسريع جداً، جملة واحدة). "
                        "2. [RAWI]: ادخل بالوصف الدرامي للقصة. "
                        "3. تبادل حوار بين [MALE] و [FEMALE] و [RAWI]. "
                        "ممنوع ذكر الأسماء. إذا كان هناك غضب اكتب (بغضب) في بداية الفقرة.")
              try:
                  return g4f.ChatCompletion.create(model=g4f.models.gpt_4, messages=[{"role":"user", "content": prompt}]).strip()
              except: return ""

          async def generate_audio(script):
              print("🎙️ توليد الأصوات (الراوي الخليجي vs الأبطال المصريين)...", flush=True)
              segments = re.findall(r'\[(RAWI|MALE|FEMALE)\](.*?)(?=\[(?:RAWI|MALE|FEMALE)\]|$)', script, re.DOTALL)
              clips = []
              anger_list = ['بغضب', 'بصراخ', 'خيانة', 'مستحيل', 'يكفي']

              for i, (role, text) in enumerate(segments):
                  text = text.strip()
                  if len(text) < 2: continue
                  rate = "+25%" if any(w in text for w in anger_list) else "+3%"
                  voice = VOICE_RAWI if role == "RAWI" else (VOICE_MALE if role == "MALE" else VOICE_FEMALE)
                  
                  clean_text = re.sub(r'\(.*?\)', '', text).strip()
                  fname = f"s_{i}.mp3"
                  try:
                      await edge_tts.Communicate(clean_text, voice, rate=rate).save(fname)
                      clips.append(AudioFileClip(fname))
                      clips.append(AudioFileClip(fname).volumex(0).set_duration(0.3))
                  except: continue

              if clips:
                  concatenate_audioclips(clips).write_audiofile("v.mp3", fps=44100, verbose=False, logger=None)
                  return True
              return False

          async def run_main():
              data = get_data()
              if not data: return
              
              script = create_script(data['title'], data['desc'])
              if not script: return
              
              if await generate_audio(script):
                  print("🎬 المونتاج السينمائي لـ MegoDrama...", flush=True)
                  # اللوجو والخط
                  img = Image.new('RGBA', (500, 150), (0, 0, 0, 0))
                  draw = ImageDraw.Draw(img)
                  try: font = ImageFont.truetype("Roboto-Bold.ttf", 65)
                  except: font = ImageFont.load_default()
                  draw.text((10, 10), "MegoDrama", font=font, fill=(0, 255, 255, 255))
                  draw.line((10, 95, 420, 95), fill=(255, 255, 255, 255), width=5)
                  img.save("logo.png")

                  # الموجات
                  os.system('ffmpeg -i v.mp3 -filter_complex "[0:a]showwaves=s=500x120:colors=0x00FFFF:mode=cline,crop=500:60:0:60,format=yuv420p[v]" -map "[v]" -c:v libx264 temp.mp4 -y -loglevel quiet')

                  aud = AudioFileClip("v.mp3")
                  base = ImageClip("p.jpg").resize(height=720).set_duration(aud.duration)
                  logo = ImageClip("logo.png").set_duration(aud.duration).set_position((40, 40))
                  
                  if os.path.exists("temp.mp4"):
                      waves = VideoFileClip("temp.mp4").fx(vfx.mask_color, color=[0,0,0], thr=10, s=5).set_position((40, 135)).set_opacity(0.9)
                      CompositeVideoClip([base, logo, waves]).set_audio(aud).write_videofile("out.mp4", fps=15, codec="libx264", audio_codec="aac", verbose=False, logger=None)
                  
                  if os.path.exists("out.mp4") and 'YOUTUBE_CREDENTIALS' in os.environ:
                      print("📤 رفع الفيديو...", flush=True)
                      try:
                          creds = Credentials.from_authorized_user_info(json.loads(os.environ['YOUTUBE_CREDENTIALS']))
                          youtube = build('youtube', 'v3', credentials=creds)
                          body = {
                              'snippet': {'title': f"ملخص مسلسل {data['title']} | دراما حصرية", 'description': f"ملخص {data['title']}.\nإنتاج: MegoDrama", 'categoryId': '24'},
                              'status': {'privacyStatus': 'public', 'selfDeclaredMadeForKids': False}
                          }
                          youtube.videos().insert(part=','.join(body.keys()), body=body, media_body=MediaFileUpload("out.mp4", chunksize=-1, resumable=True)).execute()
                          with open(HISTORY_FILE, "a", encoding="utf-8") as f: f.write(f"{data['title']}|{datetime.now()}\n")
                      except: pass

          if __name__ == "__main__":
              asyncio.run(run_main())
              print("⏱️ انتظار 4 ساعات قبل الدورة القادمة...")
              time.sleep(4 * 60 * 60)
          EOF
          python -u script.py

      - name: 💾 Commit History
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add shows_history.txt || true
          git commit -m "Update trends" || true
          git push || true

      - name: ⏳ Persistence
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run "Perpetual Dual" --ref ${{ github.ref_name }}
