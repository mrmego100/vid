name: Perpetual Dual

on:
  workflow_dispatch:

concurrency:
  group: streaming-group
  cancel-in-progress: true

jobs:
  stream:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: 🧹 Delete Old Logs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 1

      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 🚀 Create and Run Script
        env:
          YOUTUBE_CREDENTIALS: ${{ secrets.YOUTUBE_CREDENTIALS }}
        run: |
          sudo apt-get update -q
          # تثبيت أدوات التسجيل والخطوط العربية المطلوبة للترجمة ASS
          sudo apt-get install -y ffmpeg xvfb chromium-browser pulseaudio fonts-noto-core fonts-noto-extra -q
          
          # إعداد الخط العربي ونقله لمسار النظام ليقرأه FFmpeg
          wget -q -O arabic.ttf https://github.com/google/fonts/raw/main/ofl/notonaskharabic/NotoNaskhArabic-Bold.ttf
          sudo mkdir -p /usr/share/fonts/truetype/custom
          sudo cp arabic.ttf /usr/share/fonts/truetype/custom/
          sudo fc-cache -fv
          
          # إعداد كارت صوت وهمي لتسجيل أوديو اللعبة
          pulseaudio -D --exit-idle-time=-1 || true
          pacmd load-module module-virtual-sink sink_name=v1 || true
          pacmd set-default-sink v1 || true
          pacmd set-default-source v1.monitor || true
          
          # إضافة مكتبات دعم اللغة العربية في الصور (arabic-reshaper, python-bidi) للصورة المصغرة
          for i in {1..5}; do
            pip install --retries 10 requests bs4 "moviepy==1.0.3" "pillow==10.2.0" g4f tqdm nest_asyncio google-api-python-client google-auth-httplib2 google-auth-oauthlib numpy scipy edge-tts arabic-reshaper python-bidi -q && break || sleep 5
          done
          
          wget --tries=5 -q https://github.com/googlefonts/roboto/raw/main/src/hinted/Roboto-Bold.ttf
          
          cat << 'EOF' > script.py
          import os, asyncio, re, warnings, urllib3, requests, time, gc, json, random, subprocess
          import nest_asyncio
          import g4f
          from bs4 import BeautifulSoup
          from tqdm import tqdm
          import numpy as np
          import edge_tts
          import arabic_reshaper
          from bidi.algorithm import get_display
          from PIL import Image, ImageDraw, ImageFont, ImageFilter

          import PIL.Image
          if not hasattr(PIL.Image, 'ANTIALIAS'):
              PIL.Image.ANTIALIAS = PIL.Image.LANCZOS

          from moviepy.editor import ImageClip, AudioFileClip, CompositeVideoClip, VideoFileClip, concatenate_audioclips, CompositeAudioClip
          import moviepy.video.fx.all as vfx
          import moviepy.audio.fx.all as afx
          from datetime import datetime
          from google.oauth2.credentials import Credentials
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaFileUpload

          nest_asyncio.apply()
          urllib3.disable_warnings(urllib3.exceptions.InsecureRequestWarning)
          warnings.filterwarnings("ignore", category=UserWarning)
          os.environ["IMAGEIO_FFMPEG_EXE"] = "ffmpeg"
          os.environ["SDL_VIDEODRIVER"] = "dummy"

          HISTORY_FILE = "shows_history.txt"

          # ---------------- الإعدادات ---------------- #
          ENABLE_YOUTUBE_UPLOAD = 1 # 0 لإيقاف الرفع، 1 للتشغيل
          VOICE_NARRATOR = "ar-EG-ShakirNeural" # صوت السرد الموحد
          VID_WIDTH = 1280  # العرض
          VID_HEIGHT = 1400 # الط الطول
          VID_FPS = 40      # معدل الإطارات
          
          # --- إعدادات كلمات السكربت --- #
          STORY_MIN_WORDS = 1500  # الحد الأدنى لعدد كلمات القصة (تحكم بها كما تحب)
          STORY_MAX_WORDS = 1600  # الحد الأقصى لعدد كلمات القصة
          
          BAD_KEYWORDS = ["logo", "icon", "avatar", "brand", "header", "footer", "button", "banner", "sign"]
          
          SITES_CONFIG = [
              {"name": "ReelShort", "url": "https://www.reelshort.com/ar", "base": "https://www.reelshort.com"},
              {"name": "DramaBox", "url": "https://www.dramabox.com/ar", "base": "https://www.dramabox.com"},
              {"name": "FlexTV", "url": "https://flextv.cc/ar", "base": "https://flextv.cc"},
              {"name": "ShortTV", "url": "https://www.shorttv.live/ar", "base": "https://www.shorttv.live"}
          ]
          # ------------------------------------------- #

          def is_valid_image(url, alt_text):
              url_lower = url.lower()
              alt_lower = alt_text.lower()
              if any(word in url_lower or word in alt_lower for word in BAD_KEYWORDS):
                  return False
              if "icon" in url_lower or "logo" in url_lower:
                  return False
              return True

          def get_data():
              print("🔍 جاري فحص المنصات لجلب مسلسل جديد...", flush=True)
              history = []
              if os.path.exists(HISTORY_FILE):
                  with open(HISTORY_FILE, "r", encoding="utf-8") as f:
                      for line in f:
                          if "|" in line: history.append(line.split("|")[0].strip())
              
              random.shuffle(SITES_CONFIG)
              headers = {
                  "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36",
                  "Accept-Language": "ar-EG,ar;q=0.9,en-US;q=0.8,en;q=0.7",
              }

              for site in SITES_CONFIG:
                  print(f"🔎 جاري فحص موقع: {site['name']}...", flush=True)
                  try:
                      response = requests.get(site['url'], headers=headers, timeout=25, verify=False)
                      if response.status_code != 200: continue

                      soup = BeautifulSoup(response.text, 'html.parser')
                      found_shows = []

                      scripts = soup.find_all('script')
                      for script in scripts:
                          if not script.string: continue
                          json_matches = re.findall(r'\{"id":.*?"title":"([^"]+)".*?"(?:cover|poster|image)":"([^"]+)"', script.string)
                          
                          for m_title, m_img in json_matches:
                              clean_title = m_title.encode().decode('unicode-escape').strip() if '\\u' in m_title else m_title.strip()
                              clean_title = re.sub(r'[a-zA-Z0-9]', '', clean_title).strip()
                              
                              if len(clean_title) > 3 and clean_title not in history:
                                  if is_valid_image(m_img, clean_title) and m_img.startswith('http'):
                                      found_shows.append({"title": clean_title, "image": m_img, "desc": f"دراما واقعية ومشوقة من منصة {site['name']}"})

                      if not found_shows:
                          for img in soup.find_all('img', alt=True):
                              raw_alt = img.get('alt', '').strip()
                              title = re.sub(r'[a-zA-Z0-9]', '', raw_alt).strip()
                              
                              if len(title) > 3 and title not in history:
                                  img_url = img.get('data-src') or img.get('data-original') or img.get('src') or img.get('srcset')
                                  if img_url:
                                      img_url = img_url.split(' ')[0] 
                                      if img_url.startswith('//'): img_url = "https:" + img_url
                                      if not img_url.startswith('http'): img_url = site['base'] + img_url
                                      
                                      if is_valid_image(img_url, raw_alt) and "base64" not in img_url:
                                          found_shows.append({"title": title, "image": img_url, "desc": f"دراما واقعية ومشوقة من منصة {site['name']}"})

                      if found_shows:
                          selected = random.choice(found_shows)
                          print(f"🎯 تم اختيار مسلسل: '{selected['title']}' من منصة {site['name']}", flush=True)
                          with open("p.jpg", "wb") as f: f.write(requests.get(selected['image'], headers=headers, verify=False).content)
                          return {"title": selected['title'], "desc": selected['desc']}

                  except Exception as e:
                      print(f"⚠️ خطأ في {site['name']}: {e}", flush=True)
                      continue
              return None

          def record_live_game(duration):
              """تشغيل متصفح وتسجيل اللعبة (فيديو + صوت)"""
              print(f"🎮 جاري تسجيل اللعبة والصوت لمدة {int(duration)} ثانية ({VID_WIDTH}x{VID_HEIGHT} - {VID_FPS}FPS)...", flush=True)
              try:
                  os.environ['DISPLAY'] = ':99'
                  xvfb = subprocess.Popen(['Xvfb', ':99', '-screen', '0', f'{VID_WIDTH}x{VID_HEIGHT}x24'])
                  time.sleep(3)
                  
                  chrome = subprocess.Popen([
                      'chromium-browser', 
                      '--kiosk', f'--window-size={VID_WIDTH},{VID_HEIGHT}', 
                      '--no-sandbox', '--disable-gpu', 
                      '--autoplay-policy=no-user-gesture-required', 
                      'https://meja.do.am/asd/GoZiLG.html'
                  ])
                  time.sleep(5)
                  
                  rec_duration = int(duration) + 2
                  
                  cmd = f'ffmpeg -y -video_size {VID_WIDTH}x{VID_HEIGHT} -framerate {VID_FPS} -f x11grab -i :99.0+0,0 -f pulse -i default -t {rec_duration} -c:v libx264 -preset veryfast -pix_fmt yuv420p -c:a aac bg.mp4 -loglevel quiet'
                  ret = os.system(cmd)
                  
                  if ret != 0 or not os.path.exists("bg.mp4"):
                      print("⚠️ تنبيه: فشل تسجيل الصوت، سيتم تسجيل الشاشة بدون صوت احتياطياً...", flush=True)
                      os.system(f'ffmpeg -y -video_size {VID_WIDTH}x{VID_HEIGHT} -framerate {VID_FPS} -f x11grab -i :99.0+0,0 -t {rec_duration} -c:v libx264 -preset veryfast -pix_fmt yuv420p bg.mp4 -loglevel quiet')

                  chrome.terminate()
                  xvfb.terminate()
                  
                  if os.path.exists("bg.mp4"):
                      print("✅ تم تسجيل خلفية الفيديو بنجاح!")
                      return "bg.mp4"
              except Exception as e:
                  print(f"❌ خطأ أثناء تسجيل المتصفح: {e}")
              return None

          def upload_to_catbox(filepath):
              print("📤 جاري الرفع إلى Catbox...", flush=True)
              try:
                  with open(filepath, 'rb') as f:
                      response = requests.post(
                          'https://catbox.moe/user/api.php',
                          data={'reqtype': 'fileupload'},
                          files={'fileToUpload': f}
                      )
                  if response.status_code == 200:
                      print(f"✅ تم الرفع على Catbox بنجاح، الرابط: {response.text}")
                  else:
                      print(f"❌ فشل الرفع على Catbox، كود الخطأ: {response.status_code}")
              except Exception as e:
                  print(f"❌ حدث خطأ أثناء الرفع لـ Catbox: {e}")

          def create_narrative_script(t, d):
              print(f"🤖 جاري تأليف قصة سردية ({STORY_MIN_WORDS}-{STORY_MAX_WORDS} كلمة) لمسلسل {t}...", flush=True)
              prompt = (f"أنت الآن راوي قصص محترف. اكتب قصة سردية طويلة جداً ومفصلة تروي أحداث مسلسل '{t}' بناءً على: {d}. "
                        f"شرط إجباري وحاسم: يجب أن يتراوح طول القصة بين {STORY_MIN_WORDS} إلى {STORY_MAX_WORDS} كلمة بالتمام والكمال. قم بزيادة الوصف وتوسيع الأحداث للوصول لهذا الطول. "
                        "يجب أن تبدأ القصة بـ 'هوك' (Hook) قوي جداً وصادم يخاطب المشاهد مباشرة (بصيغة أنت) لجذب انتباهه من الثواني الأولى. "
                        "ممنوع تماماً استخدام أسلوب الحوارات أو الردود المتبادلة. السرد يجب أن يكون متصلاً بلسان راوي واحد يحكي الأحداث بإثارة وتفصيل دقيق. "
                        "ممنوع استخدام أي رموز، أو أقواس، أو نجوم، أو أسماء شخصيات مسبوقة بنقطتين. "
                        "تحذير هام جداً: لا تكتب أي مقدمات أو ترحيب أو خاتمات (مثل: 'إليك القصة'، 'حسناً')، اكتب النص السردي للقصة مباشرة وفقط.")
              try:
                  response = g4f.ChatCompletion.create(model=g4f.models.gpt_4, messages=[{"role":"user", "content": prompt}])
                  clean_chunk = re.sub(r'[*#_\[\]()\-]', '', response).replace('\\', '').strip()
                  print(f"   -> تم توليد السيناريو بنجاح ({len(clean_chunk.split())} كلمة تقريبا).", flush=True)
                  return clean_chunk
              except Exception as e: 
                  print(f"❌ خطأ في توليد السيناريو: {e}")
                  return ""

          # ----- توليد عنوان اليوتيوب المتوافق مع طلبك -----
          def generate_youtube_title(show_title, story_text):
              print("🎯 جاري توليد عنوان يوتيوب ذكي...", flush=True)
              prompt = (f"قم بتأليف عنوان يوتيوب مثير جداً وجذاب لفيديو يحكي قصة مسلسل '{show_title}'. "
                        "يجب أن يكون العنوان بنفس هذا النمط وبناءً على أحداث القصة: "
                        "'الجميع ظنه ضعيفًا! حتى رأوه يهزم أميرة الشمال ويدخل معسكر الأعداء وحده... [اسم المسلسل]' "
                        f"استخرج حدثاً مشوقاً من هذه القصة: {story_text[:1000]}... "
                        f"واكتب العنوان بناءً عليه ليكون غامضاً ومثيراً، واختتمه باسم المسلسل '{show_title}'. لا تكتب أي شيء آخر غير العنوان.")
              try:
                  title = g4f.ChatCompletion.create(model=g4f.models.gpt_4, messages=[{"role":"user", "content": prompt}])
                  return title.replace('"', '').strip()
              except:
                  return f"الجميع ظنه ضعيفًا! حتى رأوه يقلب الموازين ويصدم الجميع بقوته... مسلسل {show_title}"

          # ----- توليد وصف اليوتيوب المدمج -----
          def generate_youtube_desc(show_title, story_text):
              print("📝 جاري توليد وصف يوتيوب مدمج...", flush=True)
              prompt = (f"اكتب وصفاً لفيديو يوتيوب يحكي قصة مسلسل. "
                        f"القصة: {story_text[:600]}... "
                        f"شروط الوصف: 1. ادمج كلمات اسم المسلسل '{show_title}' بحيث تضع كل كلمة من اسمه متفرقة في جملة مختلفة داخل الوصف ولا تضع الاسم كاملاً متصلاً أبداً. "
                        "2. أضف الكلمات المفتاحية: 'مدبلج'، 'كامل'، 'مترجم' بشكل طبيعي ومندمج في السياق. "
                        "3. اجعله مشوقاً بدون مقدمات ولا تذكر أنك تدمج الكلمات.")
              try:
                  desc = g4f.ChatCompletion.create(model=g4f.models.gpt_4, messages=[{"role":"user", "content": prompt}])
                  return desc.strip()
              except:
                  words = show_title.split()
                  desc_fallback = "أحداث نارية ومشوقة! "
                  for w in words: desc_fallback += f"نرى كيف تغيرت الأقدار مع {w}. "
                  desc_fallback += "مسلسل رائع مدبلج و كامل وتستطيع مشاهدته مترجم بأفضل جودة."
                  return desc_fallback

          # ----- تصميم الصورة المصغرة (خلفية مموهة + تفاصيل + نص) -----
          def create_youtube_thumbnail(title_text):
              print("🖼️ جاري تصميم الصورة المصغرة بالذكاء الصناعي...", flush=True)
              try:
                  width, height = 1280, 720
                  # خلفية أساسية غامقة
                  img = Image.new('RGB', (width, height), color=(15, 15, 25))
                  draw = ImageDraw.Draw(img)
                  
                  # رسم أشكال دخانية وألوان عشوائية
                  for _ in range(45):
                      x1 = random.randint(-300, width + 100)
                      y1 = random.randint(-300, height + 100)
                      x2 = x1 + random.randint(300, 900)
                      y2 = y1 + random.randint(300, 900)
                      color = (random.randint(40, 255), random.randint(40, 150), random.randint(50, 255))
                      draw.ellipse([x1, y1, x2, y2], fill=color)
                  
                  # دمج الأشكال بقوة لعمل تأثير الضباب/الدخان السحري
                  img = img.filter(ImageFilter.GaussianBlur(radius=90))
                  
                  # إضافة تفاصيل وخطوط متقاطعة
                  draw = ImageDraw.Draw(img)
                  for _ in range(20):
                      draw.line([(random.randint(0, width), random.randint(0, height)), 
                                 (random.randint(0, width), random.randint(0, height))], 
                                fill=(255, 255, 255, 30), width=random.randint(1, 4))

                  # معالجة النص العربي ليظهر مشبكاً ومن اليمين لليسار
                  reshaped_text = arabic_reshaper.reshape(title_text)
                  bidi_text = get_display(reshaped_text)
                  
                  try:
                      font = ImageFont.truetype("arabic.ttf", 65)
                  except:
                      font = ImageFont.load_default()
                  
                  # تقسيم النص لأسطر
                  def wrap_text(text, font, max_width):
                      lines, words = [], text.split()
                      while words:
                          line = ''
                          while words and font.getlength(line + words[0] + ' ') <= max_width:
                              line += (words.pop(0) + ' ')
                          lines.append(line.strip())
                      return lines
                  
                  lines = wrap_text(bidi_text, font, width - 150)
                  line_height = 80
                  total_height = len(lines) * line_height
                  y_text = (height - total_height) / 2
                  
                  for line in lines:
                      text_width = font.getlength(line)
                      x_text = (width - text_width) / 2
                      # ظل أسود عريض للنص
                      draw.text((x_text+5, y_text+5), line, font=font, fill=(0,0,0))
                      draw.text((x_text-3, y_text-3), line, font=font, fill=(0,0,0))
                      # النص الأصلي
                      draw.text((x_text, y_text), line, font=font, fill=(255, 255, 255))
                      y_text += line_height
                      
                  img.save("thumbnail.jpg")
                  return "thumbnail.jpg"
              except Exception as e:
                  print(f"❌ خطأ في صنع الصورة المصغرة: {e}")
                  Image.new('RGB', (1280, 720), color="black").save("thumbnail.jpg")
                  return "thumbnail.jpg"

          # ----- نظام معالجة الصوت واستخراج الترجمة (ASS) -----
          async def process_audio_and_subs(script):
              if not script: return False
              print("🎙️ معالجة الصوت وبناء ملف الترجمة ASS...", flush=True)
              try:
                  communicate = edge_tts.Communicate(script, VOICE_NARRATOR, rate="+4%")
                  submaker = edge_tts.SubMaker()
                  
                  with open("v.mp3", "wb") as file:
                      async for chunk in communicate.stream():
                          if chunk["type"] == "audio":
                              file.write(chunk["data"])
                          elif chunk["type"] == "WordBoundary":
                              submaker.create_sub((chunk["offset"], chunk["duration"]), chunk["text"])
                  
                  # إنشاء ملف ASS بالتنسيق المطلوب
                  ass_header = """[Script Info]
          ScriptType: v4.00+

          [V4+ Styles]
          Format: Name, Fontname, Fontsize, PrimaryColour, BackColour, Bold, Italic, BorderStyle, Outline, Shadow, Alignment, MarginL, MarginR, MarginV, Encoding
          Style: Default,Noto Naskh Arabic,48,&H00FFFFFF,&H00000000,1,0,1,3,0,2,20,20,50,1

          [Events]
          Format: Layer, Start, End, Style, Text
          """
                  ass_lines = []
                  vtt_text = submaker.generate_subs()
                  blocks = vtt_text.split('\n\n')
                  
                  def to_ass_time(t):
                      parts = t.split(':')
                      if len(parts) == 3:
                          h, m, s_ms = parts
                          s, ms = s_ms.split('.') if '.' in s_ms else (s_ms, "000")
                          return f"{int(h)}:{int(m):02d}:{int(s):02d}.{ms[:2]}"
                      return "0:00:00.00"

                  for block in blocks:
                      lines = block.split('\n')
                      if len(lines) >= 2 and '-->' in lines[0]:
                          times = lines[0].split(' --> ')
                          start_ass = to_ass_time(times[0].strip())
                          end_ass = to_ass_time(times[1].strip())
                          text_line = " ".join(lines[1:]).strip()
                          if text_line:
                              ass_lines.append(f"Dialogue: 0,{start_ass},{end_ass},Default,{text_line}")

                  with open("subs.ass", "w", encoding="utf-8") as f:
                      f.write(ass_header + "\n".join(ass_lines))
                      
                  return True
              except Exception as e:
                  print(f"❌ خطأ في توليد الصوت والترجمة: {e}")
                  return False

          async def start_production():
              data = get_data()
              if not data: return
              
              script = create_narrative_script(data['title'], data['desc'])
              if len(script.split()) < 10: 
                  print("⚠️ السيناريو قصير جداً، تم إلغاء العملية.")
                  return
              
              if await process_audio_and_subs(script):
                  print("🎬 بدء المونتاج السينمائي ودمج الأصوات...", flush=True)
                  
                  aud = AudioFileClip("v.mp3")
                  
                  # إنشاء واجهة الرسوميات بدون أي أسماء (MegoDrama محذوفة)
                  img = Image.new('RGBA', (VID_WIDTH, VID_HEIGHT), (0, 0, 0, 0))
                  draw = ImageDraw.Draw(img)
                  try: small_font = ImageFont.truetype("Roboto-Bold.ttf", 22)
                  except: small_font = ImageFont.load_default()
                  disclaimer = "This game is for entertainment purposes only and complies with YouTube policies."
                  draw.text((40, VID_HEIGHT - 60), disclaimer, font=small_font, fill=(255, 255, 255, 200))
                  img.save("overlay.png")

                  # تصميم الموجات الصوتية بشكل حلو ومتحرك باستمرار
                  os.system(f'ffmpeg -i v.mp3 -filter_complex "[0:a]showwaves=s=400x150:colors=red:mode=cline,hue=H=t:s=1,format=yuv420p[v]" -map "[v]" -c:v libx264 temp_waves.mp4 -y -loglevel quiet')

                  bg_vid_file = record_live_game(aud.duration)
                  
                  if bg_vid_file:
                      base = VideoFileClip(bg_vid_file).resize(height=VID_HEIGHT)
                      if base.w > VID_WIDTH:
                          base = base.crop(x_center=base.w/2, width=VID_WIDTH)
                          
                      if base.duration < aud.duration:
                          base = base.fx(vfx.loop, duration=aud.duration)
                      else:
                          base = base.subclip(0, aud.duration)
                          
                      if base.audio is not None:
                          game_audio = base.audio.fx(afx.volumex, 0.3)
                          final_audio = CompositeAudioClip([game_audio.set_duration(aud.duration), aud])
                          base = base.set_audio(final_audio)
                      else:
                          base = base.set_audio(aud)
                  else:
                      base = ImageClip("p.jpg").resize(height=VID_HEIGHT).set_duration(aud.duration)
                      if base.w > VID_WIDTH:
                          base = base.crop(x_center=base.w/2, width=VID_WIDTH)
                      base = base.set_audio(aud)

                  overlay = ImageClip("overlay.png").set_duration(aud.duration)
                  
                  if os.path.exists("temp_waves.mp4"):
                      waves = VideoFileClip("temp_waves.mp4").without_audio().fx(vfx.mask_color, color=[0,0,0], thr=10, s=5).set_position((VID_WIDTH - 430, 40)).set_opacity(0.9)
                      final_vid = CompositeVideoClip([base, overlay, waves])
                  else:
                      final_vid = CompositeVideoClip([base, overlay])
                      
                  final_vid = final_vid.set_audio(base.audio)
                  final_vid.write_videofile("temp_out.mp4", fps=VID_FPS, codec="libx264", audio_codec="aac", verbose=False, logger=None)
                  
                  aud.close()
                  base.close()
                  overlay.close()
                  
                  # ----- دمج ملف الترجمة ASS في الفيديو النهائي -----
                  print("✍️ جاري حرق الترجمة العربية (ASS) على الفيديو...", flush=True)
                  os.system('ffmpeg -y -i temp_out.mp4 -vf "ass=subs.ass" -c:a copy out.mp4 -loglevel quiet')
                  
                  # في حال فشل حرق الترجمة لأي سبب تقني، نستخدم النسخة بدون ترجمة
                  if not os.path.exists("out.mp4"):
                      os.rename("temp_out.mp4", "out.mp4")

                  if os.path.exists("out.mp4"):
                      upload_to_catbox("out.mp4")
                      
                      yt_title = generate_youtube_title(data['title'], script)
                      yt_desc = generate_youtube_desc(data['title'], script)
                      thumb_path = create_youtube_thumbnail(yt_title)

                      if ENABLE_YOUTUBE_UPLOAD == 1 and 'YOUTUBE_CREDENTIALS' in os.environ:
                          print(f"📤 جاري الرفع إلى يوتيوب بعنوان:\n{yt_title}", flush=True)
                          try:
                              creds = Credentials.from_authorized_user_info(json.loads(os.environ['YOUTUBE_CREDENTIALS']))
                              youtube = build('youtube', 'v3', credentials=creds)
                              body = {
                                  'snippet': {
                                      'title': yt_title,
                                      'description': yt_desc + "\n\nThis game is for entertainment purposes only and complies with YouTube policies.",
                                      'categoryId': '24'
                                  },
                                  'status': {'privacyStatus': 'public', 'selfDeclaredMadeForKids': False}
                              }
                              req = youtube.videos().insert(part=','.join(body.keys()), body=body, media_body=MediaFileUpload("out.mp4", chunksize=-1, resumable=True))
                              res = req.execute()
                              
                              if os.path.exists(thumb_path):
                                  print("🖼️ رفع الصورة المصغرة المخصصة...", flush=True)
                                  youtube.thumbnails().set(videoId=res['id'], media_body=MediaFileUpload(thumb_path)).execute()
                                  
                              print("✅ تم الرفع على يوتيوب بنجاح!")
                          except Exception as e: 
                              print(f"❌ فشل الرفع لليوتيوب: {e}")
                      else:
                          print("⏸️ تم إيقاف الرفع لليوتيوب بناءً على الإعدادات.")

                      with open(HISTORY_FILE, "a", encoding="utf-8") as f:
                          f.write(f"{data['title']}|{datetime.now().strftime('%Y-%m-%d')}\n")

          if __name__ == "__main__":
              asyncio.run(start_production())
              print("⏱️ الجلسة مستمرة لمدة 4 ساعات...")
              time.sleep(4 * 60 * 60)
          EOF
          python -u script.py

      - name: 💾 Commit History
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add shows_history.txt || true
          git commit -m "Update history" || true
          git push || true

      - name: ⏳ Persistence
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run "Perpetual Dual" --ref ${{ github.ref_name }}
