name: Perpetual Dual

on:
  workflow_dispatch:

concurrency:
  group: streaming-group
  cancel-in-progress: true

jobs:
  stream:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: 🧹 Delete Old Logs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 1

      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 🚀 Create and Run Script
        env:
          YOUTUBE_CREDENTIALS: ${{ secrets.YOUTUBE_CREDENTIALS }}
        run: |
          pip install requests bs4 "moviepy==1.0.3" "pillow==10.2.0" g4f tqdm nest_asyncio google-api-python-client google-auth-httplib2 google-auth-oauthlib numpy sherpa-onnx scipy -q
          
          echo "📥 جاري تحميل موديل الصوت العربي الواقعي (Sherpa-ONNX/VITS)..."
          # استخدام || true يمنع توقف الأكشن إذا فشل التحميل لأي سبب
          wget -q https://github.com/k2-fsa/sherpa-onnx/releases/download/tts-models/vits-piper-ar_JO-faris-low.tar.bz2 || true
          
          if [ -f "vits-piper-ar_JO-faris-low.tar.bz2" ]; then
            tar xf vits-piper-ar_JO-faris-low.tar.bz2 || true
            rm vits-piper-ar_JO-faris-low.tar.bz2 || true
          fi
          
          cat << 'EOF' > script.py
          # ==========================================
          # استدعاء جميع المكتبات
          # ==========================================
          import os, asyncio, re, warnings, urllib3, requests, time, gc, json, random
          import nest_asyncio
          import g4f
          from bs4 import BeautifulSoup
          from tqdm import tqdm
          import numpy as np

          # --- حل مشكلة PIL.Image.ANTIALIAS مع MoviePy ---
          import PIL.Image
          if not hasattr(PIL.Image, 'ANTIALIAS'):
              PIL.Image.ANTIALIAS = PIL.Image.LANCZOS
          # -----------------------------------------------

          from moviepy.editor import ImageClip, AudioFileClip
          from datetime import datetime
          from google.oauth2.credentials import Credentials
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaFileUpload

          # ==========================================
          # إعدادات بيئة العمل
          # ==========================================
          nest_asyncio.apply()
          urllib3.disable_warnings(urllib3.exceptions.InsecureRequestWarning)
          warnings.filterwarnings("ignore", category=UserWarning)
          os.environ["IMAGEIO_FFMPEG_EXE"] = "ffmpeg"
          os.environ["SDL_VIDEODRIVER"] = "dummy"

          HISTORY_FILE = "shows_history.txt"

          # ==========================================
          # دوال جلب وإنشاء المحتوى
          # ==========================================
          def get_data():
              history_titles = []
              if os.path.exists(HISTORY_FILE):
                  with open(HISTORY_FILE, "r", encoding="utf-8") as f:
                      for line in f:
                          if "|" in line:
                              history_titles.append(line.split("|")[0].strip())

              base = "https://www.shorttv.live"
              try:
                  r = requests.get(f"{base}/ar", headers={"User-Agent": "Mozilla/5.0"}, verify=False, timeout=10)
                  soup = BeautifulSoup(r.text, 'html.parser')
                  
                  links = soup.find_all('a', href=True)
                  random.shuffle(links)

                  for a in links:
                      img = a.find('img')
                      if not img: continue
                      title = re.sub(r'[a-zA-Z]', '', img.get('alt', '')).strip()
                      if len(title) < 5: continue
                      
                      # التحقق من أن الفيديو لم يتم عمله من قبل
                      if title in history_titles:
                          continue 
                      
                      s_url = a['href'] if a['href'].startswith('http') else base + a['href']
                      s_page = requests.get(s_url, verify=False, timeout=5)
                      s_soup = BeautifulSoup(s_page.text, 'html.parser')
                      meta = s_soup.find('meta', attrs={'name': 'description'})
                      desc = meta.get('content', '') if meta else "قصة درامية مشوقة"
                      
                      i_url = img.get('src') or img.get('data-src')
                      if i_url.startswith('//'): i_url = "https:" + i_url
                      
                      img_data = requests.get(i_url).content
                      with open("p.jpg", "wb") as f: f.write(img_data)
                      return {"title": title, "desc": desc}
              except Exception as e:
                  return None
              
              return None

          async def make_audio(text):
              clean_text = re.sub(r'[^\u0600-\u06FF\s،.]', '', text)
              try:
                  print("🎙️ جاري توليد الصوت حصرياً باستخدام Sherpa-ONNX (VITS)...")
                  import scipy.io.wavfile as wav
                  import sherpa_onnx
                  
                  # التأكد من وجود الموديل قبل التشغيل
                  if not os.path.exists("vits-piper-ar_JO-faris-low"):
                      raise Exception("ملفات الموديل غير موجودة. لن يتم استخدام أي بديل آخر.")

                  tts_config = sherpa_onnx.OfflineTtsModelConfig(
                      vits=sherpa_onnx.OfflineVitsModelConfig(
                          model="vits-piper-ar_JO-faris-low/ar_JO-faris-low.onnx",
                          tokens="vits-piper-ar_JO-faris-low/tokens.txt",
                          data_dir="vits-piper-ar_JO-faris-low/espeak-ng-data",
                      ), num_threads=1
                  )
                  tts = sherpa_onnx.OfflineTts(tts_config)
                  
                  # === نظام التقطيع الذكي لمنع التهنيج (Chunking) ===
                  # استبدال الفواصل بنقاط لتسهيل التقطيع
                  temp_text = clean_text.replace('،', '.')
                  sentences = [s.strip() for s in temp_text.split('.') if len(s.strip()) > 3]
                  
                  print(f"🔄 تم تقسيم النص إلى {len(sentences)} جملة للمعالجة الآمنة...")
                  all_samples = []
                  sample_rate = None
                  
                  for i, sentence in enumerate(sentences):
                      audio = tts.generate(sentence)
                      if sample_rate is None:
                          sample_rate = audio.sample_rate
                      all_samples.extend(audio.samples)
                      
                      # إضافة صمت قصير (نصف ثانية) بين كل جملة لواقعية التنفس
                      silence = np.zeros(int(sample_rate * 0.4), dtype=np.float32)
                      all_samples.extend(silence)
                  
                  final_samples = np.array(all_samples, dtype=np.float32)
                  
                  # حفظ الملف كـ wav ثم تحويله لـ mp3
                  wav.write("v.wav", sample_rate, final_samples)
                  os.system("ffmpeg -i v.wav -codec:a libmp3lame -qscale:a 2 v.mp3 -y -loglevel quiet")
                  print("🎙️ ✅ تم توليد الصوت الاحترافي بنجاح عبر Sherpa-ONNX")
              
              except Exception as e:
                  print(f"❌ فشل توليد الصوت عبر Sherpa-ONNX: {e}")
                  raise Exception("تم إيقاف العملية لعدم وجود بديل للصوت بناء على طلبك.")

          def create_story(t, d):
              full_story = ""
              current_context = d
              print(f"🔄 البدء في توليد الملحمة (Target: ~300 words for ~2 mins video)...")
              
              iteration = 1
              max_iterations = 6 
              
              while len(full_story.split()) < 250 and iteration <= max_iterations:
                  success = False
                  for attempt in range(3):
                      try:
                          if iteration == 1:
                              prompt = (f"ابدأ القصة بـ Hook تشويقي باللهجة العامية المصرية بأسلوب: 'في مسلسلنا اليوم.. {t}.. [موقف صادم أو تضحية].. وفي الآخر بيحصل [خيانة أو صدمة]!' "
                                        f"خليه أسلوب حكواتي بيشد اللي قدامه. "
                                        f"بعد الـ Hook، ادخل فوراً في السرد الملحمي باللغة العربية الفصحى. "
                                        f"بناءً على الوصف: {current_context}. "
                                        f"يجب أن تكون الفقرة مسترسلة في حدود 150 كلمة، بدون أرقام أو رموز.")
                          else:
                              prompt = (f"أكمل القصة السابقة بحدث درامي جديد. "
                                        f"آخر ما حدث هو: {full_story[-100:]}. "
                                        f"اكتب فقرة مسترسلة في حدود 150 كلمة. "
                                        f"تذكر: لغة عربية فصحى فقط بدون أرقام أو رموز.")

                          response = g4f.ChatCompletion.create(
                              model=g4f.models.gpt_4,
                              messages=[{"role":"user", "content": prompt}]
                          )
                          
                          if response and len(response) > 50:
                              chunk = re.sub(r'[*#\-]', '', response).strip()
                              full_story += " " + chunk
                              success = True
                              current_words = len(full_story.split())
                              print(f"✅ تم توليد الجزء {iteration} بنجاح. (إجمالي الكلمات حتى الآن: {current_words})")
                              break
                          else:
                              print(f"⚠️ استجابة قصيرة في الجزء {iteration} (محاولة {attempt+1})...")
                              time.sleep(2)
                      except Exception as e:
                          print(f"⚠️ محاولة فاشلة في الجزء {iteration} (محاولة {attempt+1})...")
                          time.sleep(5)
                  
                  if not success:
                      print(f"❌ تعذر استكمال الأجزاء، سيتم الاكتفاء بما تم جمعه.")
                      break
                      
                  iteration += 1
                  time.sleep(2) 
                  
              words = full_story.split()
              if len(words) >= 350:
                  full_story = " ".join(words[:350])
                  print(f"✂️ تم الوصول للحد الأقصى للاختبار وتم ضبط القصة لتكون بحدود 350 كلمة (فيديو قصير).")
              
              return full_story.strip() if full_story else f""

          async def start_video_creation():
              with tqdm(total=4, desc="🚀 العمل جاري", unit="step", bar_format='{l_bar}{bar}| {n_fmt}/{total_fmt} [{elapsed}]') as pbar:
                  pbar.set_description("🔍 جلب البيانات")
                  data = get_data()
                  if not data: 
                      pbar.write("❌ فشل في جلب البيانات، إما بسبب التكرار أو خطأ في الاتصال.")
                      return None
                  
                  t = data['title']
                  pbar.write(f"🎬 العنوان المستهدف: {t}")
                  pbar.update(1)

                  pbar.set_description("🤖 تأليف الملحمة القصيرة للاختبار")
                  ai_story = create_story(t, data['desc'])
                  fixed_intro = f""
                  final_story_text = fixed_intro + ai_story
                  word_count = len(final_story_text.split())
                  pbar.write(f"📖 الطول النهائي للقصة: {word_count} كلمة.")
                  pbar.update(1)

                  pbar.set_description("🎙️ توليد الصوت")
                  await make_audio(final_story_text)
                  pbar.update(1)

                  pbar.set_description("🎬 مونتاج الفيديو مع تأثير الثلج المتحرك")
                  final_video_name = "out.mp4"
                  try:
                      if not os.path.exists("v.mp3"):
                          raise Exception("ملف الصوت غير موجود، تم إيقاف المونتاج.")
                      
                      aud = AudioFileClip("v.mp3")
                      base_vid = ImageClip("p.jpg").resize(height=720)
                      
                      # =========================================
                      # إنشاء تأثير الثلج المتحرك (Falling Snow)
                      # =========================================
                      w, h = base_vid.w, base_vid.h
                      num_flakes = 350
                      
                      # توليد إحداثيات عشوائية لكرات الثلج
                      flakes_x = np.random.randint(0, w, num_flakes)
                      flakes_y = np.random.randint(0, h, num_flakes)
                      # سرعات متفاوتة للتساقط ليعطي واقعية
                      flakes_speed = np.random.randint(30, 100, num_flakes) 
                      # أحجام مختلفة للثلج
                      flakes_size = np.random.randint(1, 4, num_flakes)

                      def add_snow_effect(get_frame, t_time):
                          frame = np.copy(get_frame(t_time))
                          for i in range(num_flakes):
                              # حساب حركة الثلج بناء على الزمن
                              y = int((flakes_y[i] + t_time * flakes_speed[i]) % h)
                              x = flakes_x[i]
                              s = flakes_size[i]
                              
                              # حدود الرسم لمنع تجاوز أبعاد الصورة
                              y_end = min(y + s, h)
                              x_end = min(x + s, w)
                              
                              # تلوين البيكسلات باللون الأبيض المائل للزرقة الفاتحة
                              frame[y:y_end, x:x_end] = [240, 248, 255]
                          return frame

                      vid = base_vid.set_duration(aud.duration).fl(add_snow_effect).set_audio(aud)
                      
                      # fps=15 كافية جداً لحركة الثلج وتسرع الرندر
                      vid.write_videofile(final_video_name, fps=15, codec="libx264", audio_codec="aac", temp_audiofile='temp-audio.m4a', remove_temp=True, verbose=False, logger=None)
                      aud.close()
                  except Exception as e:
                      pbar.write(f"Video Error: {e}")
                      return None
                  pbar.update(1)
                  
                  # إرجاع العنوان والقصة المولدة لاستخدامها في عنوان اليوتيوب
                  return {"title": t, "story": ai_story}

          # ==========================================
          # عملية إنتاج فيديو واحد فقط
          # ==========================================
          print("\n" + "="*60)
          print("🔄 بدء الجلسة: سيتم إنتاج ورفع فيديو واحد للاختبار...")
          print("="*60)

          loop = asyncio.get_event_loop()

          try:
              result_data = loop.run_until_complete(start_video_creation())

              if result_data and os.path.exists("out.mp4"):
                  video_title = result_data["title"]
                  ai_story = result_data["story"]
                  
                  # === فترة انتظار عشوائية للتمويه من 1 إلى 5 دقائق قبل الرفع ===
                  wait_time = random.randint(60, 300)
                  print(f"\n⏳ تم إنتاج الفيديو بنجاح. انتظار عشوائي لمدة {wait_time // 60} دقيقة و {wait_time % 60} ثانية للتمويه قبل الرفع إلى اليوتيوب...")
                  time.sleep(wait_time)
                  # ============================================

                  print("\n📤 جاري الرفع إلى يوتيوب (يرجى الانتظار حتى تكتمل العملية)...")
                  try:
                      if 'YOUTUBE_CREDENTIALS' in os.environ:
                          creds_data = json.loads(os.environ['YOUTUBE_CREDENTIALS'])
                          creds = Credentials.from_authorized_user_info(creds_data)
                          youtube = build('youtube', 'v3', credentials=creds)
                          
                          # ========================================================
                          # توليد عنوان مشوق من القصة باستخدام الذكاء الاصطناعي
                          # ========================================================
                          try:
                              prompt_t = f"استخرج حدثاً صادماً ومشوقاً من هذه القصة في جملة قصيرة جداً (لا تتعدى 8 كلمات) لتكون عنواناً جذاباً للفيديو. اكتب الجملة فقط بدون علامات تنصيص أو إضافات: {ai_story[:1000]}"
                              catchy_event = g4f.ChatCompletion.create(model=g4f.models.gpt_4, messages=[{"role":"user", "content": prompt_t}])
                              if catchy_event and len(catchy_event) > 5:
                                  catchy_event = catchy_event.replace('"', '').replace("'", "").strip()
                              else:
                                  catchy_event = "أحداث صادمة ومفاجآت غير متوقعة"
                          except:
                              catchy_event = "أحداث صادمة ومفاجآت غير متوقعة"

                          # دمج الحدث مع كلمة ملخص واسم المسلسل
                          raw_yt_title = f"{catchy_event} | ملخص {video_title}"
                          
                          # التأكد من أن طول العنوان لا يتجاوز حد اليوتيوب المسموح به
                          if len(raw_yt_title) > 95: 
                              raw_yt_title = raw_yt_title[:95] + "..."

                          # تجهيز الوصف بالصيغة المطلوبة + جزء من القصة
                          full_description = f"مسلسل {video_title} مدبلج بالعربي ملخص كامل تلخيص جميع الاجزاء المترجمة \n\n{ai_story[:500]}..."

                          body = {
                              'snippet': {
                                  'title': raw_yt_title, 
                                  'description': full_description, 
                                  'categoryId': '24'
                              },
                              'status': {'privacyStatus': 'public', 'selfDeclaredMadeForKids': False}
                          }
                          
                          media = MediaFileUpload("out.mp4", chunksize=-1, resumable=True)
                          response = youtube.videos().insert(part=','.join(body.keys()), body=body, media_body=media).execute()
                          print(f"✅ تم الرفع ليوتيوب بنجاح: https://www.youtube.com/watch?v={response['id']}")

                          # تسجيل الفيديو في الهيستوري لمنع تكراره طوال الحياة
                          with open(HISTORY_FILE, "a", encoding="utf-8") as f:
                              f.write(f"{video_title}|{datetime.now().strftime('%Y-%m-%d')}\n")
                  except Exception as e:
                      print(f"❌ فشل يوتيوب: {e}")
              else:
                  print("⚠️ لم يتم إنتاج فيديو في هذه الدورة.")

          except Exception as e:
              print(f"❌ حدث خطأ غير متوقع في الدورة: {e}")

          # تنظيف الملفات المؤقتة بعد رفع الفيديو
          for f in os.listdir():
              if f.endswith((".mp3", ".wav", ".jpg", ".webp", ".mp4", ".m4a")) and f != "fallback.webp":
                  try: os.remove(f)
                  except: pass
          
          # ========================================================
          # انتظار 4 ساعات كاملة بعد الرفع مباشرة 
          # ========================================================
          print("\n⏱️ تم إنجاز عملية الرفع. سيتم الآن الانتظار لمدة 4 ساعات كاملة (14400 ثانية) قبل إغلاق الجلسة...")
          time.sleep(4 * 60 * 60)

          print("\n" + "="*50)
          print("✅ انتهت فترة الانتظار (4 ساعات). سيتم الإغلاق للبدء بدورة (Job) جديدة لضمان الاستمرارية.")
          print("="*50)
          EOF
          python script.py

      - name: 💾 Commit History to Repository
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add shows_history.txt || true
          git commit -m "📝 Update trends history" || true
          git push || true

      - name: ⏳ Workflow Persistence (Auto-restart)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "جاري إعادة تشغيل الأكشن لضمان العمل المستمر (Perpetual Dual)..."
          gh workflow run "Perpetual Dual" --ref ${{ github.ref_name }}
