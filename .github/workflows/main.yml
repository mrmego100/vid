name: Perpetual Dual

on:
  workflow_dispatch:

concurrency:
  group: streaming-group
  cancel-in-progress: true

jobs:
  stream:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: 🧹 Delete Old Logs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 1

      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 🚀 Create and Run Script
        env:
          YOUTUBE_CREDENTIALS: ${{ secrets.YOUTUBE_CREDENTIALS }}
        run: |
          sudo apt-get update -q
          # تثبيت أدوات التسجيل والخطوط العربية لدعم الترجمة والصورة المصغرة
          sudo apt-get install -y ffmpeg xvfb chromium-browser pulseaudio fonts-noto-core fonts-noto-extra libfribidi0 -q
          
          # إعداد كارت صوت وهمي لتسجيل أوديو اللعبة
          pulseaudio -D --exit-idle-time=-1 || true
          pacmd load-module module-virtual-sink sink_name=v1 || true
          pacmd set-default-sink v1 || true
          pacmd set-default-source v1.monitor || true
          
          # تثبيت مكتبات بايثون شاملة أدوات دعم اللغة العربية للصورة المصغرة
          for i in {1..5}; do
            pip install --retries 10 requests bs4 "moviepy==1.0.3" "pillow==10.2.0" g4f tqdm nest_asyncio google-api-python-client google-auth-httplib2 google-auth-oauthlib numpy scipy edge-tts arabic-reshaper python-bidi -q && break || sleep 5
          done
          
          # تحميل خط عربي لكتابة العنوان على الصورة المصغرة
          wget -O arabic.ttf https://github.com/google/fonts/raw/main/ofl/notonaskharabic/NotoNaskhArabic-Bold.ttf
          
          cat << 'EOF' > script.py
          import os, asyncio, re, warnings, urllib3, requests, time, gc, json, random, subprocess
          import nest_asyncio
          import g4f
          from bs4 import BeautifulSoup
          from tqdm import tqdm
          import numpy as np
          import edge_tts
          import arabic_reshaper
          from bidi.algorithm import get_display
          from PIL import Image, ImageDraw, ImageFont, ImageFilter, ImageEnhance

          import PIL.Image
          if not hasattr(PIL.Image, 'ANTIALIAS'):
              PIL.Image.ANTIALIAS = PIL.Image.LANCZOS

          from moviepy.editor import ImageClip, AudioFileClip, CompositeVideoClip, VideoFileClip, concatenate_audioclips, CompositeAudioClip
          import moviepy.video.fx.all as vfx
          import moviepy.audio.fx.all as afx
          from datetime import datetime
          from google.oauth2.credentials import Credentials
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaFileUpload

          nest_asyncio.apply()
          urllib3.disable_warnings(urllib3.exceptions.InsecureRequestWarning)
          warnings.filterwarnings("ignore", category=UserWarning)
          os.environ["IMAGEIO_FFMPEG_EXE"] = "ffmpeg"
          os.environ["SDL_VIDEODRIVER"] = "dummy"

          HISTORY_FILE = "shows_history.txt"

          # ---------------- الإعدادات ---------------- #
          ENABLE_YOUTUBE_UPLOAD = 0 # 0 لإيقاف الرفع، 1 للتشغيل
          VOICE_NARRATOR = "ar-EG-ShakirNeural"
          VID_WIDTH = 1280
          VID_HEIGHT = 1400
          VID_FPS = 40
          
          # التحكم في عدد كلمات القصة (يمكنك تغييرها كما تحب)
          STORY_WORDS_MIN = 50
          STORY_WORDS_MAX = 100

          BAD_KEYWORDS = ["logo", "icon", "avatar", "brand", "header", "footer", "button", "banner", "sign"]
          
          SITES_CONFIG = [
              {"name": "ReelShort", "url": "https://www.reelshort.com/ar", "base": "https://www.reelshort.com"},
              {"name": "DramaBox", "url": "https://www.dramabox.com/ar", "base": "https://www.dramabox.com"},
              {"name": "FlexTV", "url": "https://flextv.cc/ar", "base": "https://flextv.cc"},
              {"name": "ShortTV", "url": "https://www.shorttv.live/ar", "base": "https://www.shorttv.live"}
          ]
          # ------------------------------------------- #

          def is_valid_image(url, alt_text):
              url_lower = url.lower()
              alt_lower = alt_text.lower()
              if any(word in url_lower or word in alt_lower for word in BAD_KEYWORDS):
                  return False
              if "icon" in url_lower or "logo" in url_lower:
                  return False
              return True

          def get_data():
              print("🔍 جاري فحص المنصات لجلب مسلسل جديد...", flush=True)
              history = []
              if os.path.exists(HISTORY_FILE):
                  with open(HISTORY_FILE, "r", encoding="utf-8") as f:
                      for line in f:
                          if "|" in line: history.append(line.split("|")[0].strip())
              
              random.shuffle(SITES_CONFIG)
              headers = {
                  "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36",
                  "Accept-Language": "ar-EG,ar;q=0.9,en-US;q=0.8,en;q=0.7",
              }

              for site in SITES_CONFIG:
                  print(f"🔎 جاري فحص موقع: {site['name']}...", flush=True)
                  try:
                      response = requests.get(site['url'], headers=headers, timeout=25, verify=False)
                      if response.status_code != 200: continue

                      soup = BeautifulSoup(response.text, 'html.parser')
                      found_shows = []

                      scripts = soup.find_all('script')
                      for script in scripts:
                          if not script.string: continue
                          json_matches = re.findall(r'\{"id":.*?"title":"([^"]+)".*?"(?:cover|poster|image)":"([^"]+)"', script.string)
                          
                          for m_title, m_img in json_matches:
                              clean_title = m_title.encode().decode('unicode-escape').strip() if '\\u' in m_title else m_title.strip()
                              clean_title = re.sub(r'[a-zA-Z0-9]', '', clean_title).strip()
                              
                              if len(clean_title) > 3 and clean_title not in history:
                                  if is_valid_image(m_img, clean_title) and m_img.startswith('http'):
                                      found_shows.append({"title": clean_title, "image": m_img, "desc": f"دراما واقعية ومشوقة من منصة {site['name']}"})

                      if not found_shows:
                          for img in soup.find_all('img', alt=True):
                              raw_alt = img.get('alt', '').strip()
                              title = re.sub(r'[a-zA-Z0-9]', '', raw_alt).strip()
                              
                              if len(title) > 3 and title not in history:
                                  img_url = img.get('data-src') or img.get('data-original') or img.get('src') or img.get('srcset')
                                  if img_url:
                                      img_url = img_url.split(' ')[0] 
                                      if img_url.startswith('//'): img_url = "https:" + img_url
                                      if not img_url.startswith('http'): img_url = site['base'] + img_url
                                      
                                      if is_valid_image(img_url, raw_alt) and "base64" not in img_url:
                                          found_shows.append({"title": title, "image": img_url, "desc": f"دراما واقعية ومشوقة من منصة {site['name']}"})

                      if found_shows:
                          selected = random.choice(found_shows)
                          print(f"🎯 تم اختيار مسلسل: '{selected['title']}' من منصة {site['name']}", flush=True)
                          with open("p.jpg", "wb") as f: f.write(requests.get(selected['image'], headers=headers, verify=False).content)
                          return {"title": selected['title'], "desc": selected['desc']}

                  except Exception as e:
                      print(f"⚠️ خطأ في {site['name']}: {e}", flush=True)
                      continue
              return None

          def record_live_game(duration):
              print(f"🎮 جاري تسجيل اللعبة والصوت لمدة {int(duration)} ثانية ({VID_WIDTH}x{VID_HEIGHT} - {VID_FPS}FPS)...", flush=True)
              try:
                  os.environ['DISPLAY'] = ':99'
                  xvfb = subprocess.Popen(['Xvfb', ':99', '-screen', '0', f'{VID_WIDTH}x{VID_HEIGHT}x24'])
                  time.sleep(3)
                  
                  chrome = subprocess.Popen([
                      'chromium-browser', 
                      '--kiosk', f'--window-size={VID_WIDTH},{VID_HEIGHT}', 
                      '--no-sandbox', '--disable-gpu', 
                      '--autoplay-policy=no-user-gesture-required', 
                      'https://meja.do.am/asd/GoZiLG.html'
                  ])
                  time.sleep(5)
                  
                  rec_duration = int(duration) + 2
                  cmd = f'ffmpeg -y -video_size {VID_WIDTH}x{VID_HEIGHT} -framerate {VID_FPS} -f x11grab -i :99.0+0,0 -f pulse -i default -t {rec_duration} -c:v libx264 -preset veryfast -pix_fmt yuv420p -c:a aac bg.mp4 -loglevel quiet'
                  ret = os.system(cmd)
                  
                  if ret != 0 or not os.path.exists("bg.mp4"):
                      print("⚠️ تنبيه: فشل تسجيل الصوت عبر PulseAudio، سيتم تسجيل الشاشة بدون صوت احتياطياً...", flush=True)
                      os.system(f'ffmpeg -y -video_size {VID_WIDTH}x{VID_HEIGHT} -framerate {VID_FPS} -f x11grab -i :99.0+0,0 -t {rec_duration} -c:v libx264 -preset veryfast -pix_fmt yuv420p bg.mp4 -loglevel quiet')

                  chrome.terminate()
                  xvfb.terminate()
                  
                  if os.path.exists("bg.mp4"):
                      print("✅ تم تسجيل خلفية الفيديو بنجاح!")
                      return "bg.mp4"
              except Exception as e:
                  print(f"❌ خطأ أثناء تسجيل المتصفح: {e}")
              return None

          def upload_to_catbox(filepath):
              print("📤 جاري الرفع إلى Catbox...", flush=True)
              try:
                  with open(filepath, 'rb') as f:
                      response = requests.post(
                          'https://catbox.moe/user/api.php',
                          data={'reqtype': 'fileupload'},
                          files={'fileToUpload': f}
                      )
                  if response.status_code == 200:
                      print(f"✅ تم الرفع على Catbox بنجاح، الرابط: {response.text}")
                  else:
                      print(f"❌ فشل الرفع على Catbox، كود الخطأ: {response.status_code}")
              except Exception as e:
                  print(f"❌ حدث خطأ أثناء الرفع لـ Catbox: {e}")

          def create_narrative_script(t, d):
              print(f"🤖 جاري تأليف القصة ({STORY_WORDS_MIN}-{STORY_WORDS_MAX} كلمة)...", flush=True)
              prompt = (f"أنت راوي قصص. اكتب قصة سردية عن مسلسل '{t}' بناءً على: {d}. "
                        f"شرط إجباري وحاسم: يجب أن يتراوح طول القصة بين {STORY_WORDS_MIN} إلى {STORY_WORDS_MAX} كلمة بالتمام والكمال. قم بزيادة الوصف للوصول للرقم. "
                        "يجب أن تبدأ بـ 'هوك' (Hook) قوي جداً وصادم يخاطب المشاهد (بصيغة أنت) لجذب انتباهه من أول كلمة. "
                        "ممنوع استخدام الحوارات المتبادلة. السرد متصل بلسان راوي واحد. "
                        "ممنوع استخدام أي رموز، أقواس، نجوم، أو أسماء شخصيات مسبوقة بنقطتين. "
                        "تحذير هام جداً: لا تكتب أي مقدمات أو ترحيب أو خاتمات (مثل: 'إليك القصة'، 'حسناً'). ابدأ بسرد القصة مباشرة وبدون أي مقدمات أو ردود من الذكاء الاصطناعي.")
              try:
                  response = g4f.ChatCompletion.create(model=g4f.models.gpt_4, messages=[{"role":"user", "content": prompt}])
                  clean_chunk = re.sub(r'[*#_\[\]()\-]', '', response).replace('\\', '').strip()
                  print(f"   -> تم توليد القصة بنجاح ({len(clean_chunk.split())} كلمة تقريبا).", flush=True)
                  return clean_chunk
              except Exception as e: 
                  print(f"❌ خطأ في توليد السيناريو: {e}")
                  return ""

          def generate_youtube_title(story):
              print("🤖 جاري توليد عنوان يوتيوب جذاب...", flush=True)
              prompt = (f"بناءً على هذه القصة: '{story[:600]}...'\n"
                        "اكتب عنوان يوتيوب واحد فقط، مشوق وجذاب جداً (Clickbait) يشبه هذا النمط: 'الجميع ظنه ضعيفًا! حتى رأوه يهزم أميرة الشمال ويدخل معسكر الأعداء وحده.' "
                        "يجب أن يكون مستخرجاً من أحداث القصة الحقيقية. لا تضع أي رموز أو أقواس، فقط أرسل العنوان النهائي مباشرة.")
              try:
                  title = g4f.ChatCompletion.create(model=g4f.models.gpt_4, messages=[{"role":"user", "content": prompt}]).strip()
                  return title.replace('"', '').replace("'", "")
              except:
                  return "أحداث صادمة لن تتوقعها أبداً!"

          def format_description(story, real_title):
              words = real_title.split() + ["مدبلج", "كامل", "مترجم"]
              desc_words = story.split()[:150] # نأخذ أول 150 كلمة من القصة كجزء للوصف
              step = max(1, len(desc_words) // (len(words) + 1))
              for i, w in enumerate(words):
                  insert_idx = (i + 1) * step
                  if insert_idx < len(desc_words):
                      desc_words.insert(insert_idx, w)
              return " ".join(desc_words) + "..."

          def create_thumbnail(title):
              print("🎨 جاري تصميم الصورة المصغرة (Thumbnail)...", flush=True)
              width, height = 1280, 720
              img = Image.new('RGB', (width, height), color=(15, 15, 25))
              draw = ImageDraw.Draw(img)
              
              # رسم أشكال دخانية وملونة مموهة
              colors = [(255, 50, 50), (50, 50, 255), (50, 255, 50), (255, 255, 50), (255, 50, 255), (50, 255, 255)]
              for _ in range(40):
                  x = random.randint(-200, width + 200)
                  y = random.randint(-200, height + 200)
                  r = random.randint(150, 400)
                  color = random.choice(colors)
                  draw.ellipse([x-r, y-r, x+r, y+r], fill=color)
                  
              img = img.filter(ImageFilter.GaussianBlur(radius=80)) # تمويه عالي
              enhancer = ImageEnhance.Brightness(img)
              img = enhancer.enhance(0.4) # تغميق الخلفية لبروز النص
              draw = ImageDraw.Draw(img)
              
              reshaped_text = arabic_reshaper.reshape(title)
              bidi_text = get_display(reshaped_text)
              
              try: font = ImageFont.truetype("arabic.ttf", 65)
              except: font = ImageFont.load_default()
              
              import textwrap
              lines = textwrap.wrap(bidi_text, width=28)
              y_text = height // 2 - (len(lines) * 90) // 2
              
              for line in lines:
                  bbox = draw.textbbox((0, 0), line, font=font)
                  w = bbox[2] - bbox[0]
                  x_text = (width - w) / 2
                  # Stroke
                  stroke_width = 4
                  for dx in range(-stroke_width, stroke_width+1):
                      for dy in range(-stroke_width, stroke_width+1):
                          draw.text((x_text+dx, y_text+dy), line, font=font, fill=(0,0,0))
                  # Text
                  draw.text((x_text, y_text), line, font=font, fill=(255,255,255))
                  y_text += 90
                  
              img.save("thumb.jpg")

          def format_ass_time(vtt_time):
              # تحويل الوقت من VTT (HH:MM:SS.mmm) إلى ASS (H:MM:SS.cc)
              h, m, s = vtt_time.split('.')[0].split(':')
              ms = vtt_time.split('.')[1][:2]
              return f"{int(h)}:{m}:{s}.{ms}"

          def vtt_to_ass(vtt_file, ass_file):
              ass_header = """[Script Info]
ScriptType: v4.00+

[V4+ Styles]
Format: Name, Fontname, Fontsize, PrimaryColour, BackColour, Bold, Italic, BorderStyle, Outline, Shadow, Alignment, MarginL, MarginR, MarginV, Encoding
Style: Default,Noto Naskh Arabic,80,&H0000FFFF,&H00000000,1,0,1,4,2,2,20,20,350,1

[Events]
Format: Layer, Start, End, Style, Text\n"""
              events = []
              with open(vtt_file, 'r', encoding='utf-8') as f:
                  lines = f.readlines()
                  
              i = 0
              while i < len(lines):
                  if '-->' in lines[i]:
                      times = lines[i].strip().split(' --> ')
                      start = format_ass_time(times[0])
                      end = format_ass_time(times[1])
                      text = lines[i+1].strip()
                      events.append(f"Dialogue: 0,{start},{end},Default,{text}\n")
                      i += 2
                  else:
                      i += 1
                      
              with open(ass_file, 'w', encoding='utf-8') as f:
                  f.write(ass_header)
                  f.writelines(events)

          async def process_audio(script):
              if not script: return False
              print("🎙️ معالجة الصوت والترجمة العربية الدقيقة...", flush=True)
              try:
                  communicate = edge_tts.Communicate(script, VOICE_NARRATOR, rate="+4%")
                  submaker = edge_tts.SubMaker()
                  with open("v.mp3", "wb") as file:
                      async for chunk in communicate.stream():
                          if chunk["type"] == "audio":
                              file.write(chunk["data"])
                          elif chunk["type"] == "WordBoundary":
                              submaker.create_sub((chunk["offset"], chunk["duration"]), chunk["text"])
                  
                  with open("subs.vtt", "w", encoding="utf-8") as file:
                      file.write(submaker.generate_subs())
                      
                  vtt_to_ass("subs.vtt", "subs.ass")
                  return True
              except Exception as e:
                  print(f"❌ خطأ في توليد الصوت/الترجمة: {e}")
                  return False

          async def start_production():
              data = get_data()
              if not data: return
              
              script = create_narrative_script(data['title'], data['desc'])
              if len(script.split()) < 10: 
                  print("⚠️ السيناريو قصير جداً، تم إلغاء العملية.")
                  return
                  
              yt_title = generate_youtube_title(script)
              yt_desc = format_description(script, data['title'])
              create_thumbnail(yt_title)
              
              if await process_audio(script):
                  print("🎬 بدء المونتاج السينمائي ودمج الأصوات...", flush=True)
                  
                  aud = AudioFileClip("v.mp3")
                  
                  img = Image.new('RGBA', (VID_WIDTH, VID_HEIGHT), (0, 0, 0, 0))
                  draw = ImageDraw.Draw(img)
                  try: small_font = ImageFont.truetype("Roboto-Bold.ttf", 22)
                  except: small_font = ImageFont.load_default()
                  disclaimer = "This game is for entertainment purposes only and complies with YouTube policies."
                  draw.text((40, VID_HEIGHT - 60), disclaimer, font=small_font, fill=(255, 255, 255, 200))
                  img.save("overlay.png")

                  # تصميم الموجات الصوتية في الأعلى يميناً ومتعددة الألوان متحركة
                  os.system(f'ffmpeg -i v.mp3 -filter_complex "[0:a]showwaves=s=400x150:colors=red:mode=cline,hue=H=t:s=1,format=yuv420p[v]" -map "[v]" -c:v libx264 temp_waves.mp4 -y -loglevel quiet')

                  bg_vid_file = record_live_game(aud.duration)
                  
                  if bg_vid_file:
                      base = VideoFileClip(bg_vid_file).resize(height=VID_HEIGHT)
                      if base.w > VID_WIDTH:
                          base = base.crop(x_center=base.w/2, width=VID_WIDTH)
                          
                      if base.duration < aud.duration:
                          base = base.fx(vfx.loop, duration=aud.duration)
                      else:
                          base = base.subclip(0, aud.duration)
                          
                      if base.audio is not None:
                          game_audio = base.audio.fx(afx.volumex, 0.3)
                          final_audio = CompositeAudioClip([game_audio.set_duration(aud.duration), aud])
                          base = base.set_audio(final_audio)
                      else:
                          base = base.set_audio(aud)
                  else:
                      base = ImageClip("p.jpg").resize(height=VID_HEIGHT).set_duration(aud.duration)
                      if base.w > VID_WIDTH:
                          base = base.crop(x_center=base.w/2, width=VID_WIDTH)
                      base = base.set_audio(aud)

                  overlay = ImageClip("overlay.png").set_duration(aud.duration)
                  
                  if os.path.exists("temp_waves.mp4"):
                      waves = VideoFileClip("temp_waves.mp4").without_audio().fx(vfx.mask_color, color=[0,0,0], thr=10, s=5).set_position((VID_WIDTH - 430, 40)).set_opacity(0.9)
                      final_vid = CompositeVideoClip([base, overlay, waves])
                      final_vid = final_vid.set_audio(base.audio)
                      final_vid.write_videofile("temp_out.mp4", fps=VID_FPS, codec="libx264", audio_codec="aac", verbose=False, logger=None)
                  else:
                      final_vid = CompositeVideoClip([base, overlay])
                      final_vid = final_vid.set_audio(base.audio)
                      final_vid.write_videofile("temp_out.mp4", fps=VID_FPS, codec="libx264", audio_codec="aac", verbose=False, logger=None)
                  
                  # حرق ملف الترجمة العربي (ASS) على الفيديو النهائي
                  print("🔤 حرق الترجمة العربية على الفيديو...", flush=True)
                  os.system('ffmpeg -y -i temp_out.mp4 -vf "subtitles=subs.ass" -c:v libx264 -preset fast -c:a copy final_out.mp4 -loglevel quiet')

                  if os.path.exists("final_out.mp4"):
                      upload_to_catbox("final_out.mp4")

                      if ENABLE_YOUTUBE_UPLOAD == 1 and 'YOUTUBE_CREDENTIALS' in os.environ:
                          print("📤 جاري الرفع إلى يوتيوب...", flush=True)
                          try:
                              creds = Credentials.from_authorized_user_info(json.loads(os.environ['YOUTUBE_CREDENTIALS']))
                              youtube = build('youtube', 'v3', credentials=creds)
                              body = {
                                  'snippet': {
                                      'title': yt_title,
                                      'description': yt_desc,
                                      'categoryId': '24'
                                  },
                                  'status': {'privacyStatus': 'public', 'selfDeclaredMadeForKids': False}
                              }
                              res = youtube.videos().insert(part=','.join(body.keys()), body=body, media_body=MediaFileUpload("final_out.mp4", chunksize=-1, resumable=True)).execute()
                              print("✅ تم الرفع على يوتيوب بنجاح!")
                              
                              # رفع الصورة المصغرة
                              if os.path.exists("thumb.jpg"):
                                  youtube.thumbnails().set(videoId=res['id'], media_body=MediaFileUpload('thumb.jpg')).execute()
                                  print("✅ تم رفع الصورة المصغرة بنجاح!")
                          except Exception as e: 
                              print(f"❌ فشل الرفع لليوتيوب: {e}")
                      else:
                          print("⏸️ تم إيقاف الرفع لليوتيوب بناءً على إعدادات ENABLE_YOUTUBE_UPLOAD (القيمة 0).")

                      with open(HISTORY_FILE, "a", encoding="utf-8") as f:
                          f.write(f"{data['title']}|{datetime.now().strftime('%Y-%m-%d')}\n")
                  
                  aud.close()
                  base.close()
                  overlay.close()

          if __name__ == "__main__":
              asyncio.run(start_production())
              print("⏱️ الجلسة مستمرة لمدة 4 ساعات...")
              time.sleep(4 * 60 * 60)
          EOF
          python -u script.py

      - name: 💾 Commit History
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add shows_history.txt || true
          git commit -m "Update history" || true
          git push || true

      - name: ⏳ Persistence
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run "Perpetual Dual" --ref ${{ github.ref_name }}
