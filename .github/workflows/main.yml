name: Perpetual Dual

on:
  workflow_dispatch:

concurrency:
  group: streaming-group
  cancel-in-progress: true

jobs:
  stream:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: 🧹 Delete Old Logs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 1

      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 🚀 Create and Run Script
        env:
          YOUTUBE_CREDENTIALS: ${{ secrets.YOUTUBE_CREDENTIALS }}
        run: |
          sudo apt-get update -q
          sudo apt-get install -y ffmpeg -q
          
          pip install requests bs4 "moviepy==1.0.3" "pillow==10.2.0" g4f tqdm nest_asyncio google-api-python-client google-auth-httplib2 google-auth-oauthlib numpy scipy edge-tts -q
          
          wget -q https://github.com/googlefonts/roboto/raw/main/src/hinted/Roboto-Bold.ttf
          
          cat << 'EOF' > script.py
          import os, asyncio, re, warnings, urllib3, requests, time, gc, json, random
          import nest_asyncio
          import g4f
          from bs4 import BeautifulSoup
          from tqdm import tqdm
          import numpy as np
          import edge_tts
          from moviepy.editor import ImageClip, AudioFileClip, CompositeVideoClip, VideoFileClip, concatenate_audioclips
          import moviepy.video.fx.all as vfx
          from datetime import datetime
          from google.oauth2.credentials import Credentials
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaFileUpload
          from PIL import Image, ImageDraw, ImageFont

          nest_asyncio.apply()
          urllib3.disable_warnings(urllib3.exceptions.InsecureRequestWarning)
          warnings.filterwarnings("ignore", category=UserWarning)
          os.environ["IMAGEIO_FFMPEG_EXE"] = "ffmpeg"

          HISTORY_FILE = "shows_history.txt"

          # إعدادات الأصوات
          VOICE_RAWI = "ar-SA-HamedNeural"  # الراوي (سعودي فخم)
          VOICE_MALE = "ar-EG-ShakirNeural" # ذكر (مصري واقعي)
          VOICE_FEMALE = "ar-EG-SalmaNeural" # أنثى (مصري درامي)

          def get_data():
              print("🔍 جاري جلب البيانات...", flush=True)
              history_titles = []
              if os.path.exists(HISTORY_FILE):
                  with open(HISTORY_FILE, "r", encoding="utf-8") as f:
                      for line in f:
                          if "|" in line: history_titles.append(line.split("|")[0].strip())
              base = "https://www.shorttv.live"
              try:
                  r = requests.get(f"{base}/ar", headers={"User-Agent": "Mozilla/5.0"}, verify=False, timeout=10)
                  soup = BeautifulSoup(r.text, 'html.parser')
                  links = soup.find_all('a', href=True)
                  random.shuffle(links)
                  for a in links:
                      img = a.find('img')
                      if not img: continue
                      title = re.sub(r'[a-zA-Z]', '', img.get('alt', '')).strip()
                      if len(title) < 5 or title in history_titles: continue
                      s_page = requests.get(a['href'] if a['href'].startswith('http') else base + a['href'], verify=False, timeout=5)
                      s_soup = BeautifulSoup(s_page.text, 'html.parser')
                      meta = s_soup.find('meta', attrs={'name': 'description'})
                      desc = meta.get('content', '') if meta else "قصة درامية"
                      i_url = img.get('src') or img.get('data-src')
                      if i_url.startswith('//'): i_url = "https:" + i_url
                      with open("p.jpg", "wb") as f: f.write(requests.get(i_url).content)
                      return {"title": title, "desc": desc}
              except: return None

          def create_story(t, d):
              print("🤖 جاري تأليف السيناريو الدرامي بصيغة الأصوات المتعددة...", flush=True)
              prompt = (f"اكتب ملخصاً درامياً مشوقاً لمسلسل '{t}' بناءً على: {d}. "
                        "يجب أن يكون السرد بنظام السيناريو باستخدام الوسوم التالية فقط: "
                        "[RAWI] للجمل التي يلقيها الراوي. "
                        "[MALE] للجمل التي تنطقها الشخصية الرجل. "
                        "[FEMALE] للجمل التي تنطقها الشخصية الأنثى. "
                        "ممنوع ذكر أسماء الشخصيات (مثل ياسين: أو ليلى:) داخل النص. "
                        "ابدأ بالراوي لوصف المشهد، ثم اجعل الشخصيات تتفاعل بحوار درامي قوي، ثم انهِ بالراوي. "
                        "اللغة: عربية فصحى درامية. النص لا يقل عن 300 كلمة.")
              try:
                  response = g4f.ChatCompletion.create(model=g4f.models.gpt_4, messages=[{"role":"user", "content": prompt}])
                  return response.strip()
              except: return ""

          async def generate_multivocals(script_text):
              print("🎙️ جاري معالجة الأصوات المتعددة (راوي/ذكر/أنثى)...", flush=True)
              segments = re.findall(r'\[(RAWI|MALE|FEMALE)\](.*?)(?=\[(?:RAWI|MALE|FEMALE)\]|$)', script_text, re.DOTALL)
              clips = []
              
              for i, (role, text) in enumerate(segments):
                  text = text.strip()
                  if not text: continue
                  
                  # تنظيف النص من أي علامات أو أسماء متبقية
                  clean_text = re.sub(r'^[ا-ي]+[:]\s*', '', text)
                  filename = f"seg_{i}.mp3"
                  
                  voice = VOICE_RAWI if role == "RAWI" else (VOICE_MALE if role == "MALE" else VOICE_FEMALE)
                  
                  communicate = edge_tts.Communicate(clean_text, voice)
                  await communicate.save(filename)
                  clips.append(AudioFileClip(filename))
              
              final_audio = concatenate_audioclips(clips)
              final_audio.write_audiofile("v.mp3", fps=44100)
              return "v.mp3"

          async def start_process():
              data = get_data()
              if not data: return
              
              script = create_story(data['title'], data['desc'])
              if not script: return
              
              await generate_multivocals(script)
              
              print("🎬 جاري المونتاج النهائي...", flush=True)
              # المونتاج (لوجو، موجات، تأثير الثلج)
              img = Image.new('RGBA', (400, 120), (0, 0, 0, 0))
              draw = ImageDraw.Draw(img)
              try: font = ImageFont.truetype("Roboto-Bold.ttf", 55)
              except: font = ImageFont.load_default()
              draw.text((10, 10), "MegoDrama", font=font, fill=(0, 255, 255, 255))
              draw.line((10, 80, 350, 80), fill=(255, 255, 255, 255), width=4)
              img.save("logo.png")

              os.system('ffmpeg -i v.mp3 -filter_complex "[0:a]showwaves=s=400x120:colors=0x00FFFF:mode=cline,crop=400:60:0:60,format=yuv420p[v]" -map "[v]" -c:v libx264 temp_waves.mp4 -y -loglevel quiet')
              
              aud = AudioFileClip("v.mp3")
              base_vid = ImageClip("p.jpg").resize(height=720).set_duration(aud.duration)
              
              logo_clip = ImageClip("logo.png").set_duration(aud.duration).set_position((30, 30))
              waves_clip = VideoFileClip("temp_waves.mp4").fx(vfx.mask_color, color=[0,0,0], thr=10, s=5).set_position((30, 110)).set_opacity(0.8)
              
              final_vid = CompositeVideoClip([base_vid, logo_clip, waves_clip]).set_audio(aud)
              final_vid.write_videofile("out.mp4", fps=15, codec="libx264", audio_codec="aac", verbose=False, logger=None)
              
              # الرفع ليوتيوب
              if os.path.exists("out.mp4") and 'YOUTUBE_CREDENTIALS' in os.environ:
                  print("📤 جاري الرفع...", flush=True)
                  creds = Credentials.from_authorized_user_info(json.loads(os.environ['YOUTUBE_CREDENTIALS']))
                  youtube = build('youtube', 'v3', credentials=creds)
                  body = {
                      'snippet': {'title': f"ملخص مسلسل {data['title']} | دراما مشوقة", 'description': data['desc'], 'categoryId': '24'},
                      'status': {'privacyStatus': 'public', 'selfDeclaredMadeForKids': False}
                  }
                  media = MediaFileUpload("out.mp4", chunksize=-1, resumable=True)
                  youtube.videos().insert(part=','.join(body.keys()), body=body, media_body=media).execute()
                  with open(HISTORY_FILE, "a", encoding="utf-8") as f: f.write(f"{data['title']}|{datetime.now()}\n")

          asyncio.run(start_process())
          EOF
          python -u script.py

      - name: 💾 Commit History
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add shows_history.txt || true
          git commit -m "📝 Update history" || true
          git push || true

      - name: ⏳ Auto-restart
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run "Perpetual Dual" --ref ${{ github.ref_name }}
