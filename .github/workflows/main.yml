name: Perpetual Dual

on:
  workflow_dispatch:
    inputs:
      audio_url:
        description: 'رابط مباشر لملف التعليق الصوتي (MP3)'
        required: true
        type: string

concurrency:
  group: streaming-group
  cancel-in-progress: true

jobs:
  stream:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: 🧹 Delete Old Logs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 1

      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 🚀 Create and Run Script
        env:
          YOUTUBE_CREDENTIALS: ${{ secrets.YOUTUBE_CREDENTIALS }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          AUDIO_URL: ${{ github.event.inputs.audio_url }}
        run: |
          sudo apt-get update -q
          sudo apt-get install -y ffmpeg fonts-noto-core fonts-noto-extra curl -q
          
          for i in {1..5}; do
            pip install --retries 10 requests bs4 "moviepy==1.0.3" "pillow==10.2.0" g4f tqdm google-api-python-client google-auth-httplib2 google-auth-oauthlib numpy scipy arabic-reshaper python-bidi -q && break || sleep 5
          done
          
          cat << 'EOF' > script.py
import os, re, warnings, urllib3, requests, time, json, random, subprocess
from bs4 import BeautifulSoup
from moviepy.editor import ImageClip, AudioFileClip, VideoFileClip
from PIL import Image, ImageDraw, ImageFont, ImageFilter
import PIL.Image
import arabic_reshaper
from bidi.algorithm import get_display
from google.oauth2.credentials import Credentials
from googleapiclient.discovery import build
from googleapiclient.http import MediaFileUpload

warnings.filterwarnings("ignore", category=UserWarning)
urllib3.disable_warnings(urllib3.exceptions.InsecureRequestWarning)
os.environ["IMAGEIO_FFMPEG_EXE"] = "ffmpeg"
os.environ["SDL_VIDEODRIVER"] = "dummy"

# إعدادات ثابتة
ENABLE_YOUTUBE_UPLOAD = 1
ENABLE_CATBOX_UPLOAD = 0
VID_WIDTH = 1280
VID_HEIGHT = 720
VID_FPS = 24

HISTORY_FILE = "shows_history.txt"
BAD_KEYWORDS = ["logo", "icon", "avatar", "brand", "header", "footer", "button", "banner", "sign"]

SITES_CONFIG = [
    {"name": "ReelShort", "url": "https://www.reelshort.com/ar", "base": "https://www.reelshort.com"},
    {"name": "DramaBox", "url": "https://www.dramabox.com/ar", "base": "https://www.dramabox.com"},
    {"name": "FlexTV", "url": "https://flextv.cc/ar", "base": "https://flextv.cc"},
    {"name": "ShortTV", "url": "https://www.shorttv.live/ar", "base": "https://www.shorttv.live"}
]

def is_valid_image(url, alt_text):
    url_lower = url.lower()
    alt_lower = alt_text.lower()
    if any(word in url_lower or word in alt_lower for word in BAD_KEYWORDS):
        return False
    return True

def get_data():
    print("🔍 جاري فحص المنصات لجلب مسلسل جديد...", flush=True)
    history = []
    if os.path.exists(HISTORY_FILE):
        with open(HISTORY_FILE, "r", encoding="utf-8") as f:
            for line in f:
                if "|" in line:
                    history.append(line.split("|")[0].strip())
    
    random.shuffle(SITES_CONFIG)
    headers = {
        "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36",
        "Accept-Language": "ar-EG,ar;q=0.9"
    }

    for site in SITES_CONFIG:
        print(f"🔎 جاري فحص موقع: {site['name']}...", flush=True)
        try:
            response = requests.get(site['url'], headers=headers, timeout=25, verify=False)
            if response.status_code != 200:
                continue

            soup = BeautifulSoup(response.text, 'html.parser')
            found_shows = []

            scripts = soup.find_all('script')
            for script in scripts:
                if not script.string:
                    continue
                json_matches = re.findall(r'\{"id":.*?"title":"([^"]+)".*?"(?:cover|poster|image)":"([^"]+)"', script.string)
                for m_title, m_img in json_matches:
                    clean_title = m_title.encode().decode('unicode-escape').strip() if '\\u' in m_title else m_title.strip()
                    clean_title = re.sub(r'[a-zA-Z0-9]', '', clean_title).strip()
                    if len(clean_title) > 3 and clean_title not in history:
                        if is_valid_image(m_img, clean_title) and m_img.startswith('http'):
                            found_shows.append({"title": clean_title, "image": m_img, "desc": f"دراما واقعية من {site['name']}"})

            if not found_shows:
                for img in soup.find_all('img', alt=True):
                    raw_alt = img.get('alt', '').strip()
                    title = re.sub(r'[a-zA-Z0-9]', '', raw_alt).strip()
                    if len(title) > 3 and title not in history:
                        img_url = img.get('data-src') or img.get('src')
                        if img_url and not img_url.startswith('data:'):
                            if img_url.startswith('//'):
                                img_url = "https:" + img_url
                            if not img_url.startswith('http'):
                                img_url = site['base'] + img_url
                            if is_valid_image(img_url, raw_alt):
                                found_shows.append({"title": title, "image": img_url, "desc": f"دراما واقعية من {site['name']}"})

            if found_shows:
                selected = random.choice(found_shows)
                print(f"🎯 تم اختيار مسلسل: '{selected['title']}'", flush=True)
                with open("p.jpg", "wb") as f:
                    f.write(requests.get(selected['image'], headers=headers, verify=False).content)
                return {"title": selected['title'], "desc": selected['desc']}
        except Exception:
            continue
    return None

def upload_to_catbox(filepath):
    print("📤 جاري الرفع إلى Catbox...", flush=True)
    try:
        with open(filepath, 'rb') as f:
            response = requests.post('https://catbox.moe/user/api.php', data={'reqtype': 'fileupload'}, files={'fileToUpload': f})
        if response.status_code == 200:
            print(f"✅ الرابط: {response.text}")
    except Exception as e:
        print(f"❌ خطأ: {e}")

def generate_youtube_title(show_title, show_desc):
    prompt = f"أنت كاتب محترف. قم بإنشاء عنوان فيديو جذاب ليوتيوب بالعربية عن مسلسل '{show_title}' الذي يتحدث عن: {show_desc}. العنوان يجب أن يكون مثيراً ولا يتجاوز 100 حرف، ولا يحتوي على كلمات إنجليزية أو أرقام أو علامات اقتباس."
    try:
        import g4f
        raw = g4f.ChatCompletion.create(model="gpt-4", messages=[{"role":"user", "content": prompt}])
        clean = re.sub(r'[a-zA-Z0-9]', '', raw).strip()[:100]
        return clean if len(clean) > 5 else "قصة مشوقة لا تفوتها"
    except:
        return f"قصة {show_title} المذهلة"

def generate_youtube_desc(show_title, show_desc):
    prompt = f"اكتب وصفاً قصيراً لفيديو يوتيوب بالعربية عن مسلسل '{show_title}'. استخدم كلمات مثل 'مدبلج' و'كامل' بشكل طبيعي. لا تذكر اسم المسلسل بشكل مباشر. اجعل الوصف جذاباً."
    try:
        import g4f
        raw = g4f.ChatCompletion.create(model="gpt-4", messages=[{"role":"user", "content": prompt}])
        desc = raw.strip()[:200]
        return desc if len(desc) > 20 else f"أحداث نارية ومشوقة! {show_title} كامل مدبلج."
    except:
        return f"شاهد أحداث {show_title} المثيرة الآن! دراما عربية كاملة مدبلجة."

def create_youtube_thumbnail(show_title, video_title):
    print("🖼️ جاري تصميم الصورة المصغرة...")
    font_paths = [
        "/usr/share/fonts/truetype/noto/NotoSansArabic-Bold.ttf",
        "/usr/share/fonts/opentype/noto/NotoSansArabic-Bold.ttf",
    ]
    font_path = None
    for p in font_paths:
        if os.path.exists(p):
            font_path = p
            break

    width, height = 1280, 720
    try:
        img = Image.open("p.jpg").convert('RGB')
        w, h = img.size
        zoom_w, zoom_h = int(w * 0.6), int((w * 0.6) / (width / height))
        img = img.crop(((w - zoom_w)//2, (h - zoom_h)//2, (w + zoom_w)//2, (h + zoom_h)//2))
        img = img.resize((width, height), resample=PIL.Image.LANCZOS).filter(ImageFilter.GaussianBlur(radius=15))
    except:
        img = Image.new('RGB', (width, height), color=(15, 15, 25))

    overlay = Image.new('RGBA', (width, height), (0, 0, 0, 40))
    img.paste(overlay, (0, 0), overlay)
    draw = ImageDraw.Draw(img)

    try:
        font_large = ImageFont.truetype(font_path, 85) if font_path else ImageFont.load_default()
    except:
        font_large = ImageFont.load_default()

    def split_text(text, font, max_width):
        words = text.split()
        lines = []
        current_line = []
        for word in words:
            test_line = ' '.join(current_line + [word])
            reshaped = arabic_reshaper.reshape(test_line)
            try:
                bbox = font.getbbox(reshaped)
                line_width = bbox[2] - bbox[0]
            except:
                line_width = len(reshaped) * 45
            if line_width <= max_width:
                current_line.append(word)
            else:
                if current_line:
                    lines.append(' '.join(current_line))
                current_line = [word]
        if current_line:
            lines.append(' '.join(current_line))
        return [arabic_reshaper.reshape(line) for line in lines]

    max_width = width - 100

    # اسم المسلسل (أعلى) بلون عشوائي
    if show_title:
        show_lines = split_text(show_title, font_large, max_width)
        y_show = 80
        line_height = 110
        random_color = (random.randint(50, 255), random.randint(50, 255), random.randint(50, 255))
        for line in show_lines:
            try:
                bbox = font_large.getbbox(line)
                text_width = bbox[2] - bbox[0]
            except:
                text_width = len(line) * 55
            x_text = (width - text_width) // 2
            draw.text((x_text, y_show), line, font=font_large, fill=random_color)
            y_show += line_height
        y_after_show = y_show + 30
    else:
        y_after_show = 80

    # عنوان الفيديو (أسفل) باللون الأبيض
    if video_title:
        video_lines = split_text(video_title, font_large, max_width)
        y_video = y_after_show
        for line in video_lines:
            try:
                bbox = font_large.getbbox(line)
                text_width = bbox[2] - bbox[0]
            except:
                text_width = len(line) * 55
            x_text = (width - text_width) // 2
            draw.text((x_text, y_video), line, font=font_large, fill=(255, 255, 255))
            y_video += 110

    img.save("thumbnail.jpg")
    return "thumbnail.jpg"

def create_video_with_audio(image_path, audio_path, output_path):
    print("🎬 إنشاء الفيديو النهائي...")
    # تحميل الصوت لمعرفة المدة
    audio_clip = AudioFileClip(audio_path)
    duration = audio_clip.duration
    audio_clip.close()

    # تحضير خلفية الفيديو (الصورة مع تأثير blur)
    os.system(f'ffmpeg -y -loop 1 -i "{image_path}" -vf "scale={VID_WIDTH}:{VID_HEIGHT},boxblur=10:5" -t {duration} -c:v libx264 -preset ultrafast -pix_fmt yuv420p base_video.mp4 -loglevel error')

    # إضافة موجات صوتية ودمج الصوت
    ffmpeg_cmd = (
        f'ffmpeg -y -i base_video.mp4 -i "{audio_path}" -filter_complex '
        f'"[1:a]showwaves=s={VID_WIDTH}x150:colors=red:mode=cline:rate=24[wave]; '
        f'[0:v][wave]overlay=W-w-30:H-h-100[v]" '
        f'-map "[v]" -map 1:a -c:v libx264 -preset ultrafast -c:a aac {output_path} -loglevel error'
    )
    os.system(ffmpeg_cmd)
    print("✅ تم إنشاء الفيديو بنجاح")

def start_production():
    # 1. استخراج مسلسل
    data = get_data()
    if not data:
        print("❌ لم يتم العثور على أي مسلسل")
        return

    show_title = data['title']
    show_desc = data['desc']
    # إظهار الاسم والوصف كما هو مطلوب
    print(f"📺 name: {show_title}")
    print(f"📝 description: {show_desc}")

    # 2. تحميل الصوت من الرابط
    audio_url = os.environ.get('AUDIO_URL')
    if not audio_url:
        print("❌ لم يتم توفير رابط الصوت")
        return
    print(f"🎧 تحميل الصوت من: {audio_url}")
    try:
        r = requests.get(audio_url, timeout=60)
        with open("voice.mp3", "wb") as f:
            f.write(r.content)
        print("✅ تم تحميل الصوت")
    except Exception as e:
        print(f"❌ فشل تحميل الصوت: {e}")
        return

    # 3. إنشاء الفيديو
    create_video_with_audio("p.jpg", "voice.mp3", "out.mp4")

    if not os.path.exists("out.mp4"):
        print("❌ فشل إنشاء الفيديو")
        return

    # 4. رفع إلى Catbox (اختياري)
    if ENABLE_CATBOX_UPLOAD == 1:
        upload_to_catbox("out.mp4")

    # 5. تجهيز عنوان ووصف يوتيوب وصورة مصغرة
    yt_title = generate_youtube_title(show_title, show_desc)
    yt_desc = generate_youtube_desc(show_title, show_desc)
    thumb_path = create_youtube_thumbnail(show_title, yt_title)

    # 6. رفع إلى يوتيوب
    if ENABLE_YOUTUBE_UPLOAD == 1 and 'YOUTUBE_CREDENTIALS' in os.environ:
        print("📤 جاري الرفع إلى يوتيوب...")
        try:
            creds = Credentials.from_authorized_user_info(json.loads(os.environ['YOUTUBE_CREDENTIALS']))
            youtube = build('youtube', 'v3', credentials=creds)
            body = {
                'snippet': {
                    'title': yt_title,
                    'description': yt_desc + "\n\nThis video is for entertainment purposes only.",
                    'categoryId': '24'
                },
                'status': {
                    'privacyStatus': 'public',
                    'selfDeclaredMadeForKids': False
                }
            }
            req = youtube.videos().insert(
                part=','.join(body.keys()),
                body=body,
                media_body=MediaFileUpload("out.mp4", chunksize=-1, resumable=True)
            )
            res = req.execute()
            if os.path.exists(thumb_path):
                youtube.thumbnails().set(videoId=res['id'], media_body=MediaFileUpload(thumb_path)).execute()
            print("✅ تم الرفع على يوتيوب بنجاح!")
        except Exception as e:
            print(f"❌ فشل الرفع: {e}")

    # 7. حفظ التاريخ
    with open(HISTORY_FILE, "a", encoding="utf-8") as f:
        from datetime import datetime
        f.write(f"{show_title}|{datetime.now().strftime('%Y-%m-%d')}\n")

if __name__ == "__main__":
    start_production()
EOF
          
          python -u script.py || echo "⚠️ تم إنهاء البايثون بشكل غير متوقع."
          
          echo "⏱️ الجلسة مستمرة لمدة 4 ساعات..."
          sleep 14400

      - name: 💾 Commit History
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add shows_history.txt || true
          git commit -m "Update history" || true
          git push || true

      - name: ⏳ Persistence
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run "Perpetual Dual" --ref ${{ github.ref_name }}
